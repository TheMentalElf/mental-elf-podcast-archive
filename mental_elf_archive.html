orum for a local NHS trust And really just started to realize this is where the magic happens for me. I love being in a bar at a pub theatre after a show's happened and hearing the audience chatter about what they thought characters that I've dreamt into existence should have done or could have done.\nBut it's nothing, it's not a patch on seeing two people in a group that I've supported to facilitate changing each other's lives, changing their own lives, having lightbulb moments about what life could be like or should be like or might be like. Be like one day and so I went chips all in really on the mental health work that And that's where my recovery began.\nAnd as I said, i've retained my links with the grassroots peer support That has really helped me find and sustain my recovery alongside that as well\nAndr\u00e9 Tomlin: it's not like it's a done thing, is it? It's not finished at any point, this kind of. lived experience life. We always have [00:07:00] it. And I guess it's important to reflect on that. And you're now in this position where you're in a leadership role in a large NHS trust.\nYeah, I guess I'm interested, first of all, in you explaining to us a little bit about what that means in practice, what do you do in that role, but also the kind of reflection on where you've come from and how that influences the way you do it.\nMel Ball: Yeah, so what is the role? I guess first and foremost, I have a sort of what they call a portfolio. I'm starting to realize and utilize much more of this language these days. But basically my job is to oversee a few different services or arms of the organization that relate to co production and lived experience.\nI act as the most senior lived experience practitioner within the organization and therefore represent the lived experience workforce. So the peer support workers, the experienced workers, lived experience trainers all of those folk is my responsibility to ensure that they're [00:08:00] represented in the spaces and places where I rock up the wellbeing.\nRecovery College. we have a couple of pockets of activity in relation to the college. So our main college, the longest running college within MPFT is physically located in Stafford, but works across Staffordshire, Shropshire, Telford and Reakin. And we also have activity within our forensic services because we deliver low secure and medium secure Forensic mental health services where there's another college that we're actually in the process at the moment of stepping back up and relaunching And we also have a college that works in one of our areas where we are working as a geographical outlier is in Thurrock, in Essex. So we have an amazing college, which we think was, at the time it was launched, one of the first colleges that was tethered to, primary care and IAPT talking therapy services, as opposed to secondary mental health.\nAnd in that space, our wellbeing and recovery college activity yeah, thinks about different communities and delivering the usual magic that wellbeing and recovery [00:09:00] colleges do in those spaces. The third area where we're starting to really grow the links and develop a more Formal relationship between myself and the team is our amazing service user and care involvement team who are increasingly starting to think and talk code production and have started to really infuse that in some of their strategic planning and started to think about the horizon in terms of that Framework alongside the amazing involvement work that they've done for a really long time and so those are the three areas of kind of the organization where I have a lot to do with things.\nI have, a bit of a voice that hopefully guides and supports the thinking alongside the amazing managers and colleagues who are doing the do if you like. \nAndr\u00e9 Tomlin: Whether you feel like you're pushing against an open door now or whether?\nThere are still lots of significant barriers to being the sort of person you are in the sort of role you are doing this job.\nMel Ball: Wow. What a question. That's like the million dollar question, isn't it? I think I [00:10:00] feel really lucky in terms of the organization I currently work in and the culture really is pretty amazing a lot of the time and how that looks in terms of the question you asked, I do feel that there is absolute permission for me to.\nbe authentically true to myself in lots and lots of ways and really show up as Mel. And lots of that is really celebrated and embraced and actually, I would say I really commend my colleagues who work at my organization in the senior management teams, leadership teams at board level for the time that was made prior to my arrival to think a bit about what it would mean for me to arrive.\nEqually, and it's important for me to caveat that a bit, I think we are all still learning, we're all still working out how this role works with the way that is true to itself, impactful, appropriate to the context, how to negotiate that balance [00:11:00] between challenge and partnership, as a consistent member of the groups and teams that lead the organization.\nWe're all working it out. And as I said, I think that's why I said the success is contextual and systemic in a way, and it's a collaborative community that makes this role work and can make this role work equally. I think it could be a community that could upend a role like this and leave it not able to really function in another space and place there's all sorts of nuances and complexity to it. I've tried and I hope I will continue to keep coming back to base with myself but I have to try and stay true to this. And I think going back to. The question you asked around that 17 year old.\nIn me, who I carry with me on my journey and who I try and honor and I guess more importantly for me, also the people that I lost along the way on my journey, the people that didn't make it outta services or the people that did and made it into peer roles and then didn't make it out them.\nI [00:12:00] try and keep those people and their perspectives with me as a sort of internal council informing what I do and casting a wise eye over. every move I make, which can be quite exhausting. And there'd be places of course, where I would say something like that and people would think I might not be very well, but thankfully I know you and hopefully the listeners of this podcast will understand the metaphor I'm talking in or metaphor to an extent actually, because in some ways the voices do feel really alive within me at different points in terms of them actually being the voice I speak with for a period of time, sometimes or an interaction, and really allowing their insistence for X, Y, or Z to come to the fore and perhaps be delivered hopefully in a way that feels strategic and thoughtful.\nBut nonetheless they need to be alive. Otherwise I've probably lost my way a bit. \nAndr\u00e9 Tomlin: I'm not so much thinking about the challenge facing you, but the challenge facing this field, this community to get lived experience really, [00:13:00] established at the core in the NHS and co production really in a authentic way.\nin the NHS. And I suppose that's all about diversity and the right representation and getting the right people involved. And thinking back to those voices that were lost along the way how do we make sure that they're not lost along the way and that they're supported to remain part of senior leadership as well?\nHow do you see that panning out?\nMel Ball: Myself and Emma Watson from Nottinghamshire Trust are doing a bit of thinking and talking together at the minute in preparation for a conference in April.\naround what does the community currently need in terms of a unified voice that represents it, because actually we've seen, haven't we, over the last probably eight or so years, increasing numbers of programs, policies Projects initiatives coming from a centralized perspective, in terms of, sometimes national working colleagues [00:14:00] NHS England or other big kind of centrally positioned bodies that do prioritize and do articulate the role of lived experience and lived experience leadership different things that should be happening.\nSo I'm thinking, for example, about the current culture. culture of care, acute mental health inpatient transformation program and initiative that's going to be rolled out over the next while in lots of mental health contexts across the country. I'm thinking about PSURF, the patient safety incident reporting framework and the role of patient safety partners within that framework.\nThe patient carer race equality framework and the emphasis it places on discourse with marginalized communities and racialized communities about their experience and how we get it right. There's lots that's coming out and going back further, things like the peer support worker competency framework which was received with, significant impact.\nLots of different perspectives on [00:15:00] whether people thought it was helpful, unhelpful, on marker, off brand, lots of different. Yeah positions in relation to how that felt it related to the community, but there hasn't been a sense as far as I can work out that systematically the folks on the front line of peer support services or you know really working in VCSE partners that are commissioned by the NHS to deliver lived experience things are Having that really nimble and agile feedback loop into the design of these things.\nSo I trust and I can sense excellence and wisdom and expertise in some of the teams that are developing these programs that are then cascaded outwards. But I don't know if we've necessarily closed the gap between what then happens in provider organizations and strategically what's being designed centrally.\nAnd I'd love to try and help make that happen because I think that could be a game changer, both in terms of us aligning with our values of, iterative feedback, co production, trying to close the loop between how people [00:16:00] experience well intended things and how they're designed at a central strategic perspective.\nAnd that's no commentary whatsoever on the brilliance of a lot of those designs and the people involved with them. But I know that I've been really lucky to work in provider organizations that have been supportive and on brand and done brilliant things with those blueprints of design.\nBut I've spoken to colleagues that have had really different, difficult experiences with, being less involved, less empowered, less taken on a journey of positive change as a result of missed opportunities around some of those programs or not feeling in the loop or not having the structure set up to receive those programs and implement them with lived experience leadership.\nFrom day one. So there's, there are nuances and complexities and how we interact with each other as a national community feels like a real hot topic for me. \nAndr\u00e9 Tomlin: And I guess you, the activist you, the angry you, sometimes has to bite her tongue in these kind of [00:17:00] leadership situations, or just think very carefully about how you express yourself at board level or, in a media setting. And I'm interested in what you would say to somebody who is interested in following a similar career path to you to take on a lived experience leadership role, but is very much that is their core, the activist, angry element of their lived experience.\nIs that something that the system forces us to put to one side, or is there a way that we can retain that authenticity? Or does the system somehow need to evolve for that to happen?\nMel Ball: I think it was Andrew Moyer who developed the social movement model in four domains that I adapted for the Health Education England thought piece I wrote a few years ago about career frameworks for peer workers and it was absolutely as I say inspired by that idea of Four domains in which people do this sort of work and the necessity of all four if you look at all social movements, they've been contingent on lots of different ways of doing it, right?\nAnd it's the harmony, I think, not a [00:18:00] desire for homogeny across those groups and the way that they operate and how they do what's right for them. So I think there's something about being really true to oneself about what's what you want, what you're willing to do, what works for you and skills that you have or skills that you're interested in developing.\nAnd I love to work with dialogue. I love chatting to people. I love to hear different perspectives on things. I'm also, not shy of healthy debate. By the brokering or facilitating that between others or participating in it myself. So the way that and the place in which systemically I work is intentional in that way.\nI have strengths that I bring to that. And equally there's elements that are tricky at times and I have to keep returning to and questions, critical questions I have to keep asking myself. And as I said about the internal council in my head. That's the payoff, if I'm going to be inside a system [00:19:00] trying to support its transformational change around something like this.\nI have to do that and be willing to put in all the work It means to keep sense checking things with that internal counsel and a quite a literal external Set of eyes and ears who you know, who would be a sense checker for my work as well at times, too So I think there's something about asset mapping ourselves and really being honest And I think you know sometimes for some of the people Doing that really true honest asset mapping requires You emotions to be in a place that they're not causing us pain, so I don't, I'm not saying anger isn't appropriate and it must be sanitized and rejected at all, but I think there's some anger, which I felt at times and been really connected to and attached to, which has rendered me less able to work closely to the systems responsible for that anger or for conjuring that anger in me.\nAnd I've had to take a step back from some of [00:20:00] those systems or institutions in order to work differently with my activism and my anger. Both in terms of internally processing it so it doesn't keep tripping me up and causing me harm, and costing me more than I'm getting back, but also because that's probably what the movement needs\nAndr\u00e9 Tomlin: Why should people come along and listen to this at Big Spud in Belfast? What are they going to get from it?\nMel Ball: I hope that I can bring some learning and reflections that are within a context of a developing community of people in these lived experience leadership roles and I hope people will maybe leave better informed about what lived experience leadership is, if they're not too sure, or if it's quite a new topic for them.\nAnd maybe encourage that this is a direction of travel that they should be pushing for their organization to embrace. At least in terms of thinking about its readiness and keeping it on the agenda, Not necessarily going big bang immediately because that wouldn't be right all the time in all the places but thinking about what would it mean to [00:21:00] plot out the journey from here to there?\nBig, thanks to Mau for taking the time to record the podcast with me. Uh, talk at the conference is entitled the wind and the sun, a fable of lived experience leadership. I'm really looking forward to hearing more from mal, which of course you can follow on social media. By searching for the hashtag big spot 24. That's it for this episode. I hope you found it interesting and thought provoking. We've got more big spot podcasts coming up soon. With Anthony Bateman. And Boba. So look out for those over the coming days. And don't forget, you can still book tickets for the big spot conference in Belfast. Go to big spot.org.uk. And join us in person. \n This is Andre signing off. See you again soon. "}, {"title": "David Nutt on Alcohol: The Ultimate Psychopharmacological Challenge", "date": "Fri, 07 Jun 2024 08:59:31 GMT", "year": 2024, "season": "14", "duration": "18:31", "description": "In episode five of the BAP 2024 podcast, Professor David Nutt, a renowned psychiatrist and psychopharmacologist from Imperial College London, delves into the psychopharmacological aspects of alcohol. David Nutt is a past president of the British Association for Psychopharmacology and of the European College of Neuropsychopharmacology. Hosted by Andr\u00e9 from the Mental Elf, this episode touches on the history and effects of alcohol, its social role, and the development of safer functional alternati", "url": "david-nutt-alcohol", "transcript": "David Nutt on Alcohol: The Ultimate Psychopharmacological Challenge\nAndr\u00e9 Tomlin: [00:00:00] Hello? Hello? Hello. And welcome to episode five of the bap 2024 podcast. Featuring professor David Nutt talking about alcohol. The ultimate psychopharmacological challenge. I'm Andre from the mental health and I'm your host. The British association of psychopharmacology, uh, celebrating their 50th anniversary in 2024. And we'll be joining them in Birmingham for that annual summer meeting, which takes place from the 21st to the 24th of July. I'm covering the event this year with my colleague, Flo Martin, I'm going to be recording video conversations at the conference. That we share on social media and flow is going to be reporting live alongside a team of Intrepid beyond the room correspondence. You can follow along by searching for the hashtag bap [00:01:00] 2024 on Twitter, YouTube, LinkedIn, and Instagram. This episode of the podcast features one of the most well-known psychiatrists in England. David Nutt. Is a long time advocate for the rational use of regulated drugs. He's a past president of the bap. And of the European college of Neuropsychopharmacology. In 2013, he was awarded the John Maddix prize for promoting sound science and evidence on a matter of public interest. Whilst facing difficulty or hostility in dating, say. Anyone remember that spat on ecstasy and equestrianism. It's worth looking up. \nDavid Nutt: My name is David Nutt. I am a psychiatrist. As people always point out with a name like that, what else could I be? And I'm a psychopharmacologist. I work at Imperial College London. Psychopharmacology is the study of How drugs affect the brain and how the brain can be [00:02:00] studied by using drugs to perturb the brain.\nAnd my claim to fame, is I've probably given more different kinds of drugs to human beings than probably anyone else ever, but that's still contested, but I've done a lot of research on the brain and drugs.\nAndr\u00e9 Tomlin: and we're talking today about the drug alcohol and you're giving a talk at the BAP meeting in july Entitled alcohol the ultimate psychopharmacological challenge. So first of all, just give us a layman's Summary of how alcohol Tell\nDavid Nutt: So alcohol has been around for a very long time our early ancestors first discovered rotting fruit could get them high, and then of course they developed whole technologies for making alcohol, like fermenting grapes or fermenting cereals like wheat and and more recently, of course, distillation in about the ninth century.\nAlcohol is very psychoactive. It gets into the body, usually, through the gut. You can take it other ways, but I don't recommend that. Gets into the brain, and it does a [00:03:00] series of different things according to dose. So the first thing that alcohol does is it begins to turn on the GABA system, which is the brain's relaxation system.\nAnd then as you push the dose up after a couple of drinks, you begin to release dopamine. And also endorphins. And that's where people start to get a bit high and a bit loud. It's sometimes a bit aggressive and also where the beginnings of dependence and and craving kick in. And then if you push the dose up more, you also begin to turn on the serotonin system.\nAnd also you begin to block the glutamate system. this is where the real challenge of intoxication starts, because you've already enhanced GABA, which is calming the brain, and then you start to block glutamate. And glutamate is the critical neurotransmitter for keeping you awake. So then you've got a double whammy.\nToo much gaba, too little glutamate. People become amnestic. They forget their memory. They start to behave in very abnormal ways. They often [00:04:00] become unsteady. And eventually, if you carry on drinking, then you can eventually die as a result of kind of anesthesia.\nAndr\u00e9 Tomlin: me a little bit about the positive effects of alcohol. Why is it such a popular drug?\nDavid Nutt: Alcohol clearly is the most popular drug in the world the possible exception of tea and coffee in the Western world used by over 80 percent of adults and has been for millennia. And that is because humans are social creatures, but humans are also anxious about socializing. So you have this tension. People want to meet other people. They're inherently primed to be anxious. And alcohol reduces that anxiety, which of course is why it's used in pretty much all social gatherings from celebrating the birth of a child to commiserating on the death of Of a friend or a family, everything we do where other humans are around in most societies is associated with alcohol because alcohol takes away that tension which occurs [00:05:00] in social situations.\nAnd of course it also occurs in other situations. What's the first thing they do on a plane when the seatbelt signs are switched off? They offer you a drink. Why? Because a very large minority of people in airplanes are actually phobic of flying. And alcohol is an anxiolytic. It does, it really juices that anxiety.\nIt helps people cope with the stress of being 30, 000 feet.\nAndr\u00e9 Tomlin: Are there other drugs that do that as well as alcohol?\nDavid Nutt: There are other drugs which improve socialization. The most famous one, of course, is MDMA. But it's a different kind of effect. Firstly, it takes a lot longer to come on. And secondly, it puts you in a rather different state for many hours. are other drugs which work on the GABA system, like alcohol.\nThere are drugs like benzodiazepines and barbiturates. Benzodiazepines do have effects rather like alcohol in low ish doses. In fact, There are studies which show it's almost impossible for people to distinguish alcohol and benzos [00:06:00] in low doses. Benzos unfortunately tend to have very long half lives, so they're even harder to get rid of in a sense, or get over the effect of the alcohol.\nAndr\u00e9 Tomlin: So what do you think of the kind of public health drive that we've seen in recent years towards non alcoholic drinks? And I'm thinking in this kind of context of pro social drinking.\nDavid Nutt: another paradox of alcohol is the fact that it's very much liked by most people, but it also leads to dependence in perhaps 15%, and it leads to harm in more than that. In fact, We know that there is no safe level of drinking. If alcohol was to be treated the same as other food additives, the maximum allowable or recommended amount per year would be a glass of wine.\nSo we choose to ignore the harms of alcohol because we get benefits from it. why do we do that? The benefits, the socialization, I think is [00:07:00] really the key to it. Alcohol gives us benefits. Up till now, up till recently, we've tended not to be quite as aware of the harms. Now we are more aware of them and so people are beginning to switch and people are looking to non alcohol alternatives.\nSo at the very least they've got something in their hand because we're so conditioned. To having a drink in our hand when we go to something like a party or to some other social gathering, then not to have that to you makes you feel even more anxious. So they have a purpose, non alcoholic drinks, but they don't do what alcohol does.\nThey don't facilitate the socializations. So they make you part of the group, but they don't necessarily ease you into the group.\nAndr\u00e9 Tomlin: So you've been involved over the last few years in developing functional safe alternatives to alcohol through GABA labs. I was looking on the website and there's a great quote. It says, if life is a symphony, then GABA is its conductor. How successful has that work been?\nDavid Nutt: So we've decided six years ago now [00:08:00] to try to give people an alternative alternative. To non alcoholic drinks in social situations. We set up a company actually within Gabba Labs, which is the overarching research company. There's another company called the Social Drinks Company, and that is already selling a drink called Sentia.\nAnd Sentia is a collection of herbs, which we pulled together using evidence from historic sources of Chinese medicine and Ayurvedic medicine, and also historic use of some Relaxing herbs in British and European pharmacopoeias, putting them together to make a drink, which mimics the effects of about a glass of wine, half a half of a glass of beer, and it works.\nIt's become really quite popular. It's the first what we would call a functional alternative. And one of the great advantages of it is it however much you drink, you don't begin to engage. The other neurotransmitter systems that alcohol does. So it's free of the problems of serious [00:09:00] intoxication and hangover.\nAndr\u00e9 Tomlin: Does it taste nice?\nDavid Nutt: So the original concoction we made tasted horrible because it's it was full of these strange tasting herbs, but we've worked with a taste expert and now it does certainly some people love the taste. It's a strong taste, like a vermouth. Some people actually drink it neat.\nI tend to drink it with mixes. I prefer to drink it with with tonic. Others drink it with Coke or it goes perfectly well with apple juice, orange juice or whatever. That's generally how we recommend it, because it does have a very, it's a powerful taste, which some people, as I say but others prefer to have slightly, um, masked or neurotransmitters, if you were to drink a lot of it. Technically challenging, as I say, we've now got three or four molecules, which I think are getting close to what the ideal would be. And then the vision is to raise enough money to take that ideal molecule through food safety testing. So that's somewhere between about five and [00:12:00] ten million pounds. And then eventually have it approved as an ingredient, a food ingredient, which we can license to any drinks company in the world. So they can make their mocktails with alcohol instead of ethanol.\nAnd then people will have a real alternative, because you could make an infinite number of drinks with alcohol in it.\nAndr\u00e9 Tomlin: So what are the kind of regulatory challenges in bringing those products to market? That's complex, I imagine.\nDavid Nutt: Yes, so there is an approval pathway to make a new food in both Europe and in the U. S. we're not sure about the U. K. because no one's quite sure whether we're in Europe or not in terms of those regulations. The pathway we're going to take, It's the American pathway, because it works, there are established precedents, whereas there aren't in Europe.\nThe pathway is called GRASS, they're generally regarded as safe. And essentially you put your compound [00:13:00] through a series of tests, which are very similar to the tests that you would do. take a pharmaceutical through. So it's a very high level of safety. You prove you're safe in terms of oncogenicity, mutation, safety, interactions, etc.\nin various models. And if you pass all those tests, which take several years, then a group of experts decide whether it's safe or not. And if it's safe, then you can market it.\nAndr\u00e9 Tomlin: I'm interested, as we've closed, to just broaden this out a little bit, this conversation beyond alcohol, with drugs laws changing internationally, many countries opening up to wider social use of drugs like cannabis. We've got this kind of new psychedelic renaissance, people sis or, crack epidemic are people living in poverty.\nDavid Nutt: The point about. These new drugs is that they are not expensive and they're not addictive, [00:16:00] and so they will probably be very beneficial to communities that previously have been the target of drug dealers who are dealing them drugs like opiates and cocaine or crack, which are very addictive, and we're already seeing with the rollout of medical cannabis, the significant reduction in opiate use, and that's got to be beneficial to anyone who's either got chronic pain or other illnesses which require opiates, that will almost certainly reduce the use recreationally as well.\nSo I think a rational drug policy which encourages the use of drugs which are basically helpful healing drugs, like a synthetic alcohol, like cannabis in a form which is not Addictive low THC cannabidiol, getting rid of skunk, replacing it with a more balanced mixture, magic mushrooms sold in appropriate quantities.\nFree from powerful other psychedelics or intoxicants. Those markets, I think will transform the field. [00:17:00] They should be available to everyone. You can grow your own mushrooms, , you grow your own cannabis so they'll be more, more democratic and hopefully direct people away from, or encourage people not ever to get into drugs, like opiates and crack cocaine and crystal meth.\nAndr\u00e9 Tomlin: We're still a couple of months away from your talk in Birmingham at the BAP meeting but give me an advert for that. Why should people come along and hear that talk?\nDavid Nutt: Almost everyone in the audience will drink, and you need to know what that's doing to you. You need to know how it's doing what it's doing, how you can minimize the harms of drinking, and how you can help me work towards a future where we can eliminate those harms completely by replacing it.\nAndr\u00e9 Tomlin: Big, thanks to David for taking the time to record this podcast conversation in May, 2024. It's always good to hear him speak. And I'm sure that his talk on alcohol will be very popular at the bap summer meeting in Birmingham, in July. \nDo check out the [00:18:00] other episodes of the bap podcast. If you've not heard them yet. Standout moments for me so far include John crystal talking about cattlemen. I'm Barbara, Frank talking about ADHD. Subscribe now to the mental health. Wherever you get your podcasts. That's all for now. This is Andre. Signing off. I'll see you next time. "}, {"title": "Understanding Biological Pathways Towards ADHD: Barbara Franke's 40-Year Tour of ADHD Research #BAP2024", "date": "Thu, 06 Jun 2024 13:38:43 GMT", "year": 2024, "season": "14", "duration": "17:12", "description": "In this episode of the BAP Podcast, host Andr\u00e9 from the Mental Elf interviews Professor Barbara Franke, a molecular biologist from Radboud University in Nijmegen, about the complexities of ADHD. Franke discusses the genetic and environmental factors contributing to ADHD, the challenges of diagnosing the disorder in different populations, and the impact of societal views on ADHD. She emphasizes the need for integrated research and cross-disciplinary approaches, highlighting the importance of invo", "url": "understanding-biological-pathways-towards-adhd-barbara-frank", "transcript": "Understanding Biological Pathways Towards ADHD: Barbara Franke's 40-Year Tour of ADHD Research #BAP2024\n[00:00:00] Hello. Hello. Hello, and welcome to a new episode of the bap podcast. This time focusing on ADHD. And featuring professor Barbara Franke from the Netherlands. The British association of psychopharmacology are celebrating their 50th anniversary in 2024. And we'll be joining them in Birmingham for that annual summer meeting, which takes place from the 21st to the 24th of July. I'm Andre from the Mental Elf and I'm covering this event with my colleague Flo Martin. You can follow Twitter, YouTube, LinkedIn, and Instagram, the hashtag. Is BAP2024. This episode of the podcast features a molecular biologist from Radboud University in Nijmegen.who promises a whistle-stop tour of the last 40 [00:01:00] years of ADHD research. Barbara Franke's talk at the conference is entitled understanding biological pathways towards ADHD. \nBarbara:  My name is Barbara Franker. I'm a professor of molecular psychiatry, working at Radboud University Medical Center in Nijmegen in the Netherlands. I'm a biologist by training. I was educated in Gie\u00dfen in Germany and then moved to Utrecht in the Netherlands, where I got my PhD degree. And then after that I moved to Nijmegen.\nAnd just yesterday I had my 25th anniversary of working in Nijmegen and I still love working there. It's an incredibly nice environment to do neuroscience research.\nAndr\u00e9: wonderful. Oh, congratulations on your anniversary. So I'm going to start by asking you a big question. What causes ADHD?\nBarbara: that's really a big question and very [00:02:00] hard to answer, because it's so complex and while we're being a basic molecular biologist, we're obviously very interested in the molecular causes, the molecular contributors to psychiatric conditions and ADHD in particular, and.\nhaving said that, I've talked about causes very often, and I like doing genetics because it is very close to the building stones of what we are. but I've come to realize that, many factors have to come together, and these are both genetic risk factors, as well as potentially genetic protective factors.\nAs well as the environment and environmental positive and negative conditions to make somebody, who they are and to make somebody, for example, have ADHD and now saying, what is the cause? all of this contributes. And, in some [00:03:00] people, it may be more on the genetic side and in other people may be more on the environmental side.\nso it's very hard to say really, this is the cause, but there's a lot of contributing factors, and all of them may have different. Yeah, weights in different people.\nAndr\u00e9: as you say in your conference abstract, it's a kind of bio, psycho, social, societal condition. And there's definitely some genetic component in there. I suppose we know from science that other conditions in terms of population, have different, proportions, of things like genetics and biology and social and psychological.\nIf you look at depression, for example, they say, it's about 50 50 genetics and biology on one side and social and psychological on another side in terms of population. Do we have that kind of information about ADHD?\nBarbara: Yes, we do. And if you look at that, then about three quarters of the contribution lies in the genetics, in the biology. but of course, [00:04:00] then, we're talking about genes for certain conditions, but there is no, no gene for diagnostic category of ADHD.\nso these are factors that make your brain vulnerable to certain environmental factors. that then, draw you in the, direction of having ADHD.\nAndr\u00e9: So it's fair to say that there's a big genetic component, but it doesn't necessarily mean if you have that that you're going to get this condition.\nBarbara: Yeah. So often when we talk about genetics and heritability we think of, conditions where you have a genetic mutation. And if you have that mutation you're bound to have a disease. that is associated with it. That's definitely not the case for ADHD or for any of the other psychiatric conditions.\nSo very, important that we don't see the genetics as, deterministic. So if somebody says, my genetics made me do it, I can't do anything because it's genetic. that's not right. [00:05:00] That's not how it is. \nAndr\u00e9: But let's take a step back and let's think about the kind of societal perspective on this condition. So attention deficit hyperactivity disorder. Is that how you see ADHD, as a disorder, something that we need to treat and cure?\nBarbara: when I started in this field, that definitely was the idea that I have, but having had a lot of contacts with people with ADHD, I've come to realize that there's much more, fine grained, information, fine grained, considerations here. and in many ways, I still think that people with ADHD need help in the society that we currently live in.\nbut there's also a lot that they can do when in the right spot and with the right, help and support. So, I definitely don't think We want to necessarily cure ADHD, but we want to help, people have less of a burden of the impairments that [00:06:00] go with ADHD. \nAndr\u00e9: And I guess over the last 10 years particularly, we've seen this kind of activism around neurodiversity that's happening, which is very positive, I think, but I guess, things like, Autistic Spectrum Disorder and ADHD are, they are a spectrum condition, and some people can have it, or be on that spectrum, but still be fairly functional, and other people can have very severe disabling versions of those conditions, this reframing that we've got that, ADHD, it's a superpower, do you see some harm coming from that as well as some benefits?\nBarbara: I'm talking to people, around neurodiversity a lot. And I often say that I'm worried that we're throwing out the baby with the bath water by, concentrating very much on the neurodiversity only and forgetting about the care. And I'm saying that in particular, because we're.\nalso involved in education of clinicians in, for example, southern, and eastern European countries, as well as many other regions of the [00:07:00] world, where we really see the need for more information about ADHD for more care. And how people in these, countries still suffer from their ADHD, not being able to get support.\nSo, people with ADHD have fought very hard over many years to get the attention that they have now, to get help, to get, treatment, to get support in, societal terms. if we're now saying, okay, so we're not ill, ADHD is not a disorder, then what will, politicians or other people in society, think about the help, that has been put in place for people like that?\nIs it not that we run the risk that these mechanisms of support will be shut down because apparently people with ADHD don't need help. So that is my worry in going too far in the neurodiversity direction.\nAndr\u00e9: But do you think we're under diagnosing or over diagnosing [00:08:00] ADHD right now, and which groups in society do you think are missing out on the care they need?\nBarbara: we're definitely underdiagnosing. and that is in particular, females across the lifespan, as well as adults and definitely the elderly which are totally forgotten when it comes to ADHD. so there is, luckily in the last few years, there's much more attention for adults with ADHD and what the characteristics are.\nof these adults and how to diagnose them. At the same time, the diagnostic criteria, that we have now for children, they, definitely favor, the male typical ADHD patient. So in that childhood category, we may see both. Overdiagnosis as well as underdiagnosis, and there is discussions about the youngest in class.\nare there boys that are being overdiagnosed because they are younger than the rest of the class. And are we still missing out on the girls that [00:09:00] are not so typically ADHD, according to that diagnostic criteria. And should we adapt the diagnostic criteria in any shape or form to make them less likely to be missed. \nAndr\u00e9: alongside that under and over diagnosis where that occurs. I'm very interested in that in younger people I suppose there's a sort of societal view about ADHD Which is leading to it not being picked up or it being picked up where it isn't the case How would you like societal views to evolve over the next 10 years or so?\nBarbara: So I hope that there will be more, understanding and more inclusiveness. And having talked about neurodiversity and the risks of it, I see also the good sides of it in that. companies are now much more aware of the needs, for example, organizing, circumstances of work in a much better way for people with ADHD, for people with autism.\nI think that is really an [00:10:00] achievement, that also the neurodiversity helps us. So getting people more included. In society, that would be my goal for society to be more accepting of people that have a neurodiverse brain. \nAndr\u00e9: But coming back to the science, your talk at the conference is going to be presenting, what we've learned over the last 40 years or so about ADHD and the fact that, a few years ago we were searching for an ADHD gene, and as you say, that's, not what's actually happening here.\nIt's more complex than that. how would you like the ADHD field to develop from this point on? If you were in charge of the research budget across Europe for the next 20 years, where would you be putting the money?\nBarbara: really on the integration of different fields. and that goes very far. So, in terms of biology, we already should. Try to link more of these different omics, methods that we're using. So trying to understand really the molecular component more general than just looking at one of the genetic [00:11:00] variation, that we know is in the genome.\nand then also linking that, and these are, functional studies, or statistical studies often linking that to functional studies. So, studies in model systems, and our group is doing, for example, research in drosophila, as a model system for ADHD. The good side of ADHD, well, for research, purposes at least, is that The behaviors that are altered in ADHD are very basic, in our brain and have been around for a very long time.\nSo that makes that even in drosophila that diverged in its evolution a long time ago from humans, we see features back and genes that we can study to learn more about ADHD. So trying to combine the different, fields within molecular biology and functional biology, for example, and then linking that directly in the design of projects already with, patients with other stakeholders to make sure the direction that we're [00:12:00] going in, is the direction that really in the end helps society.\nAnd that's what is called with a nice term, convergence, mental health, research. So in a way you bring together all the stakeholders already from the start of the project, in the design of the project. And we're doing that a little bit with research of my colleague, Martina Hochmann, who is studying positive sides of ADHD.\nAnd this is really research that was co designed with patient, representatives with patient organizations who said there is a lot of, around sides of ADHD social media, but you don't really see any signs. based on that. She developed a research program and is running that and it's getting funding for that.\nAnd I think that is the way to go to really start with the stakeholders together and work from there.\nAndr\u00e9: Yeah, that sounds fascinating. But I'm very interested in this idea of cross disciplinary science. And I guess there's a lot of support [00:13:00] over here in the UK at the moment. The research councils are funding those sorts of projects more and more. What do you think the challenges are of that kind of working together \nBarbara: So there are two things. First of all, it takes a much longer time. To bring everybody together, that's what we're seeing, experiencing. So you, cannot write down your idea, 10 days before the deadline. That's not on anymore. The other is indeed the communication and the different languages that are spoken by different disciplines.\nAnd that is, a formidable challenge. So trying to, reduce our jargon as much as possible. and on the other hand, try to build a team that. understands each other so that, that knows the jargon at least a little bit and also knows the strength and the, pitfalls or the limitations of certain disciplines.\nAndr\u00e9: And I guess in my experience what's going on in the Netherlands, the kind of co production work that's happening, putting patients at the center of these research studies. We're doing a lot of that over here in the UK in mental health research as well. [00:14:00] That's quite challenging when you take it outside of the psychological sciences, isn't it?\nIt's easy to do a qualitative study and co produce it with patients and involve them and But if you start doing sort of basic science lab based stuff and you want to co produce it with patients Have you got examples of that working? So being\nBarbara: We're getting there. And indeed, this is more difficult. there is a side of, patients asking us what is in it for me? And when will this reach me? is it really necessary? that's a good question to ask because we have to defend, and be able to explain what we're doing, to, to them. On the other hand, You need people who understand indeed a little bit of, the scientific realms and in that way, ADHD and autism are, relatively easy because we find people with ADHD and with autism within our research community and getting that going, we're now making first steps to really [00:15:00] involve people, for example, in, Radboud University, getting them to to identify themselves as being ADHD, as being autism, and then involving them in our research in a way of designing things.\nAndr\u00e9: a scientist with lived experience that's becoming a more and more important role What are some of the challenges of coming out as a scientist with lived experience? \nBarbara: guess is, not different from ADHD, having autism in any other field. people might not think that you can do it. in the way that they thought about you before. I guess that is the stigma that is still attached to these conditions. And that is what I hope will change in the coming years.\nThat we see the people for their strength.\nAndr\u00e9: Fabulous. So interested in why people should come to listen to your talk in Birmingham in July. Just advertise it for me.\nBarbara: So in my talk in Birmingham, I will [00:16:00] try to, give you a view on what has been done in biological research and how this relates to ADHD in society and what we will be doing in the next years, because that is really exciting. \nAndr\u00e9: Big, thanks to Barbara for taking the time to speak with me for the podcast. I hope you'll agree. It was a fascinating conversation. And I'm really looking forward to hearing more from her at the bap. So I'm meeting in Birmingham, in July. Do check out the other episodes of the bap podcast. If you've not heard them yet. We've got conversations with David Baldwin. talking about the bap and preview in the summer meeting. John crystal talking about ketamine for depression and I'm Linkford Hughes, Belinda Lennox, and bill Deakin talking about the past and future of the bap. Do you look at also for new episodes coming soon, including one with Dan Stein, talking about cosmetic psychopharmacology. And one with professor David nut. Subscribe now to the mental health. Wherever you get your [00:17:00] podcasts. That's all for now. This is Andre signing off. I'll see you next time. "}, {"title": "Melanie Abas - Global mental health and the ambition to end HIV/AIDS", "date": "Tue, 14 May 2024 13:47:49 GMT", "year": 2024, "season": "16", "duration": "24:09", "description": "Welcome to the third and final episode of the 2024&nbsp;IoPPN Research Festival podcast. Every year the Institute of Psychiatry, Psychology and Neuroscience hosts a 1 day festival that brings together a really diverse mix of mental health scientists, to present their work and learn from each other. The theme this year is Origins and New Beginnings. Alongside the keynote talks from Melanie Abas, Emily Simonoff and Edgar Jones, there will be 21 lightning talks from some of the institute's&nbsp;top", "url": "melanie-abas-global-mental-health", "transcript": "Melanie Abas\n [00:00:00] \nAndr\u00e9: Hello? Hello. And welcome to the third and final episode. Of the 2024. IAP PN research festival podcast. Every year, the Institute of psychiatry, psychology and neuroscience hosts a one day festival that brings together a really diverse mix of mental health scientists. To present their work and learn from each other. This year, the theme is origins and new beginnings. Alongside the keynote talks from Melania pass. Uh, Emily Simon, often Erica Jones. There'll be 21 lightning talks from some of the institutes, top researchers, staff, and students. In this third podcast episode, we meet Melanie. \nI'm not Abbas professor of global mental health. At King's college London. She's a psychiatric epidemiologist and a psychiatrist who cares for [00:01:00] people in south London, but also in Zimbabwe. Where she's worked clinically and as a researcher for many years. Uh, early research in Zimbabwe, looked at the social origins of depression in women. And from there she's gone on to conduct interdisciplinary, epidemiological research in other countries, including Thailand, Moldova, and Sri Lanka. Her talk at the festival focuses on global mental health and the ambition to end HIV aids. \nMelanie: I'm Melanie Abbas. I'm a psychiatrist by background who trained in research in epidemiology, in the late 90s. And, since then I've had a career that's always included a bit of clinical work. So I still do clinical work. but I'd say my main activity is research.\nAnd some \nTeaching in global mental health.\nAndr\u00e9: So you're leading this mood disorders in global health research team. What are you trying to achieve now with that group?\nMelanie: Firstly, we're doing research [00:02:00] on treatments that are likely to be able to be scaled, to be used feasibly in countries with low resource settings. So that's the first thing we do. And we do that very much in partnership with the Friendship Bench in Zimbabwe, which has, you know, been, you know, it's globally so, so important.\nSo we're very, very fortunate to be long term research partners of theirs. And we learn so much from them. So the, so the main thing we do is, is research effective treatments, uh, that can be scalable. And the second thing we try to do is we link mental health to other priorities. for countries in the global south.\nSo for instance, the big theme of our work is on the intersection of HIV and depression and also on kind of youth performance, sort of youth, educational and, job, Achievements and, you know, look at how improving depression might affect that.\nAndr\u00e9: So there's something about working [00:03:00] equally in partnership with people to achieve this. Rather than being the kind of, you know, researcher from the global north who's coming in. I think what we've maybe done in previous years is sort of said, we've got an intervention that works here, let's see if it works there.\nI think we've maybe stopped doing that now? I wonder if maybe we're still doing the kind of, I know how to do research, kind of, I'll tell you how to do it, kind of approach. I suppose I'm interested in where we're at in this kind of capacity building field. What stage do you think we're at in global mental health?\nMelanie: I think we're certainly we've certainly progressed a great deal in the last 10 or 15 years. I think some of the initiatives have been initiatives. in the UK, for instance, you know, the masters in global mental health, which I think has been able to train, I think about 500 people so far who've gone back to their countries and often doing, you know, really important jobs in their countries.\nBut [00:04:00] we can do I think so much more by raising the profile of mental health within the low middle income countries. So I think the people who have, you know, either come here or, you know, been able to, um, you know, often through their own passions, get training in their own countries and, and do.\nprojects and develop mental health services in their countries. I think there is a really big wave of awareness at the moment. I was just, in Zimbabwe just a couple of weeks ago, and it was amazing. We had a group of PhD students, all Zambian, five, PhDs, two of them are on mental health capacity building.\nAnd you know, that is a big shift that this recognition that no, it's not just about, uh, you know, doing something which might, okay, might shift, you know, maybe I do some research on, you know, victims of violence or in this, in a setting here, or do research on symptoms of [00:05:00] depression. No, let's think big, you know, let's think what are the needs of a whole country, or even a whole region, and think about what their needs are. And funders are responding. So Center for Disease Control, is funding a big program of mental health capacity building for leaders in policy positions. So I think that we're tackling it in different ways.\nWe've got the capacity building of the policymakers happening, and funders are stepping into that. And we've also got the research capacity building. So the And rather than the old model of bringing people here to do PhDs at u UK universities, that's the shift I think in the last, you know, five to 10 years of the Science Foundation for Africa.\nThey're the implementing organization of now, you know, welcome trust funding, UK AID funding, other funders, Mastercard have just released a call for a [00:06:00] thousand PhD scholarships for African students, obviously not all mental health across the whole range, and all those PhDs will be registered in African countries, and the UK US partners come in with technical support.\nBut at the same time, then you're building the capacity of not only the fellows, but their supervisors as well, and their institutions. So it is a really great shift.\nAndr\u00e9: So other than the money, what\nMelanie: I\nAndr\u00e9: key components that you need to make these equitable research partnerships work really well?\nMelanie: It's a bit easy to say that now, because I've been involved in, certainly in one particular country, Zimbabwe, for more than 20 years. So I don't want to put young people off by saying you need 20 years, but I do think getting to know a country well, and being, able to spend a bit of time there doing a little bit of [00:07:00] clinical work as well as research so that you have met people with lived experience, you've talked to people, you've talked to policymakers, you've talked to people who deliver services.\nSo I think recognizing that, you know, It's not just about going in and having a good idea or having a technical skill. It's about becoming a partner in the true sense you're listening to them as much as or more than they would, than they need to listen to you. So I think it's, yeah, finding a country that you want to work in or people that you want to work with and then investing that time.\nBut it does mean that our institutions have to value that too. that's still a challenge, you know, understandably universities need to make money. They need to have ref outputs. you know, they need to be high up in league tables, but global mental health.\nI think does require that we are willing to nurture and [00:08:00] mentor people in those countries to be the first authors, and therefore our systems need to recognize that that is a value to know we don't have to be the first authors at all we we need to value that our contribution has been to bringing somebody on.\nOnce you do that, I think your local partners will really value you. I remember being kind of, you know, sort of taken aside about six or seven years ago in one particular project and That's the great thing about working somewhere for a long time that people start to feel comfortable with you.\nThey'll tell you things they will not tell you if you're only popping in and out, or you've got 20 different countries you work in and you just go for three days. But if people get to know you, then they'll actually take you aside and they'll be very generous because they'll tell you what things you're doing wrong.\nI was pointed out to me mentorship of someone. because that person needed, [00:09:00] needed to grow. And, you know, there wasn't anyone actually to fill that gap. And so I took that on board, and saw that that it was really important for the institution that that person was seen to be, you know, developing and was supported.\nAndr\u00e9: I'm interested in focusing now on the kind of interface between mental health and all these other areas you've worked in, you know, whether it's kind of women's health or education or HIV AIDS. Why are you so fascinated by that interface?\nMelanie: think I've always been someone who's liked that kind of messy, the edge of things. you know, before I got so much into this area, I worked for a while on migration. I think my doctorate was in poverty and mental health, and I think I like that intersectional stuff. but I think another point was in about 20 13, 20 14, the friendship bench.\nwas undergoing a clinical trial, and [00:10:00] I went to the HIV clinic, one of the main ones in Harare and talked to the staff there and said, you know, we've got this intervention that seems to be working well in primary care, would you like us to You know, look at doing some research together here or service development, even, you know, didn't have to be research service development for depression.\nAnd the clinicians there and the nurses, you know, they looked at me and said, well, for a start, everyone here is depressed. You know, they're living with HIV, there's a lot of poverty. but also our priorities are not so much the mental health, they're the physical health. Those are the targets that we really have to meet.\nAnd that's getting people virally suppressed, getting them well, getting them adherent to their medication. If you can help with that, we'd be interested to talk. So again, that, that was a learning thing. So I had to go back to the literature and think, okay, so actually what is the evidence that if we improve mental health, we can actually help [00:11:00] with the targets that are really important to this clinic.\nAnd I was really. encouraged to find that in the US there was actually quite a lot of evidence from working with gay and bisexual men over years. people that I just, you know, heard of in the literature had, had really been pioneering great therapy approaches. And I was very, very fortunate that then I reached out to them and they said, yeah, okay, that sounds interesting.\nYou know, perhaps we can help you to address some of these issues. And that's, that's really how I got into the intersection between HIV and depression.\nAndr\u00e9: So tell us a bit more about the evidence though. I had no idea that you'd kind of applied it in that way. Yeah, so what do we know now about this mental health, depression and HIV AIDS \nMelanie: we've known for a very long time that depression is, um, at least twice as common in people living with HIV, who is not living with HIV. And that's globally as well as [00:12:00] in Zimbabwe. we know some of the reasons for that. And it's not particularly to do with the diagnosis. that's a sort of misunderstanding, it's much more to do with, living with a chronic illness that is stigmatizing, but also because people who tend to have, you know, HIV also have a, unfortunately, often a lot of other issues running alongside, they might have relationship difficulties, poverty and so on.\nAnd those. are also likely to increase your risk of depression. Plus there's some biological things. So anyway, we know that that's common. What I think our research has been able to show, particularly that led by the Friendship Venture working in partnership with them is we've learned a few really interesting things.\nFirstly, the kind of treatments that work for people who are not living with HIV work just as well in people living with HIV. So that's very encouraging. And that's led to change already, not only nationally, but [00:13:00] internationally. You know, that's now in guidelines, in, you know, in WHO and AIDS guidelines just in the last five years.\nSo, so that's very encouraging. What we have shown just this year is echoing what's there in from the US literature, is that unfortunately, though, if you are struggling with poor adherence, as a lot of depressed people are adherence to HIV medication, unfortunately, just treating the depression won't be enough.\nthat is, that is, I'm afraid still not that well understood by policymakers. I think they think if you if you invest in depression treatment, you're naturally going to get improved, adherence and viral suppression. Unfortunately, that's not the case. But if the person with depression or anxiety is doing okay with their adherence.\nThe great thing is that if you do have a mental health treatment, even something as simple as the friendship bench, you're [00:14:00] more likely to remain physically well. If you're doing okay, even if you've got depression or anxiety, but you're doing okay with your physical health, if you have a simple mental health treatment, you're much more likely than if you don't have a mental health treatment.\nto maintain your physical health. that is a really important finding that we've been able to confirm with the U. S. data, probably one of the first groups to do that in an African setting. and we're just now waiting to hear whether our extra support for adherence, because you, you can imagine that if you have depression, it's quite often quite challenging to problem solve around.\nbarriers to adherence, if you have problems getting to pick up your meds, or you know, you don't want to tell your work colleagues that you're living with HIV, so you don't want to, you know, admit you're going to a clinic, or you haven't told your mother in law and you're living with your in laws. So what we do is we help them [00:15:00] problem solve.\nSo our intervention, um, which we're still, it's called in Zimbabwe, the Zimbabwe name is Tendai. our intervention is about helping people get back on track with their medicines when they're depressed. And yeah, we're waiting for big clinical trial results on that, but the qualitative data is, is very encouraging that people say that they learn new skills.\nTo take their meds and that they're able to still use those skills, you know, 12 months after, after we teach them. So we're just hoping that that will show up in their blood test results too.\nAndr\u00e9: What would you say is the biggest stigma currently in Zimbabwe, having HIV and AIDS or having depression?\nMelanie: it would probably still be the HIV. there is no actual word for depression in the Shona language. The closest to it is. people talk about thinking too much they might talk about different sort of heart pain, stomach [00:16:00] pains.\nit's not massively stigmatized actually, whereas sort of more delusional, you know, when people have hallucinations or delusions. you know, that's still unfortunately something, you know, that people would make a joke about, or, you know, they're mad, they're bewitched, they've got a spirit possessing them.\n Difference with HIV that in the last, say, five or 10 years, of course, people recognize now that it's treatable. If you take medicines, It is treatable, but sadly, there's still so much stigma. it's still, people say, you know, think, Oh, we know, have you behaved badly? You know, have you been promiscuous?\nthere's still a lot of. myths about how you can pass it on. So we try to do a lot of education about the fact that if you take medicines as you're meant to, you can actually have unprotected sex. Now, you know, you can, you don't pass it on to sexual partners, [00:17:00] but that's still something that is not well understood.\nSo people still think, you know, unfortunately, particularly young people think it's, they prefer not to tell. their partners, they're living with HIV and sadly they'll sometimes even stop taking their medicines because they want to preserve that relationship so much. They don't want any risk that the person knows that they're living with HIV.\nAndr\u00e9: I'm interested in your advice would be to any young researchers anywhere globally listening to this who are interested in kind of following your path. \nMelanie: It's not always the easiest path. I think being a clinical academic, you're juggling a lot. but if you want to really, have a very rewarding career and work with partners. to me, it is very much a team activity. It's about working with people, wanting to see them grow, [00:18:00] helping them answer issues of relevance to their communities.\nMaking sure they're skilled to do that, then I think it's, you know, to me, it's the best job in the world. So, I would say, go for it. think you've got to have a burning passion for research and you've got to really have questions you want to ask. You've got to love getting the data and you've got to find it really rewarding to get your publications.\nAnd that's just one part of it. I think the other part, though, is the relationship. Building and knowing that you will have bad times you I'm been doing this for a long time, but I definitely still make mistakes. it really is a lifelong learning and that I think keeps you young and you're learning from the next generation all the time.\nSo that's also really, really great keeps me on my toes. So, yeah, I couldn't I couldn't think of anything better.\nAndr\u00e9: I'm interested in what you think about the systemic change [00:19:00] that's required to really value this work. You said before that, you know, sometimes the thing you're doing is the right thing, mentoring somebody and making them first author on the paper, but that's not necessarily rewarded by your institution.\nWhat are the, what are the systemic things that really need to change?\nMelanie: Some of them are beginning to change in that now we can talk about the contribution to the paper. But I think the actual mentorship of somebody from an underserved setting perhaps specifically needs to be acknowledged. So that could be part of our performance.\nFramework doesn't have to be somebody from, you know, a low middle income country. Equally, it could be somebody wanting to get into research or education from disadvantaged groups. Or marginalized groups in this country. When you win a grant, you know, say this grant I'm talking about with HIV, [00:20:00] AIDS, and depression, that's like a four million. dollar research grant, but our institution here only values the amount coming to King's. it sounds a small thing, but I think that's the wrong perspective.\nYou know, this is a big grant where the research is happening in another country, but everyone's benefiting. And so I think that they should celebrate total amount of our grant rather than just the amount that's sitting in the London purse. if a student isn't registered at King's College London, but we're supervising their PhD and they're registered in Cape Town or Mumbai or whatever, it doesn't count. It's called other. okay, we have to have a balance. Obviously we have to have PhD students that are paying fees, but I think as the The UK changes, you know, global health is not just about income for kings, it's also about soft [00:21:00] diplomacy.\nthere are other outputs and if the government recognizes it, then surely, the universities are being a bit slow to catch up and realize that there are things that we do that do count, we've just put them in this grant, actually, for the MasterCard scholarship.\nSo that would potentially bring, say, 40 students to King's. So there'll be a bit of salary for the supervisors. But on the education database, we just need some hours to be credited, I think. because it's win win, because it will then deepen that, that relationship that we have with the other university and then they will turn to us, you know, when they want the next partnership.\nAndr\u00e9: this is such a diverse program at this conference next week You know the IPPN\nMelanie: I know.\nAndr\u00e9: festival. It's like genetics and neuroscience and all kinds of stuff so I think it's brilliant in that sense because people ychiatry at UCL. Director of the NIHR policy research unit for mental health. And a consultant psychiatrist who's worked for over 20 years in an early intervention service for psychosis. So I knew his keynote talk at the conference is entitled. What does research tell us about how care and support for people with a personality disorder diagnosis could be improved. She began by explaining why she's a social psychiatrist and what that means.\nSonia: I'm interested in taking a social view on mental health and mental health care, that's by directly looking at trying to intervene with or understanding determinants of mental health, [00:02:00] as with the program of research I've got involved with on loneliness and mental health, or trying to research service delivery and outcomes, while keeping an understanding of social influences and social determinants and social inequalities.\nThanks. See you. in mind throughout that process.\nAndr\u00e9: So we're talking today about the big spud conference. \nSo the focus is on personality disorders. And I was looking at the publications that you put out in recent years and a lot of your work talks about complex emotional needs rather than personality disorders. So I wondered if we could just start off with the question of terminology.\nWhy did you decide as a group to call it that?\nSonia: I have to start by saying I really don't know what the best way forward is in terms of terminology at this point, and it's something I would very much welcome [00:03:00] some group, including service users, philosophers, clinicians, people who are experts in diagnosis, doing some substantial and in depth program of work to decide on the best direction.\nwhen we started a program of work that was at the request of NHS England in this area, held one workshop in particular and a consultation where we had a variety of stakeholders, including quite a lot of people with lived experience of being diagnosed with a personality disorder. And it became clear at that workshop, how harmful and indeed sometimes insulting many people experience that diagnosis as being [00:04:00] in the way it was used and in discussions with the lived experience researchers and the wider group of people at that workshop.\nAnd subsequently, we. came to the conclusion that in order to do the research we were doing, and particularly in order to do the qualitative studies we wanted to do, looking at people's perspectives with relevant experiences of services, We probably shouldn't tie ourselves to the personality disorder diagnosis, or we should potentially describe this area in some different way.\nSo it was a fairly, rapid decision to adopt complex emotional needs as an alternative description for this area of service delivery. Having said that, I think there are still quite a few [00:05:00] problems. I think it's quite a non specific description and obviously in this area The research is not very good, but there is research that's important nonetheless that we mustn't lose sight of.\nAnd obviously a danger of detaching further research from the personality disorder label is imminent. that you might also lose sight of the evidence we do have, and I think it's important not to do that. I think also it's clear that some people, I would say a minority of people is my impression, but some people find the label helpful.\nAnd there's a danger of not having an explanation at all, or of not having a way of identifying what are obviously considerable [00:06:00] needs for some people if we try to no longer apply a diagnosis. So, I would say, I don't know, honestly, what the best way forward is in terms of terminology. In recent review papers, my group have tended to revert to people who may have a diagnosis of personality disorder.\nIn inverted commas, purely because often if you're doing a literature research, that is the terminology that's used. So it seems a bit odd. We've always made sure that the term personality disorder appeared in the abstract, just to make the papers findable by. People looking with that label, but honestly, I'm not planning to come up with the answer to this, and I really hope that someone else or some other [00:07:00] group of people with the range of relevant skills will do so because I think it's quite hard.\nAndr\u00e9: So your talk at the conference is entitled, What does research tell us about how care and support for people with a personality disorder, uh, in inverted commas, diagnosis, can be achieved? So I suppose it's a summary in many ways of a lot of the reviews and a lot of the work, qualitative and other work you've done over the last sort of three or four years.\nUm, a lot of which has gone through the policy research unit program. Do you want to tell us a bit about some of the questions that you've been, trying to answer with that work?\nSonia: We were fortunate really with the commission for this in that people at NHS England, Viral Kantari in particular, who's no longer there, were really pushing for taking a pretty broad, um, view of this and trying to really [00:08:00] synthesize the evidence both on how people experience community care for people with a personality disorder diagnosis and how and what we know about what So we, we did quite a broad of reviews, so qualitative reviews about people's views and experiences of receiving care, and also about clinicians views and experiences, and we asked lots of questions about how things could be improved.\nWe also did quite a broad set of reviews, so qualitative reviews of the, about people's views and experiences, and we asked lots of questions about how things could be improved. qualitative literature reviews, metasyntheses of the worldwide literature on people's views and experiences. And we did quantitative reviews on what's known about outcomes for non pharmacological treatments for [00:09:00] complex emotional needs.\nWe did a big scoping review of that and Paul McCrone led a health economic review in that area. So we did a really broad set of reviews about what we know about care in the community for people with. This diagnosis, so with complex emotional needs, however, one describes this a student working with us at the same time did a review of guidance on what care should be like in the community for people with a personality disorder. And I guess there were some unsurprising but still very striking conclusions from all this.\nOne is that I think it's very difficult to overestimate the stigma and the really massive [00:10:00] inequalities that people who seek help and get a label of personality disorder often experience, particularly, when they're receiving care from generic mental health services, so outside the specialist personality disorder services, or indeed from medical services generally, clinicians who would never be rude about any other group of people with a mental health condition seem to feel able to be extraordinarily disparaging and dismissive, often directly to people.\nspecialist services clearly provide a better experience, but they're really small and often short term and, and very easy to get picked out of really if you don't play your cards right. So most [00:11:00] of the time people are in this generic system where pathways are extremely unclear and where you just have to keep your fingers crossed that you might bump into someone who's at all sympathetic to your needs.\nThat stigma is, uh, massive. challenge that needs urgently to be addressed in some way in order to be able to reform mental health care, because actually when you're supporting people with the mental health condition, thing that helps is quite obviously to be nice to them and to offer them Kindness and basic forms of support and that can fail all too often across the whole system, but I think much more for people with a personality disorder diagnosis, so they're not [00:12:00] encountering that sort of basic kindness.\nSo that's one obvious thing that needs fixing. The pathways through the system are often. and pretty unclear and inconsistent, really. It's apart from when people manage to get into these specialist services. There's often ambiguity about what services are meant for them and, and what are not and about. I think again, the more experiences of discontinuity of care than there are elsewhere.\nAnd, and when you look at the research evidence, so almost all the research is on. Psychotherapies that are mostly focused on reducing self harm or other impulsive behaviors with other things as secondary outcome [00:13:00] measures. And that is a reasonable body of evidence. there's a fair amount of consensus that most of the psychotherapies, at least on average, are similarly effective, probably.\nNo real basis for choosing between them. So, for instance, it's evident that some people do really value DBT and some really don't, and we don't have a sort of body of research that provides any kind of basis for deciding who will benefit from which in which situations.\nBut when you go beyond that kind of solid and fairly well established body of psychotherapy's literature, it's striking that there's It's practically nothing really so the literature on service delivery is minimal [00:14:00] on on water the sort of best models of care, using any kinds of methodology it's it's minimal.\nAnd that includes crisis care, where there's such massive concerns that people with a personality disorder diagnosis are in the wrong place when they turn up, for instance, in emergency departments. possibly also, some people feel they're in the wrong place, they turn up in crisis teams or in inpatient wards, but there is a minimal amount of research about what actually does work and not that much research about what the outcomes actually are.\nfor crisis care models, despite as a vast amount of concern on all sides really about those issues. There's also very little in the way of research that's focused on the social needs of people [00:15:00] with a personality disorder diagnosis or with similar needs. So it was striking in the interview study we did that people were saying, you know, Yes, psychotherapy can be helpful, but actually we could really do with this sort of consistent source of support from someone who we can check in with and who can help with daily needs, with social needs, with housing needs, managing social life, managing parenting, and often this is a group of people who, again, there's evidence have really difficult experiences of perinatal services, so A student working with me did a very good qualitative paper on experiences of perinatal care.\nAgain, seemed to strongly suggest that this is a group of people who have some of the worst experiences in perinatal settings and who are [00:16:00] almost assumed that they're not going to be okay as parents. from the beginning in some cases. there's not any sort of broader range of interventions literature.\nThere's not literature on service models, on social models, little on crisis care. Obviously these are things where we could do with more across the board, but there's still a striking inequality in what's available for regarding the needs of people with a personality disorder diagnosis.\nSo I guess that was the initial raft of reviews and explorations of people's experiences that we did as part of this commission within the Mental Health Policy Research Unit. Subsequently, I haven't had big grant funding for this, but some of the [00:17:00] people in the research group I work with have continued working on it, and I think two themes that to me are particularly important are things that we're continuing to work on.\nSo Sarah Iktabi is a really brilliant PhD student who's funded by the ESRC and has been working since her master's degree on loneliness. among people with a personality disorder diagnosis and she's published qualitative and quantitative literature reviews on this and she's hopefully soon going to publish Uh, fantastic qualitative study, one of the f
