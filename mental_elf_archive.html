questions related to how, we can use science perspectives to help, individuals with neurodevelopmental disorders and how in some ways this is stalled and I think what he's gonna talk about a little bit is these kind of traps that we can sometimes get into within disciplines, when we really can't step away from the definition of something.\nThis idea of domain hopping. So you hear about situations like the great physicists where they have taken [00:05:00] one set of ideas from one discipline and jumped it domain, hopped it into another. So I'm kind of interested in that talk, particularly because of the topic\nthinking about how you can kind of take tools that have been applied in one domain and use them in another, which I think is, useful for all of us as a thinking tool. And then in the middle of the day, we have, Juliette, foster and she has a huge portfolio and I'm really excited to hear what she's got to say about how students' mental health and how things have. Transform, particularly since Covid.\nStudents' perspectives and students' requirements are constantly changing and we have to think about that. And, I've really enjoyed my teaching and my time teaching undergraduate.\nI'm on a staff student liaison committee for my department anatomy. And I think this aspect is super important, as far as teaching is concerned, because when you read about pedagogy the dominant [00:06:00] thing is always like, curriculum design and blah, blah, and, Bloom's taxonomy.\nAnd so Bloom's did this taxonomy this cognitive taxonomy, but he also did, this descriptor on the effective domain and how we feel. These cognitive domains are clearly important and people have tended to focus on those.\nBut the effective domain is essential because it's only when you feel comfortable. Happy that you can really learn. So, I'm super interested to hear what Juliet has to say and digest that myself and think about it. So, those three plenaries, for me are exciting.\nThere's also this emphasis as well on open science, which I'm looking forward to in research integrity, as you mentioned earlier. These are really super important things, as an institution we, that we have to take seriously and move with the times. So I'm excited to hear, what Matt Grub has to say. I know Matt, very well, I teach with Matt, he's a pal. I'm [00:07:00] really interested to hear what he's got to say about this. And someone that I've only just got to know is Fran Dank, so working with her and CDI things, I've learned so much from her in those sessions. So she's received the Dean's Awards. The other is Raquel in Asta. And, the whole AI thing we just can't get away from it. Every morning I have my 15-year-old showing me the code report, by firestorm and various things. So. Are we looking at maybe in five years time that, the research festival, 50% of it will be AI based?\nI, I dunno, but it is, I am really interested to hear about how, we make decisions and how. Prescribing is gonna change. We see it already with the amalgamation of various health groups across communities, so surgeries and how in the GP [00:08:00] context that say for example, the provision and the prescribing of Methylphenidate, for example, for A DHD, how, how that is, has changed, is changing. I'm super interested to hear that talk. There's just a fantastic array going from molecules to, lived experience of trauma.\nAnd I, I think we're wearing for a great afternoon,\nAndr\u00e9: so you've spoken a bit about the festival as a kind of coming together of diverse. Groups and people, um, and obviously from diverse kind of disciplines within science and also about other things that, uh, happen at the institute, you know, that help do that, that help bring people together and broaden their horizons.\nAnd this idea of domain hopping when you were talking about Edmond's talk, I think is really interesting. I guess I'm reflecting on how mental health research funders are now really encouraging, not just lived experience, involvement and co-production in projects, but increasingly. Interdisciplinary collaboration and though, you know, looking for that as a requirement [00:09:00] and it feels like that's a, that's a departure from what mental health researchers are used to.\nI think many of us are used to multidisciplinary collaboration where we all sort of come together, but we sort of retain our own methods and processes. But obviously with interdisciplinary collaboration, you're really looking to, you know, choose the appropriate method to answer the question and then all use that method, all pile in together.\nAnd that obviously requires quite a lot of, you know, relinquishing of power.\nDarren Williams: Mm.\nAndr\u00e9: know, suddenly work with somebody who is in a field that I've never heard of before. You know, I'm a, I'm a psychiatrist and I'm working with a spatial scientist or a historian, or, you know, I'm, and I'm gonna. Work with their methods.\nYou know, some people love that because you know, they're learning something new and they're looking at their problem from a different perspective. Whereas other academics, I think they quite like being siloed, just going to their conferences and reading their journals and looking at their spreadsheet.\nIt's that personality type that's often drawn to [00:10:00] research. How is the university, do you think, supporting that and how do people need to kind of change culturally?\nDarren Williams: I think it's really challenging. But what is the motivation? I guess people want to get funded, and I mean that ultimately they want to continue their work. It may be the case that they have to approach things and think of things in a different way.\nWe put ourselves into silos, like you say, in that. We tend to speak to the same people. We tend to read the same journals. And the reason for that is not because we're not open-minded. I think it's just because of habit a lot of the time.\nBut also, to have these sort of IC projects where you know you have something that needs to be done, there needs to be a completion. And they can't just all like, span out like a rhizome, they tend to have to, come back in, in some way or form even if [00:11:00] your work is very exploratory. And not necessarily going in on a single target, which is often the case with the designing of therapeutics or thinking of in that way. I think for me, the times when I've been pushed outta my comfort zone mainly from collaborating with artists, and I've been lucky enough to do that through King's Cultural Institute. What kings have got various, pots of money to explore these types of, intersectional things taking the chance to do these slightly different activities, be they interactions with artists or. Public engagement while in participation, these things can help make you more supple in the way that you approach things. Sometimes we're not gonna be able to, suddenly transform ourselves, from approaching things in this [00:12:00] very reductionist simple approach to thinking about, differential equations and, dynamical models.\nIt's gonna be difficult to do something like that and then find ways of, transitioning and learning the language of another discipline. 'cause that's a little bit what it's like, you know, you have this communication thing between you and learning to not only take the different approach, but even just to be able to access the language of the other discipline.\nThere are opportunities for, fundings for doing things within the university that can at least help you, experience that, and then whether you can then go and it can help you in this domain hopping.\nI think it's a possibility . \nAndre: Big thanks to Darren for taking the time to join me for the podcast.\nIt was a great way for us to prepare for the IPPN Research Festival taking place on May 14th. Our Elf [00:13:00] correspondent Akhi Kakar will be reporting live from the conference at King's, and you can follow along on Blue Sky using the hashtag IPPN Festival. And don't forget the other episodes in this series, episode one featuring a conversation with Edmund Chinga bark talking about his multidisciplinary adventure in participatory translational science.\nAnd episode two, which delves into student mental health with Juliette Foster. You can listen to both of those wherever you get your podcasts. That's all for now. See you next time. "}, {"title": "Juliet Foster - The \u2018whole university\u2019 approach to mental health and well-being.", "date": "Fri, 02 May 2025 15:32:39 GMT", "year": 2025, "season": "17", "duration": "15:36", "description": "Welcome to episode 2 of the 2025 IoPPN Research Festival Podcast! In this episode, Andr\u00e9 from The Mental Elf speaks with Professor Juliet Foster, Professor of Social Psychology from the Institute of Psychiatry, Psychology and Neuroscience at King's College London, where she is also the Dean of Education and academic lead for student mental health and wellbeing. Juliet is giving a keynote talk at the upcoming IoPPN Research Festival.&nbsp; The conversation delves into the 'Whole University Approa", "url": "juliet-foster-the-whole-university-approach-to-mental-health", "transcript": "Juliet Foster, IoPPN Research Festival 2025\nAndr\u00e9 (2): [00:00:00] Hello? Hello, hello, it's Andre here from The Mental Elf. Welcome to episode two of the IoPPN Research Festival podcast. Professor Juliet Foster is one of the key speakers at the forthcoming \u200aIoPPN Research Festival, which takes place in London on Wednesday, the 14th of May. Her talk at the festival is entitled the Whole University Approach to Mental Health and Wellbeing, A Sociocultural Turn and a Research Challenge.\nUniversities are struggling to meet rising demand for support services. While there are multiple reasons for what the media refers to as a crisis in student mental health, there's an increasing recognition that any response should be grounded in a more settings based approach.\nIn this 15 minute conversation, Juliet and I discussed the whole university approach to mental health and wellbeing [00:01:00] for students and staff, which focuses not only on support services, but also on all other aspects of the university. Including teaching and learning and the wider social and physical environment.\nJuliet Foster: I'm Juliet Foster. I'm a professor of social psychology at the Institute of Psychiatry, Psychology and Neuroscience at Kings College London, where I'm also Dean of Education and I'm also academic lead for student mental health and wellbeing, for Kings.\nAndr\u00e9: We've been reading about this crisis in student mental health for quite some years now. Do you wanna start off just by kind of taking a step back and just framing for us what you think is going on in UK universities in terms of mental health for students right now?\nJuliet Foster: I do think, first of all, in any consideration of, of what's going on within universities in relation to mental health, we've got to try to unpack the data a little bit and try to understand what might actually be going on.\nThis is actually harder than some [00:02:00] people imagine because, a lot of the surveys that go out, you end up with quite a, a highly self-selective, sample. You're not necessarily getting a representative sample. We see massive over representation, for example, of female students. It can be really hard, to reach, male students, students from minoritized groups.\nSo we need to question the data a little bit to start off with, when we do that, my starting point is that I'm not sure that crisis is a particularly helpful term or even a particularly accurate term to use here. I'm absolutely not saying that there's not something going on that we need to understand, but I don't think the crisis narrative is particularly helpful. Historically, when you go back, several decades, in fact, you can still see this crisis narrative being used in our university. So, one of the fantastic academics we work with, within our group, is a historian, Sarah Crook, and she's actually looked at how this crisis narrative is being discussed in the kind of the post World War II, environment. There's this real concern over whether students are [00:03:00] sufficiently resilient, whether, universities are doing what they should be doing, whether we're getting the right students into university. All of these kind of debates you see surfacing, really getting on for a hundred years ago now.\nWhen you look at the data, it is quite clear now that there are more students who are disclosing a mental health problem when they apply to university. That's very clear from the data, but obviously there could be a number of different reasons for that.\nThat could be a good thing, right? It could be that actually students are, more comfortable with disclosing and they're recognizing the support that they're going to need. There's less stigma associated with mental health, issues. And so, it could be that those higher levels of disclosure are not necessarily anything, particularly sinister. The other two pieces of data that are important to look at are the demand for student support services. Now that absolutely has gone up. Everybody can see, that that's the case. But again, that could be because people are more comfortable than they were once were coming forward, and seeking that support as well. So we need to look. Really at the [00:04:00] population level, as much as we possibly can and try to find, as I say, surveys and attempts to measure what might be going on, not just within the student population, but within the wider population as well.\nThe good quality data on this does seem to suggest that there has been an increase, in reported, mental health problems. So, certainly if you look at longitudinal studies and if you look at work that aims, to compare university students with individuals at the same age but not at university then you do see this increase, in what might be referred to as psychiatric caseness or mental health problems. So what this does seem to suggest is, yes, there is something going on, that this is not necessarily, an issue purely within our universities, that actually this is something going on within wider society that actually we're seeing higher rates of mental health issues among our young people in general. In actual fact, some of the work that's looked at this suggests that university could even be more of a protective factor. So you see slightly lower, instance of mental health issues, among students than you do among matched age, [00:05:00] uh, university students. It's clearly something that we should be concerned about, and it's clearly something we need to address, but I think we need to be very careful around some of the crisis narrative. 'cause I don't think ultimately that's really helping us to answer any of the questions. And there's also a risk as well with some of that crisis narrative that it becomes, overly focused on the lack of, resilience or the narrative that you see around students being unable to cope, which I think is really unhelpful and we really need to move away from that.\nAndr\u00e9: So you talk about the whole university approach. Tell us what that phrase means.\nJuliet Foster: It's a settings based approach to thinking about mental health within universities, and it's an attempt to move away from thinking about, something. Within the individual, uh, and think purely about the support that we might provide for that particular individual to think about thinking about that kind of, just that whole kind of context that can have an impact on our mental health and wellbeing.\nSo it's not about saying that we don't need to think about the [00:06:00] support services that we provide. Students and also for staff, but it's also about recognizing that everything within that university environment, whether it's the physical environment, the social environment, the teaching and learning environment, all of these things can have an impact on our mental health.\nAnd that can be a positive impact or a negative, impact. And so it's about encouraging us to really take that seriously when we're thinking about our decisions within. Universities, just stopping and thinking about whether this is gonna have a negative impact on someone's wellbeing. If that is the case, then thinking about how maybe we can do things differently, but also thinking about how potentially the way that we, uh, structure our universities, structure our processes, structure our learning.\nWe can actually do that in ways that are going to promote better wellbeing. As well. So teaching and learning is a really good, example of this. it's the single point of contact that we have with all of our students is the curriculum. They're not necessarily going to take advantage of any other services, but actually they all come to university in order to get that degree right to undertake that course.\nand [00:07:00] so thinking about how we can structure our teaching, what we do in the classroom, how we can encourage interaction, how we interact with our students, ourselves, um, how we structure our assessments, all of these kind of things to really promote wellbeing. and certainly not to do anything that might be detrimental to students' wellbeing.\nIt's built on, on the idea of these. Effectively these five pillars as they're often referred to. So you have, support, which is still there around all these, this idea of these support services. you have live, which is taking into consideration the physical and the social, uh, environment, all aspects of that.\nYou have learn, where you start to think about all of the kind of the teaching assessment, that we do within, our universities. and you also have work, which is where we start to take into consideration staff wellbeing, uh, as well. And the important. Sort, structuring that, and all of that is effectively underpinned by what's often referred to as the kind of the more enabling factors.\nSo where you look at the processes, the procedures, the governance, that really kind of enables all of these other things, to hopefully focus on, on wellbeing in that particular way. It also [00:08:00] really importantly, moves away from more of a kind of a deficit model. So rather than assuming that if, somebody may not necessarily be thriving at university, rather than situating the problem.\nWithin that individual and seeing it as something which is, wrong in inverted commas with them. It's about saying, well, hang on. If we think about this entire environment, how are we thinking about changing and shifting the environment? So rather than, trying to ensure that individuals can fit into that environment, how do we change the environment so that all of our individuals can fit within that and thrive within it?\nAndr\u00e9: It's kind of like a public mental health approach. It reminds. Is we a bit of the kind of the experts in mental health calling on government to apply something similar across all government departments, the kind of mental health policy making.\nJuliet Foster: yeah. Absolutely. It, it's, it's about it, it's, it's about prevention, as you say. It's about public health. It's about, you know, yeah. That, that whole kind of settings based approach.\nAndr\u00e9: Can you talk a little bit about some of the practical things that have changed at King's? What, what you've implemented because of this new approach that has [00:09:00] changed? \nJuliet Foster: So I think one of the really important things, um, that we've worked really hard at, at Kings is to make sure that we're joining up research with our professional support services, it seems like. Such an obvious thing, but I think for a very long time in universities you would often have amazing academic research that was going on, uh, on young people's mental health, but it wouldn't necessarily link up to the actual support that was being provided for young people within that particular university.\nI think the other thing that. We've also seen, is an attempt to kind of join, join things up. Much more, at the level of the institution as well.\nSo we have a student mental health strategy. Um, we have a steering committee. We're bringing together researchers, um, academics students, and also professional service members to try to think about the direction of travel, for kings, more broadly.\nIn a big institution like King's, there's always a risk of, of siloing. You know, you have people kind of doing great things, but not always bringing it together. And so one of [00:10:00] the challenges that we've had, one of the purposes really of the steering committee was to try to bring all that together into, into, into one Strategy where we, where we really could consider the, the impact that we were having. So I think that's another thing that, that I think is working well. \nAndr\u00e9: So it strikes me that measurement is a key part of this. Yeah. So both our research studies measure the effect of interventions and as you say. Sometimes that might be quite a complex intervention, a system thing, but also how student wellbeing services measure their own work. how are we doing it improving the way we measure things in student mental health?\nJuliet Foster: The first problem I mentioned is the fact that there hasn't really been that much. uniformity is probably the wrong word. 'cause you wouldn't necessarily, we need to recognize that our universities across the UK are very different sorts of institutions and, and you need to, you know, recognize that diversity, but we haven't really had commonality, I'll say that, uh, in terms of how different universities are measuring their students', wellbeing. The other problem that we've, got, is that a lot of the measures [00:11:00] that that have been developed have been developed for clinical populations. So quite often you've got, measures being used in context for which they weren't really intended.\nand there is really a question over whether that's. That's appropriate, in a, a nonclinical university setting. and then the other problem, is that, getting a representative sample, is really difficult. if you put mental health in the title of anything. You know, there's a whole load of people who are just gonna delete that message without answering it.\nthere's always a risk that people who identify as having a mental health issue or who do have more of an interest are going to be the ones that are going to come forward. So that can really skew, skew your data. So what we really do need in our universities, is not total consensus, but greater agreement on the kinds of measures that we might be using here, because then that will start to allow us to compare a little bit across institutions.\nThe other thing that's really important in all of this is, is having longitudinal, data, particularly important in the kind of the post covid, , era as [00:12:00] well. , there's been some really good work done via. The student Mental Health research network to try to get a little bit more agreement on the kind of measures that can be used.\nUh, but you do need institutional backing as well. 'cause I mean, this, this takes resourcing, right. genuinely think we're probably in a better place in relation to thinking about measurement, than, than we were even, even five years ago. And as I say, that's, that's partly down to the real kind of commitment, of, a lot of, you know, amazing, amazing researchers doing really good things in this area.\nAndr\u00e9: And you mentioned that the Smart and Student Mental Health Network, byram led, um, which was based at Kings. I\nI see that Nicola has recently published a paper, which is calling for more research in this field and kind of highlighting the knowledge gaps that we have.\nWhat would you say are the kind of research priorities right now in the field?\nJuliet Foster: I think we have to grasp the nettle and get a proper grip on researching the whole university approach. It, it is really tricky because there's so many different factors you are talking about, um, the need to recognize the complexity, and the messiness of [00:13:00] all of this.\nBut I think at the moment that the issue is we're arguing for the importance of this, whole university approach from a theoretical point of view. and as I say, from a strategic point of view, I can completely, see why that is the way forward. but we don't have. A strong, evidence base for it as we really need at the moment.\nWe need to recognize, that we're gonna need some pretty big and pretty complicated research projects that are going to try to take, all of these different factors seriously, or at least if they're not able to look at all of them in the round to be able to, work together, to recognize that, you know, particular projects might need to look at particular areas, but we need to link together more, to really try to answer these questions, properly. I mean, it's one of the things that the legacy of Smarten has allowed us to do.\nWe've got great international work that's now going on, looking at what's going on in other universities and other countries as well. But we're only gonna start to chip away at this whole kind of question over developing the evidence base for, um, for the whole university approach if [00:14:00] we embrace the complexity, and if we work together.\nAndr\u00e9: I think the research festival is great because it gets such a diverse audience and I'm sure there'll be loads of people there who think they know a little bit about student mental health, being somebody who works in a university, why should they come and hear you speak?\nJuliet Foster: What I'm hoping people will get outta coming to my talk, is, an understanding of how the whole university approach offers us a different way of considering mental health within our universities. Not just for our students, but also, for our staff.\nMoving away from something which is more focused on the individual. Thinking about that broader environment. But I'm going to be certainly raising as many, questions, as I am providing, answers because it is complicated. And so hearing potentially from the range of perspectives, in the audience as well, whether it's staff, whether it's students, whether it's people who have different kinds of connections, with universities and different perspectives, is gonna be just as important for me as well.\nBig thanks to Juliet for taking the time to join me for the podcast. I'm looking forward to following her talk at the IoPPN [00:15:00] Research Festival on May 14th. Our Elf Correspondent Saakshi Kakar will be live reporting from the conference at Kings, and you can follow along on social media using the hashtag IoPPN festival.\nDon't forget the other podcasts in this series. Edmund Sonuga-Barke talking about his multidisciplinary adventure in participatory translational science, and the third and final podcast featuring Darren Williams talking about all of the amazing mental health science happening at Kings.\nThat's all for now. See you next time."}, {"title": "Edmund Sonuga-Barke: RE-STAR - multidisciplinary adventure in participatory translational science", "date": "Tue, 08 Apr 2025 10:00:10 GMT", "year": 2025, "season": "17", "duration": "16:34", "description": "Welcome to the 2025 IoPPN Research Festival Podcast! In this first episode, we hear from Professor Edmund Sonuga-Barke, a leading expert in developmental psychology at King\u2019s College London. He introduces RE-STAR\u2014a four-year, interdisciplinary research programme. RE-STAR stands for Regulating Emotions \u2013 Strengthening Adolescent Resilience. It focuses on neurodivergent young people, such as those with ADHD or autistic traits, who are at higher risk of developing depression during adolescence. Rig", "url": "edmund-sonuga-barke-re-star", "transcript": "#IOPPN 2025 - Edmund Sonuga-Barke\n[00:00:00] \nIntroduction and Guest Welcome\nDouglas Badenoch: As you know, here at the Mental Elf, we love research and we also love a festival. So when there's a research festival going on, you can count on us to be in amongst it. The Institute of Psychiatry, Psychology and Neuroscience's annual Research Festival takes place on Wednesday, 14th of May 2-5 PM The festival showcases research from across the IoPPN at King's College London.\nThere's a rich feast of talks across a whole spectrum of topics, including autism, neuroinflammation, ai, research integrity, health inequities, and open science. One of the three keynotes will be given by Professor Edmund Sonuga-Barke. He'll be talking about RE-STAR a multidisciplinary adventure in [00:01:00] participatory translational science.\nI sat down with him for a quick chat to preview his talk.\nThe Intriguing Title: ReSTAR\nDouglas Badenoch: That's an intriguing title. And the thing I'm drawn to most of all is the word adventure, for some reason. Which suggests to me fun and unexpected things.\nDo you want to talk a little bit about the fun and unexpected things that you've you've been encountering so far? \nEdmund Sonuga-Barke: Yeah, absolutely. No, so The words chosen very carefully I hadn't thought of fun and expected things specifically, but it's certainly been a fascinating journey that we've been on.\nJust to give a bit of context, if that's okay to some of the other words in the title. So I'm a scientist, I'm not a clinician. My work's focused really in the field of neurodevelopmental conditions. And our goal really as scientists is to develop new interventions. So fundamentally what we're doing is translational. Sometimes we forget that or we lose sight of that a little bit because we get so engaged with the research we're doing, it's so interesting and exciting to just understand stuff. But if that understanding doesn't lead to improvements in the lives of people with neurodevelopmental conditions or mental health conditions, whatever, then we're not doing our job.\nBut \nThe Paradox of Translational Science\nEdmund Sonuga-Barke: We have made incredible progress in the science and understanding the nature of neurodevelopmental [00:02:00] conditions like ADHD or autism.\nHowever, we appear to be further away our goal of translatable science that's going to change people's lives than we were when we set off on the journey. Science has shown us how windy that path is to that goal of translational science, much more complex than we thought the conditions are much more heterogeneous than we thought.\nSo, we are thinking about why that might be the case. And to do that, we are thinking about, what is scientific progress in, say, translational areas like ours, practical sciences like ours? How does science move on? How does it progress? And, of course, \nPhilosophy of Science and Paradigms\nEdmund Sonuga-Barke: At least, some people have said we're not making progress because, our studies are too small, big data is a solution, or not making progress because the findings aren't replicable. So better science, better methods, more honest reporting, more transparency is the solution.\nOther people have said, well, we're just waiting for that next technological breakthrough. And then we're going to start making translational progress. And it could all be true. [00:03:00] And they're probably, they're not mutually exclusive. And there could be a truth to all of them. But maybe we just need to think about things in a different way.\n And \nParadigm Flipping in Neurodevelopmental Research\nEdmund Sonuga-Barke: So, so yeah, so \nThe Shift to a Neurodiversity Model\nEdmund Sonuga-Barke: the flip is basically from the disorder model dysfunction model to a neurodiversity model. we didn't realize that what we were going to do actually, to be honest, when we got the, when we put in for the grant funding, we thought we're going to do a kind of standard normal science, let's look at emotional dysregulation in our kids because we know that's a possible mechanism that we're interested in. \nMultidisciplinary and Participatory Approach\nEdmund Sonuga-Barke: we were forced by the funders to make this multidisciplinary and to make this participatory. And I've never really done anything like that before. So that was great because those debates and discussions we'd had with our colleagues from completely different  intellectual disciplines. So we're working with people in the humanities and the arts, people with a very non disorder focused approach to, autism and ADHD, as well as the young people, with autism and ADHD and those discussions and debates, if you engage in them in a wholehearted way, and you really take them seriously, they actually fundamentally change the way you're looking at stuff, or at least they offer an [00:04:00] alternative paradigm.\nAnd so that's where the flip from the disorder model -so the flip has occurred during the RE-STAR program. And so those kind of multidisciplinary discussions, the participation of the young people, and we, and they really are embedded in the study. So it's not an arm's length engagement from our, we call them the YRAPers, Youth Researcher Panel.\nSo those YRAPers are right at the center of all the discussions still after three and a half years. \nDouglas Badenoch: So that's fascinating that The funding experience, was instrumental in bringing about this new way of working. \nEdmund Sonuga-Barke: I would grudgingly say that is absolutely true.\nDouglas Badenoch: Well, I'm sure it wouldn't have happened without you. \nEdmund Sonuga-Barke: No. No, but it's absolutely true. And the encouragement for us to really be participatory, and really be multidisciplinary, and really take it seriously. Because that's a lot, that is a big ask actually, to do it seriously. \nDouglas Badenoch: I was going to ask you about that as a researcher, that must have been quite a challenging process to go through. What was that like for you and your team? \nChallenges and Tensions in Multidisciplinary Research\nEdmund Sonuga-Barke: Yeah, it's been fascinating. We're still friends so that's a big plus, but they're not saying there haven't been moments of [00:05:00] tension. The problem, everybody talks about multidisciplinary research, everybody talks about participatory research, but actually if you you really engage in a, in an open armed way, it's a potentially quite a stressful process because you're being challenged all the time and they're being challenged all the time. Even terms like intervention, we had a completely different view of what an intervention was. I was like, from a clinical perspective, you do this, you do try and change this. My colleague, Sylvan Baker, from the Central School of Speech and Drama, who's deputy on the project, his notion of intervention was something to do with performative action.\nSo just even agreeing them terms. Well, it really provokes a different perspective on stuff. So, the first step was to say, we've really got to take these young people seriously.\n then talking to the young people and hearing that they're saying, well, actually, okay, I, I realize I'm different, but that isn't my main problem. My main problem is, the fact that I experience, for instance, more stresses in the environment than other people. So yeah that, that process, incredibly creative, that I was saying is an adventure.\n[00:06:00] Adventure is a little bit of a euphemism because I'd say there were times when there were tensions as well as excitement. But, through that furnace, we produced a beautiful product in a way. So, obviously, it was not easily won, but it's been incredibly important and very happy we decided to take it on head on and really develop some new ways of thinking about stuff.\nDouglas Badenoch: Yeah. \nTrust and Scaffolding in Research\nDouglas Badenoch: I think this is probably where having a bit of trust in the process comes in as well, doesn't it? A lot of the stuff that you've written about it quite often talks about scaffolding, having the right scaffolding in place to support the process, but I wondered if you could give me an idea of what that means. \nEdmund Sonuga-Barke: Gosh, that's a really good point. So it varies obviously with colleagues, from, whatever background. We actually did do not formal team building, but we did all go for a dance at the blues kitchen, in London. I'm a big soul music fan, so I, it was my playlist, so I was, as the PI, I thought that's the best. But, so those sorts of things, you develop a sense of trust and affection for your colleagues, and that's really important in the process. And so people have to feel open and [00:07:00] honest enough to say, yeah, I'm not comfortable with this.\n Actually, let's take it offline and discuss it again and then come to an agreement, bring it back online and things like that. And that's it's time consuming and it takes a lot of emotional resources, but it's worth it. With the young people, of course, it's different and particularly people who are potentially a little bit vulnerable, the young people with autism, ADHD, obviously there's a big duty of care there, it's a massive commitment from them, and we are very well aware of that, and they have been absolutely extraordinary in terms of what they've given to the project.\nObviously, they've been very central to knowledge exchange for the project, so they've done some really amazing creative stuff, and I hope they feel they've benefited from that. we share the stage very often at scientific meetings, but also kind of other meetings. So we did a kind of arts festival for the UK. That's it. Being human. Yeah. So we did a big thing on that, and they took the lead on that, and so we really encouraged them to take the lead. So hopefully they get benefit, but at the same time, we are very well aware that process has to be very gradual, so there was an enormous lead in.\nSo initially they played a much more [00:08:00] standard advisory role, but gradually, partly at their request, but partly because we were seeing if we're going to do this properly, we need to get them at the heart of the research and we scaffold them and supported them giving them the skills and the confidence to contribute new ideas, new perspectives, they're involved in data collection, both interviews, but also actually things like electrophysiology and stuff like that. So we've given them a lot of skills, hopefully they see the benefit of that. And we certainly do. And so I think no, it's been a real adventure.\nOur main task is to try first of all to understand why adolescents in particular with autism and ADHD, are more prone to becoming depressed. Our observations, working with the young people, is that part of the reason for this, is that young people are exposed to about twice as many upsetting experiences each day in school than neurotypical people they experience them about [00:09:00] twice as intensely. So both of those things are really important to understand . \nEmotional Burden Concept\nEdmund Sonuga-Barke: And from that, we've developed this new concept that we call emotional burden. And that by multiplying the frequency of these exposures to upsetting things the intensity with which they're experienced, multiply those together, we get our measure of emotional burden. And the emotional burden in the autistic and ADHD people is about twice, as I say of the neurotypicals. And people with ADHD and people with autism, they have similar levels of emotional burden induced at school overall, which is very interesting, twice as much as neurotypical people. But the actual triggers for that emotional burden is different, not surprisingly, in autistic people and ADHD people.\nBut you can see the focus we've got is on the experiences and how the people feel them or experience them react to them emotionally. And so, obviously [00:10:00] once you've made that flip in terms of your model, rather than focusing on emotional dysregulation, you're saying actually, emotional burden, not emotional dysregulation, could be the key, and  then obviously the logical thing translationally, if you flip your translational paradigm, is not to focus on, fixing emotional dysregulation. It's to reduce emotional burden.\n And so \nDeveloping School-Based Interventions\nEdmund Sonuga-Barke: And so what we're doing is we're trying to develop a school based intervention that works to reduce exposure to upsetting events by changing the environment, working with teachers and obviously pupils themselves, as well as school management and all that level of authority, but also help the young people themselves manage that process of being upset more effectively so it doesn't have longer term consequences.\nSo it's going to be a whole school intervention. So we're not focusing specifically on neurodivergent people. That was a strong message in the study.\nWhile they wanted, neurodiversity, neurodivergence to be part of the [00:11:00] intervention, they didn't want to say, here we are, we've got ADHD people here. Let's focus on them. Because they don't want no victims. They don't want to be enough stigmatization, so we've got a whole school that, that creates challenges.\nCause obviously the messages have to be relevant for everybody and also probably beneficial for everybody. \nThe other decisions are that we're probably because it has to be a scalable, we're probably, \nDigital Pathways and Whole School Interventions\nEdmund Sonuga-Barke: we're almost certainly going down a digital pathway. So we'll develop a digital platform, for information, strategies tips, tricks, examples, solutions. We're still deciding on the mix almost certainly digital, and  so you can directly target the teachers to change and other pupils to change the emotional atmosphere within the classroom help the teachers scaffold, just use the term again, the emotional responses of the young people.\nand help them to, for instance, anticipate emotional triggers, an upsetting event, to better manage their response to them, and to recover from them more effectively . \n The long term consequences to try and reduce that rumination and the emotional burden that [00:12:00] comes out of that process. So, yeah, so that's where we're at. And we're right in the middle of identifying the functions that we want to address.\nWe want to change school culture in terms of very much the notion that everybody's in it together. Everybody carries emotional burden. But a lot of it is masked. Or camouflaged. And that doesn't just mean neurodivergent people. That's pretty much everyone. And of course they bring it from outside school.\nSo one of the things we're thinking about, obviously working with artists, animators and so forth, or actors, is the notion of carrying in your school pack, as well as your books and your pencils. \nA kind of a burden. That people can't see. Yeah. So it's getting people thinking about their emotional responses, other people's emotional responses, how they may differ from theirs.\nWe don't really care. We just want to identify the functions and then we want to address them as effective as we can in a way that is scalable, relatively light touch, but we do believe that scale can have a large effect on cutting the risk of poor mental health, particularly, hopefully, [00:13:00] in neurodivergent people, but, if it does it for everybody else, even better.\nThe teachers have an awful lot of emotional burden too. That's another thing we've really realized from talking to the teachers. And so we're hoping it will also help the teachers too. It's a tough old job at the moment, being a teacher.\nDouglas Badenoch: And \nArts Practice in Interventions\nDouglas Badenoch: is this where the kind of benefit of the arts practice comes in?\nThat's another one. Translating those, it's a way of getting something, an understanding across without having to spell it out in big long words sort of thing, in a more meaningful way. \nEdmun ah, we're in the fourth year, funding is coming to an end, but there are so many leads that have come out of the study that it's a matter of trying to focus our next step where we're looking for funding some of these individual leads, whether it's methodological, whether it's clinical intervention, or whether it's actually developed, we've developed new hypotheses, say a map, the concept of emotional burden. When we talk about emotional burden to everybody thinks, yeah, what a great concept.\nWhy didn't somebody think of that before? Particularly if they're neurodivergent, because it really chimes with their experiences. \nBut yeah, so yeah, if people want to get involved, then you should just contact me. We're very collaborative. And we brought people on who were. Very generously wanted to be involved when they heard about what we were doing, even though they weren't part of the initial grant or anything like that.\nSo we've  \nDouglas Badenoch: Well, \nConclusion and Final Thoughts\nDouglas Badenoch: I'm sure there'll be a lot of interest in your talk at the festival. So I hope people can follow along then, but thank you so much for giving the time up this morning to just provide a bit of detail on the background. I really look forward to hearing more. \nEdmund Sonuga-Barke: Oh, it's been great fun. Thanks, Douglas.\nProfessor Edmund [00:16:00] Sonuga Barke will be talking about RE-STAR a multidisciplinary adventure in participatory translational science at the research festival at the IoPPN on the 14th of May. If you want to attend, follow the link in the description to the EventBrite page.\nThe Mental Elf will be following on the day. Of course, if you tune into our account on BlueSky, and follow the hashtag #IoPPNfestival, we'll keep you right up to date with all of the talks. Look forward to seeing you then. Bye-bye. "}, {"title": "Rob Waller: Using routine clinical data to support mental health research", "date": "Mon, 04 Nov 2024 17:07:43 GMT", "year": 2024, nt on the one hand and treatment on the other. So you could try to say, Well, enhancement is the sort of thing where, you know, I'll walk into a practitioner that is outside the mainstream medical establishment.\nI'm looking to grow in a range of different ways, [00:04:00] physically, psychologically, spiritually, and I can grow by maybe doing meditation, uh, maybe I'll take a drug, uh, et cetera. And the NHS won't pay for that, right? Because that is above and beyond. Illness. Treatment, on the other hand, the NHS will pay for, because that is simply going into the standard medical services, uh, getting a drug, and then feeling that you're having your illness cured.\nBut the whole range of other examples, other than fluoxetine, where that bright line is a little more difficult. Uh, maternity care, for example, uh, when you're having a baby, um, certainly if you need a cesarean because, uh, the baby is stuck coming out, that is a medical life saving intervention. Uh, but what about all the stuff about being taught how to have the baby more easily, how to remain calm during the birth, um, Building the relationship between the partners prior to the birth, [00:05:00] that starts to move over into the area of enhancement.\nUh, should the NHS be paying for prenatal birth classes? I think it's, it's open for discussion and debate.\nAndr\u00e9: I'm trying to get my head around where this kind of cosmetic psychopharmacology sits within our system We've got our health system where we're prescribed psychiatric drugs.\nWe've got our illicit system Well, you know, students might buy Adderall off the internet or people might be microdosing psychedelics or whatever. That may be legal, it may be illegal, depending on different countries. But then we've also got this space that you're talking about, which is a kind of legal, regulated, I presume, cosmetic psychopharmacology space.\nAnd I'm not sure I understand what that is. Can you give us some examples of that?\nDan: Yeah, actual 0] Hello, hello, hello. Welcome Big Spudders to episode four of the 2024 Big Spud Podcast featuring Anthony Bateman. I'm Andre from The Mental Health and I'm delighted to be working again with the wonderful Big Spud people this year on their 25th anniversary conference which is taking place in Belfast.\nBig Spud is the organisation for people living with. and working with the difficulties often described as personality disorder. In this fourth podcast episode, we hear from Anthony Bateman, a visiting professor at UCL and consultant at the Anna Freud Center, as he discusses the concept of mentalizing and its importance in understanding human behavior and mental states.\nHe delves into the history and effectiveness of [00:01:00] mentalisation based treatment, particularly in addressing borderline personality disorder and trauma. And he also explores the adaptability of MBT across various mental health disorders and emphasises the importance of monitoring and tailoring treatment to individual needs.\nThe discussion ends with Anthony's reflections on the ongoing debate regarding the classification of personality disorders and the significance of considering personality in treatment outcomes.\nAnthony Bateman: I'm Anthony Bateman and I'm, uh, currently, uh, work at, uh, uh, UCL University College, London as a visiting professor and also consult to the Anna Freud Center in London, uh, now, um, but as I got older, I've, uh, left the NHS where I worked all my life, working life, um, uh, and worked, uh, on, uh, uh, uh, in a treatment system for people with personality disorder as, uh, labeled at that time\nAndr\u00e9 Tomlin: I'm going to start off by asking you a, um, a blunt question. Um, we've got a lot of language in mental health, haven't we?\nThat isn't necessarily that accessible. And in your field, we've got this word mentalizing. So what, what is mentalizing\nAnthony Bateman: Yeah. It's a terrible word, of course, [00:02:00] because it sounds rather harsh and it's rather hard and it sounds incredibly, um, uh, sort of, um, uh, scientific, you know, metalizing nobody knows what it is, you know? So therefore it's, uh, uh, Um, great for us scientists. You know, we can pretend we have greater knowledge than everybody else in a way, but actually it was a term that was in the literature.\nIt wasn't our term and and the important bit is it's got mental in it. In a sense, it's mind. Um, and the focus we started out with, you know, many, many years ago was that, um, the human beings are incredibly good at understanding people's sort of behaviors or what they do or why they do it. And they understand that really by appraising people's mental states, you know, what's behind it.\nYou know, so when someone says something, there's a mental state behind it, you know, there's something in their mind. So, you know, Behind it, an aim or they want to express something and so on. And we're incredibly good at reading that we naturally do it. Uh, and we naturally read each other incredibly well.[00:03:00] \nAnd in order to do that. We basically automatically appraise people's mental states in our interactions, and this is what mentalizing is. It's actually recognizing that people's behaviors, and that would include what they say, for example, um, is actually driven by underlying mental states. And we're very good at picking that up.\nAnd that's what mentalizing is.\nAndr\u00e9 Tomlin: and how do we learn that? Is that something that develops very early on? At what point do we become good at mentalizing?\nAnthony Bateman: We become, um, uh, good at mentalizing across time. So it's a developmental sort of milestone phenomenon. And, um, we, um, generally, um, Just at the bottom line, actually learn about mentalizing and perspective taking so, you know, I can see your perspective because I can sort of see where you're coming from, for example, and I hope you might try to see my perspective, see where I'm coming from.\nAnd when we gain that from our relationships with our families, with our teachers and so on, as we develop, and really, we made a case for mentalizing as a developmental [00:04:00] process as being rooted in attachment. Originally, and, um, so, um, uh, a secure attachment, if you like, um, would actually lead to robust and effective mentalizing.\nSo people with secure attachments actually have cognitive advantage. They have emotional advantage and so on in terms of reading others, interacting with others and so on, uh, because, because they're good at mentalizing.\nAndr\u00e9 Tomlin: And it's in the front of my mind this morning because we've just blogged about one of the new um, Edmund Shinuga Bach studies on the era study, the Romanian orphans, um, that came over during the Ceausescu era. So I suppose they're a really good example of that group of early childhood deprivation. early trauma, you know, being left in their cots for the first few months of their lives.\nPresumably that has a really negative impact on their ability to do this\nAnthony Bateman: Absolutely. Absolutely. Yeah. Massive. Um, a negative effect. Um, and what we interestingly, what we know from those studies to some degree is that it can be reversed. So even though that, um, it's, um, uh, the trauma actually, um, creates [00:05:00] mentalizing problems of self, you know, reading oneself, you know, how do I feel?\nIs a mentalizing issue about oneself. What's my feeling state? Do I feel angry? Do I feel upset? Do I feel hurt? You know, do I feel um, uh, uh, uh, uh, happy? You know, and so on. And many, many people don't really know how they feel, so they're not very good at, um, being able to access their own mind states, really, uh, and so on.\nSo what we know is that it can actually be reversed, and there were some, um, supermoms In those studies, you know, that they, they were kind of really good and I think they were probably mentalizing super mobs, basically, you know, they were able to actually capture the detail of the child's mental states and express them and see them and respond to them in a way that was congruent and when it's congruent, the individual feels to understood.\nAndr\u00e9 Tomlin: And i'm just interested before we move on to talk about the treatment and a lot of your other work in research My sense is that some people have the ability to see this stuff in other [00:06:00] people, they pick up these, these, these states. They understand what people are thinking behind their words, but they don't have it towards themselves.\nIs that kind of ability that's outward facing but not inward facing common?\nAnthony Bateman: Absolutely. Uh, and it's quite common and it's quite common in what was, is, uh, called borderline personality disorder and also in trauma. So they're able and, , have to, uh, read others mental states, , as best they can. And they're very sensitive to them, for example, and they overdo it and it's to the detriment of their own.\nSo that's the. Beauty of mentalizing, if you see what I mean, that, that, that actually you can start working out with any individual where they're really good at it, maybe too good at it sometimes, you know, overdo it and wish you're implying that somebody might spend too much of their time directing their minds of understanding others.\nYou know, they're too forgiving, they're too tolerant, so instead of standing up for themselves. And at that point, they of course are [00:07:00] vulnerable, because they can be exploited, you know, they don't know how they feel themselves, they can't stand up for themselves, they don't know their own states of mind, and so on.\nSo that's the sort of importance of mentalizing and MBT is actually your job is to appraise their mentalizing capacities of self, of other, of other, about self and so on. So we have a sort of detailed mentalizing appraisal. Yeah.\nAndr\u00e9 Tomlin: MBT, mentalisation based treatment, yeah, tell us a bit about the story of that. How did that come about?\nAnthony Bateman: Wel hat seemed to be helpful to this group of people. So, for example, we, um, monitored, we, we had some groups, so we put them in some group work and, um, we, um, Got them to agree to record those, and we asked them what was helpful, what they found useful about it, what made them anxious about it, and so on, and we tried to increase the things they found useful, decrease the things they found, uh, that made them anxious, and so, and one thing that they were very keen about was, um, uh, , um, everybody focusing on their behaviors and telling them to stop it. but yeah, they couldn't stop it, you know, they, you know, they [00:10:00] cut themselves or they would, um, uh, blow up and sort of insult people or, you know, whatever it was, and they, they couldn't just stop it. Um, and what they found really useful was a sense that somebody was trying to understand them. And this is where mentalizing came in. So the sense that somebody was attempting to see things from your point of view was incredibly soothing to them. So we began to focus more on that, and we widened that into the group, so our focus in the group was each of us had to try and understand things from each other's perspective, And we also had to learn to express our own perspective. That was the basic two things. So that's how it was built. and we then worked out what might increase the stability of someone's mentalizing. So it was theoretical at first that your impulsivity, your, um, um, uh, relational sort of problems, um, your emotional, Sort of regulation problems were actually [00:11:00] a result of a failure in mentalizing a vulnerability rather than the failure that your vulnerabilities So you couldn't actually manage your states of mind.\nAndr\u00e9 Tomlin: And I guess any intervention that is effective and works really well for people. doesn't work for everyone and maybe isn't actually, maybe it's harmful for some people.\nAnthony Bateman: Yeah. Yeah. Yeah.\nAndr\u00e9 Tomlin: we, we now know, you kno eir sort of mentalizing abilities and what they're like and so on about themselves. Uh, about others and about their capacities to build shared mental states with other people.\nSo it's really important. It's what we call in MBT, I mode, me mode, we mode. So, mentalizing in I mode, in general, is about self experience. what do I feel? Who am I? What am I? Do I have an existence as a person, you know, which is continuous across time that sort of sense. So I wake up in the morning and I'm Anthony Bateman.\nI'm not thinking who the hell am I? I have an internal experience. If I'm quite good at monitoring myself, I can know that I might be a bit vulnerable at the moment because of my current circumstances, so I can be a bit more careful about how I am or how I am with others and so on, you know, so this is I mode sort of function and in the [00:14:00] main, it's not a referential to others. So, you know, Andre got up this morning, you were Andre, you didn't have to reference yourself in some way. But then, we can actually reference our experience, and that's MIMO. So we're then reading others, and reading how others experience us. So, we read others, and that may have nothing to do with us. Just their, how they are, what their mind is like, how it seems to function and how it's functioning at the moment and things, but then it could also be referential.\nSo how they're thinking and responding to us. Is it accurately and is it smooth? And so on. And that's good. Me mode functioning. So we walk along the street and we're talking with someone and he goes A to and fro a serve and return, a back and forth and so on. And it's comfortable and we don't worry about it.\nAnd then somebody says something and we say. What made you say that? [00:15:00] Because we suddenly think, oh, that doesn't make sense to me. Why on earth did you say that? So we asked them and they tell us generally, and then we carry on. So, you know, hiccups are easy to deal with and we move on. This is me mode sort of function.\nBut at the same time, we now know that human beings are incredibly good at creating we mode function. And we mode function is actually, let's take two people, but it could be more actually. Um, experience a sense that the other person recognizes my current mental states. And not only that, I recognize them as recognizing it.\nAnd I also recognize that they realize I understand theirs. we're both basically recognizing that we recognize each other. And when that happens, we, it's, it's called we mode mentalizing. We create a third. So the two of us [00:16:00] can now look at something else.\nOkay. And, and it can work really well, of course, um, if we know each other's roles and so on, and that's what teams do. So if you're the crash team in the hospital, I know if I put my hand out, Andre knows exactly what I would do. Need at a particular point, if you sort of mean, um, because I have a role, they understand my role.\nI know their role and they know I understand their role and so on. So we work jointly to save the client sort of thing. This is we mode function, but that's at a very behavioral level, but a mental level. We recognize. Intimacy.\nAndr\u00e9 Tomlin: So what gets in the way of that? I'm really interested in traits or types of behavior that prevent people from being helped by MBT. Do we know, are there groups of people, you know, does loneliness get in the way? Does trauma get in the way? What gets in the way of this?\nAnthony Bateman: Loneliness doesn't get in the way. And I think loneliness is one of the core elements of borderline function. I will talk about that to some degree because I think it's neglected. And loneliness, [00:17:00] in a way, is the absence of we mode because you actually don't have someone. Or Easily generate with people a sense.\nThey understand you. You understand them. You recognize them understanding you and they recognize you understanding them, which is the sort of joining up and the intimacy. And without h, uh, experienced, um, alone. \nSo, um, uh, and something can be made less traumatic if you like, if, um, the experience actually can be referenced. So the response to the trauma is incredibly important. You know, not blaming the individual, for example, listening to them, believing them, um, and talking with them and whatever, and so on, rather than saying, don't use, make those things up and those sorts of things.\nAndr\u00e9 Tomlin: And so MBT do you do it differently if somebody has a particularly severe traumatic episode.\nAnthony Bateman: Well, we, we do exactly the same in terms of, um, uh, appraising mentalizing capacities and where they might be disrupted, or they may be vulnerable. And of course, to some degree, trauma in the sense of being experienced, those events being experienced alone and [00:20:00] outside with no attachment, sort of, um, moderation process, um, leads to a strong level of internal shame.\nFor example, an experience they can't really describe, but it's probably shame, but they can't describe it, but it's disgust, bodily disgust, and so on. Um, we appraise their, um, uh, uh, uh, mentalizing capacities, and, At the same time, what we do is actually ask them to identify trauma episodes. Now in MBT, we do something that we're studying at the moment.\nWe then place them in a group of people who've experienced trauma. So it's not done individually. What we're trying to do is not use exposure, which is the commonest treatment for trauma, really, um, is to actually, uh, increase the self reference of the, the referential components, the social referencing of the trauma, if that makes sense, because they do a lot of avoidance.\nThey do a lot of isolation. They do a lot of [00:21:00] closing down and so on. So we want it to become socially referenced. To be processed and that is mentalizing the trauma. So what we do is, um, uh, and we're studying this at the moment. We've got two projects about to start is they're coming to a group having identified trauma.\nThey then work for a number of sessions in generating the group relationships, really just talking with each other, not about the trauma, just talking with each other. What they're like and so on. And we asked them to present themselves in various ways, but we've done a little bit of individual sessions around that so that they're rehearsed, if you like. Then we come to the second phase where they actually are going to present their trauma experience. To the others in the group, and that is, um, uh, organized. So, um, they have, um, a group to do that in. Okay. And that's their group, uh, and so on. And then next week, someone else, that's their group and so on. So we set up a timetable.\nWe asked them to all agree that they will be [00:22:00] there at every session so that they don't not come to someone's presentation, but then we structure the presentation and we structure the responsiveness of the others, and we actually structure it around trying to get social referencing to the trauma. So now I've expressed my trauma.\nHow do you see me? because most people experiencing trauma, um, experience others as seeing them as shameful and disgusting and awful and so on. Um, and of course, actually they don't. So you're trying to get them to actually, um, re experience the sort of social referencing system. So we go around and we have six patients in the group, they each do it and then they go around and do it again. so we've kind of organized the system. But it's to do with actually social referencing rather than exposure of the trauma and reliving and managing the anxiety associated with the trauma or the dissociation, and Whether this is effective, um, uh, our pilots showed that it was, it was certainly [00:23:00] acceptable to patients, it was certainly feasible to implement, and so on, and that's why we're now doing, uh, research studies.\nAndr\u00e9 Tomlin: You're doing a randomized trial of that.\nAnthony Bateman: Yeah. Yeah.  \nAndr\u00e9 Tomlin: s, complex trauma.\nWhat do you think? Is this an important debate? Should we be really focusing on this now?\nAnthony Bateman: well, I suppose the bit that I worry about is why can't we have a personality? I mean, whether we have a disordered, you know, uh, yeah. I'm not so bothered about, but, but personality, we do have personalities and it can sometimes be sort of outta balance really, you know? Parts of our personality are over, um, used, uh, and underused , so I'm quite keen that we do actually take account of people's personalities.\nYeah, I think it, it affects treatments. You know, and we tend to think that, um, you know, um, uh, you know, treatments for depression sometimes don't really work very well, but nobody's actually looked at the personalities of the people being treated. And it's maybe that actually it's not really working very well for a large swathe of people because of their personality function. And so I'm pretty, I'm pretty keen to continue to [00:26:00] have at least a personality around the place.\nAndr\u00e9 Tomlin: And I suppose, then, if you take that to the next step, you would want to, in some way, classify different personality types without necessarily stigmatising by using this disorder label.\nAnthony Bateman: Yeah, you can have it as a dimensional sort of system. And that's what we're keen on because mentalizing is a dimensional system, it's not. Categorical system, you know, it's it's more or less good at. So if you take self if you take other you take we mode mentalizing and so on. It's a dimensional capacity.\nIt's not just a deficit. You haven't got it or something. It's you know, it's a kind of getting wrong in certain contexts or you know, it doesn't work in other contexts or you neglect your own. Self experience and over focus on others experience, so you're always trying to please people, for example, and that makes you very vulnerable, and so on, you know, and things like that, so, you know, um, appraising, you know, those capacities in a dimensional system.\nAndr\u00e9 Tomlin: I'm interested in you sending out a message to the people who are going to be at that big spud conference why should they come and listen to you talk?\nAnthony Bateman: What I'll try to talk to some degree about is using [00:27:00] mentalizing in your general sort of working with people with personality areas, complex trauma and so on, and I'll try to go through that and also, um, show some evidence, uh, for, you know, why it works or why it might work or what you can focus on more or focus on less and things like that.\nSo I will try to go through some of that. So particularly for antisocial. Borderline functioning, narcissistic functioning, all of which we've got some level of studies on, uh, as well.\nAndr\u00e9 Tomlin: Big thanks to Anthony for taking the time to record the podcast with me. His talk on mentalising and MBT is bound to draw a big crowd in Belfast. And don't forget, you can follow along on social media by searching for the hashtag BigSpud24. And that's it for this episode. I hope you found it interesting and thought provoking.\nWe've got more podcasts and video interviews about personality disorders coming soon. So look out for those later this month. And you can find out more about BigSpud, that's the [00:28:00] British and Irish group for the study of personality disorders, and their annual conference at bigspud. org. uk. This is Andre, signing off.\nSee you again soon! "}, {"title": "Mel Ball - The Wind and the Sun: A Fable of Lived Experience Leadership", "date": "Mon, 10 Jun 2024 16:04:04 GMT", "year": 2024, "season": "15", "duration": "21:50", "description": "In this episode of the BIGSPD Podcast, host Andr\u00e9 interviews Mel Ball, the first board-level Director for Lived Experience in the NHS. Mel shares her journey from grassroots peer support to her current leadership role, highlighting the importance of lived experience in transforming NHS services. She discusses the cultural cha
