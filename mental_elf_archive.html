ersonality disorder, but they can get sick too and have lots of other.\nThings, depression, low mood, suicidal ideation, whatever it might be. It is not there be all and end all that exclusively all that will ever be the matter is personality disorder.\nAndr\u00e9: You've recently published a paper, Gavin, that looks at mental health laws across [00:15:00] countries.\nSo in your opinion, is there anywhere in the world that's doing this kind of stuff, this mental capacity, compulsory treatment, really well?\nGavin: Really everywhere is trying to work out it's useful to look at sort of developments in other countries. And it's part of the reason why the conference is helpful at getting people together to, try and discuss different perspectives on these issues.\nBut. There are a few sort of really old examples of approaches which are capacity based, which are helpful, I think. So, for example, in Ontario, they have a Health Care Consent Act from 96, which is just a broad capacity based framework specifically for treatment decisions, but It's inclusive.\nIt's for everyone. And also in Canada, Saskatchewan, I'm not sure for what reason, but their Mental Health Services Act, which is from, I think from might be The mid eighties had a capacity based criterion [00:16:00] within their criteria for compulsory admissions since then. So there are some helpful sort of older examples of capacity based frameworks, which have been working for a long time.\nMore recently, there are some interest in debates, for example, I mean, across a number of different jurisdictions, there have been a, a, a sort of a reform process looking at, the relevant legal frameworks. So, for example in Australia,, in Victoria, they have mental Health and Wellbeing Act from 2022, which is much more positively framed in terms of pre principles and access to services, although.\nIn some ways, it's still quite a traditional framework and in New Zealand, they're currently developing a new framework, which will have a capacity component to it. I mean, the debates within the Republic of Ireland and within England, Wales and Scotland over recent years are also helpful.\nI think there's. [00:17:00] Particularly sort of interest and development in Scotland, where they're trying to generally, I think introduce a much greater focus on positive rights, those economic, social and cultural rights, which haven't traditionally been part of mental health and mental capacity law. And I mean, I don't want to overstate this, but I think the approach we're trying to develop in Northern Ireland.\nwhich is based on the international literature and in terms of the fusion approach towards smugglers. One of the sort of key people who's, who's developed this way of thinking and informed developments here as part of a sort of international debate. So I think the approach that we are trying to implement here, which we've sort of moved towards to some extent, but not fully implemented.\nIt is, is pretty progressive, I think. .\nAndr\u00e9: So let's talk a bit more about that. Steph's already told us a bit about the kind of current situation in Northern Ireland where you've got these sort of two bits of [00:18:00] legislation kind of concurrently existing. Ian, do you want to tell us a bit more about the Mental Capacity Act, this kind of non discriminatory legal framework?\nWhat can other countries learn from this do you think?\nIain: Coming from a psychiatry perspective, it's been a big driver in the Royal College of Psychiatrists about the idea of parity of esteem. And I think in the overall health context, it really helps to, helps do that. People will need to think about this legislation in terms of physical health procedures.\nAnd the same legislation applies to mental health disorders as well. So actually taking the discrimination out of that bit, I think that's really, really important. And that integration is something that's very progressive in Northern Ireland compared to everywhere else. So I think that's, for me, that's the pivotal thing that other places could take out of what we're trying to do.\nAndr\u00e9: Can you talk us through a little bit how it works in a kind of scenario of somebody with a diagnosis of personality disorders and the [00:19:00] complexity there of assessing whether somebody has mental\nIain: Yeah, I think probably the area that this is going to come up the most in is where somebody is in a suicidal crisis, and has a personality disorder. And the questions that are going to arise in that situation are in a state of absolutely heightened distress. Do you retain the capacity that you maybe had a couple of days previously?\nAnd it is going to come down to very important things like capacity is specific to the decision at that point in time. So it's very difficult for somebody to have said two weeks ago you have capacity and that to be applied in that crisis situation. I think when somebody's in the most heightened state of distress that they've been in, in their life, potentially, there is a possibility that people with personality disorder won't have capacity in that moment.\nAnd then that's where I think it's going to get really [00:20:00] challenging, the ethical dilemmas that you have to think about at that point. So if you decide that somebody doesn't have capacity in that situation, they're actively suicidal, I suppose the first question is, will they consider voluntary admission?\nThen you don't have to get into actually detentions and situations like that. And then the other big question is, is for that individual thing that is gonna be in their best interests to go into hospital, and again, these are gonna be situations specific. You know, we can't just have a blanket rule of if somebody with personality disorder doesn't have capacity.\nand has an intensification of chronic suicidal thoughts that they must always go into hospital because it might not be the right thing. And then, as Steph said earlier, there might be other supports we can put around that person. You know, often seeing a clinician who they know very well the next day or as soon as possible can really help attain something of the crisis.\nSo [00:21:00] I think these are some of the dilemmas. that we're going to get into that I suppose is part of the reason we wanted to get this on the agenda at BigSpud because, you know, there is experience in England and across the UK about this and we really want to hear people's opinions about this because there's nothing written in stone about what absolutely must happen in every situation and we've got to take on the nuances and the experiences people have had with capacity legislation in the UK already as well.\nAndr\u00e9: As you say, it's so dependent on what's happening locally, what the options are for that person. I'm thinking, Steph, you know, where, where the bed is that we might admit them to, what sort of environment that is like for somebody with a personality disorder diagnosis.\nSteph: I think even, I mean, you know, we have the Mental Capacity Act here, and it's about capacity, and it's about capacity for all instances, and even through partial implementation at the minute, we're looking at deprivation of liberty safeguards. So where somebody is likely to be deprived of their liberty, regardless of where that [00:22:00] is, that's where we're looking at deprivation of liberty safeguards.\nSo a big group of. Patients who've been impacted by dolls. Maybe aren't the people that immediately come to mind and it would be people in acute medical hospitals who lack capacity as a result perhaps of a physical health condition and infection, something like that. And that would include people who perhaps have a personality disorder.\nAnd for those people were previously, we might've been keeping them in a medical hospital. Even though they perhaps wanted to leave now what we would be doing is deprivation of liberty safeguards for that person being on a medical ward, even though they want to leave. So we have had instances where perhaps somebody with a personality disorders may be taken an overdose, and there's been concerns that they need to go to a medical hospital.\nTo have their physical health check, but they've refused to go. But at that time, we've had a reasonable belief that that person doesn't have capacity to make that [00:23:00] decision to go to a medical hospital. And therefore, they have to go to a medical hospital as per the Mental Capacity Act. Because that's what's in their best interest.\nThey're currently unwell. We don't know to what degree, and we cannot until they've had some examination in the hospital. So you can already see that kind of interface. In relation to doll. So whenever we move to full implementation of the Mental Capacity Act decisions about people's care and treatment, what support they need come down to whether or not they have capacity to make that decision.\nThe diagnosis is much less important. And as Ian had kind of said, I would be very hard pushed to be convinced that anybody who's in a heightened state of crisis has capacity to make decisions. a decision about a thing at that time. I know myself, if I'm in a heightened state of crisis, I do not have capacity to make a decision at that time.\nSo I think that there's going to be a lot of difficulties and challenges to work through and a lot of dilemmas, [00:24:00] as Ian has said, in relation to actually assessing capacity for people who are complex at the minute we are doing a lot of capacity assessments, perhaps for people who have a dementia and things like that, and maybe arguably that can be more straightforward than somebody more able and willing to engage.\nAnd I think that that's where a lot of the really big challenges would come, but overall in terms of being a. inclusive legal framework, I would say the mental capacity really, really is. And it is about that focus on, does this person have capacity to make that decision at this time? And if not, what would be in their best interest?\nAnd a really big part of that best interest decision is, is this the least restrictive option for that person? And if not, what would And then another really big part of that best interest decision is having special regard for what that person would have wanted, had they been able to make that decision themselves.\nSo this completely changes the narrative about how we provide care for people who need it [00:25:00] whenever they can't decide what care they need themselves. I \nAndr\u00e9: I'm interested in your thoughts about what legislation can do to support mental health professionals to not discriminate against people with personality disorders when they're making these kinds of assessments.\nGavin: With the Mental Capacity Act here, we are trying to establish a legal framework, which in itself isn't discriminatory. However it doesn't resolve the really complex issues of assessment and intervention.\nSo, I think we can agree that people with a diagnosis of personality disorder, There may be issues they're experiencing, which are associated with that, which do impair their ability to make specific decisions at a specific time. And if that's the case, it's reasonable that they do come under the scope of a capacity based framework, just as anybody whose ability to make a decision being impaired should, because the framework should provide a process and safeguards for [00:26:00] decisions being made.\nThe framework that doesn't resolve how you assess all the complex issues needed to make that decision about whether a person lacks capacity for the decision at that time. And then as we've already talked about, even if you do conclude that they are, despite all available support, they are unable to make that decision.\nThe legal framework, it gives you a process to then to try and work out what might be in the person's subjective best interest, but we don't know definitively as we were talking about in terms of the research evidence. How helpful the use of compulsory intervention is for everyone in all the sort of complexities of life and situations people are in.\nThe greatest potential for positive developments are in thinking about how we support people to make their own decisions and also what alternatives we can provide to prevent ideally the need for any sort of compulsory intervention and also [00:27:00] in circumstances where it is necessary to use compulsory intervention, how can we make that the most helpful and least traumatizing it can be?\nYeah,\nAndr\u00e9: guess we're coming back full circle, aren't we, Steph, to the point you made before about the fact that professionals are really frustrated because they don't have the means to support these people often. We don't have the services available to give people what they need. What do you think, there's only so much that legal frameworks can do, what do you think we need to do in services to really provide what's needed for people with a diagnosis of personality disorder that are going through these moments of crisis?\nSteph: think it really comes down to trying to learn from what other places are doing and what other places have done well. It's not for a lack of desire to be able to provide a service, to be able to support people who are in the situations of maybe having those frequent short term admissions to hospital and discharging again.\nAnd we do all acknowledge that perhaps a psychiatric [00:28:00] hospital, I mean, it could contribute to a sort of learned helplessness because you're going into a hospital where everything's done for you. It's not good for skills development for anybody. But I think that we need to learn and perhaps There's a place for some more research to see what would work well.\nI think that for the first time in a long time, there's a lot of attention paid to this particular group of people, people who do have personality disorders and thinking, what can we do to better support people? Because as I said, there are some. Brilliant sort of treatments the likes of what Ian Dunn does in his team with the mentalization based treatment out there that people find really, really helpful, but they need to be at a place where they're ready to engage.\nAnd for those people who are in crisis and frequent crisis perhaps every other week, even as, as consistent as that. We need to start trying to think of, is there some other better way? Is there something that we need to have where we can be able to support people in that instance, where you're not looking at necessarily a compulsory admission to hospital, they're not ready to engage in [00:29:00] a community based treatment, but is there something else that we can do?\nSo I really think that it is the time to start really seriously looking at that with the acknowledgement that we all know that for Really, the majority of people, a psychiatric hospital, it is not the right place, but a supportive environment where you feel safe. That is necessary during those times of crisis what that looks like.\nI don't know and I'd be really really interested to hear other people's views on that and certainly for going to big spade in Belfast that would be something that I'd be really really interested in hearing from people there.\nAndr\u00e9: Yeah, you will certainly hear a lot of that from this conference. I'm sure. Ian, I'm interested in your thoughts as we draw into a close on the sort of mindset change that we've seen in the last 10 years or so. We're thinking a lot more about trauma and abuse and its relationship to mental illness now than we did previously.\nServices are talking about being trauma informed. As a jobbing psychiatrist for the last decade, what's your sort of [00:30:00] reflection on all of that?\nIain: I think my starting point from somebody working in a specialist personality disorder service, I think most, if not all, personality disorder services are integrally trauma informed. I think the evidence based treatments for personality disorder, whether it's MBT, DBT, TFP, CAT, they all come from a, I need to understand you as a person, what's happened to you.\nSo I, I feel quite confident that That approach is trauma informed. I think the area where it probably gets into a real dilemma is about diagnosis and the complexity of what gets considered as borderline personality disorder and what gets considered as complex PTSD and I, I kind of feel that we're on a journey with that, and it's got to marry together somewhere over the next 10 years, how, how those diagnoses really overlap an awful [00:31:00] lot, and as professionals, how we think of it.\nI suppose if somebody's diagnosed with borderline personality disorder and it goes well, the individual will often say like, life's been chaos for me for years, all this has been going on, I have a framework. that I know that I'm not going completely crazy because there is this label called borderline personality disorder that I can now understand all that from.\nThe other side to that is if if somebody really does not like that language and has a preference for the language of trauma and complex PTSD, I think you have to keep it patient centered and there is no point in fighting with the patient about which of those two diagnoses it should be because They're so close and so intertwined and I, I know there's a counter argument about retaining the diagnosis of personality disorder as well, but I think we're on a journey as mental health professionals of how we marry those two things together better.\nAndr\u00e9: Gavin, last word to [00:32:00] you. You're going to have 500 people or so in a room in Belfast listening to the three of you in a couple of months time. Some of them might be tempted to, Yeah, have a bit more time in bed or spend a bit more time at the coffee store because oh, this is the talk all about legislation.\nWhy should people come along to this? Why is it important that people hear this stuff?\nGavin: Yeah yeah I think it does address really sort of fundamental issues about as, as sort of, as a society, how we should try and support each other. And also serve and promote and protect our rights. So I think it, it is a lens by which we can discuss some of those more sort of difficult issues.\nI mean, we'll, we'll also be hopefully given a reasonably accessible and interesting account of what we're trying to do in Northern Ireland and some of the context of, of [00:33:00] here for, for people who might not be so, so familiar with Belfast and yeah, and we'll, we'll try and, and engage with those issues about not only about sort of the legal framework, but the implications of that for all of the other things we could be doing in terms of moving more towards trauma informed care, and those range of.\nInterventions that do have a good evidence base in terms of reducing the need for compulsory intervention. We're also keen to engage with the discussion. My understanding is that in general, this conference, the involvement of people who are using services is central to it.\nAnd I suppose more generally in the development of the legal framework here. Thank you. And in the development of services with a relatively recent sort of mental health strategy. That does seem to be of the main ways that we can try to ensure that both the legal framework and services are [00:34:00] developing in ways which are helpful to people.\nBig thanks to Gavin, Ian and Steph for sharing their time and knowledge so generously. I'm really looking forward to covering their session at the conference and seeing the response to their talk from other Big Spud members and delegates. Well that's it for this episode. I hope you found it interesting and thought provoking.\nWe've got more podcasts coming up with Mel Ball, Sonya Johnson, Anthony Bateman and others. And if you haven't got your conference tickets yet, don't delay. They're selling like pints of the black stuff on a Friday night in the Belfast Cathedral Quarter. You can book now at bigspud. org. uk and there are currently some discounts on registration fees if you're booking a group of five or more people.\nSo get your whole team along and join us in June. I'm Andre from the Mental Health signing off. See you again soon. "}, {"title": "David Baldwin and Catherine Harmer - Previewing the #BAP2024 Summer Meeting", "date": "Fri, 29 Mar 2024 11:30:37 GMT", "year": 2024, "season": "14", "duration": "20:07", "description": "In this podcast conversation, Professor David Baldwin (President of the British Association for Psychopharmacology) and Professor Catherine Harmer (President Elect of the BAP) preview the 2024 Summer Meeting which will take place in Birmingham on 21st - 24th July 2024 at the University of Birmingham: https://www.bap.org.uk/BAP2024 They speak about the history of the BAP, which is celebrating its 50th anniversary in 2024 and invite you to join us at the conference which brings together people int", "url": "david-baldwin-and-catherine-harmer-bap2024", "transcript": "David and Catherine BAP2024\n [00:00:00] \nAndr\u00e9: Hello. And welcome to episode two of the BAP podcast. The British association of psychopharmacology are celebrating their 50th anniversary in 2024. And we'll be joining them in Birmingham for their annual summer meeting, which takes place from the 21st to the 24th of July. I'm Andr\u00e9 from the mental elf and I'll be covering the event this year with my colleague Flo Martin. Flo.will be live tweeting from the mental elf using the hashtag bap 2024. And I'll be recording short in-person video interviews with speakers and delegates to share online as part of our coverage. It's going to be a great event, bringing together researchers and clinicians from around the world, covering everything from alcohol to schizophrenia. \nIn this podcast, we'll hear from president and president [00:01:00] elect of the BAP. And they will explain what this organization and conference is all about. And what we should expect at the summer meeting in a few weeks time. I spoke to them on the 8th of March, 2024, and our chat lasts about 15 minutes. So have a listen now and I'll see you at the end.\nCatherine: I'm Catherine Harmer. I'm a professor of cognitive neuroscience from the Department of Psychiatry in, Oxford, and I'm also the president elect for the British Association for Psychopharmacology.\nDavid: I'm David Baldwin. I'm a professor of psychiatry at the Faculty of Medicine at the University of Southampton, and I'm the current president of the BAP until July of 2024.\nAndr\u00e9: Brilliant. So yeah, thank you both. Lovely to have you on the podcast today. So David, you're coming to the end of your stint as president in the 50th anniversary year of the BAP. So do you want to start off, just give us a [00:02:00] summary of the aims. and maybe who this organization is for.\nDavid: In the 19,, seventies. There was an opportunity really to bring people together who had a mutual interest in understanding in more detail, the kind of the causes and treatments of mental health problems. So this brought in a lot of basic scientists who were engaged in investigations of behavior with animal models and brought them together with clinicians, mainly working in the field of psychiatry at that time. But that's been broadened to include clinical psychology and pharmacy and mental health nursing. So it's always been. A very broad organization which brings together basic laboratory [00:03:00] science with translational science and thinking about applications through to clinical practice.\nBut I think it's important also to think about it the other way as well. and how observations from clinical practice can generate research ideas, which can then be examined in the laboratory setting. So translational both ways, but it's an organization that's thrived over 50 years. It's the second largest such organization in the world.\nAnd it's really nice to be able to celebrate its 50th anniversary this year.\nAndr\u00e9: Catherine, what first drew you to BAP? Maybe you could reflect a bit on the sorts of people that are part of this community.\nCatherine: Now, I joined BAP, I think it was about 28 years ago, when I was a PhD student working on animal models of drug addiction at the University of York, and [00:04:00] I just went to the BAP summer meeting because that's what people in my lab did so it was my first ever academic conference. And since then it has just continued to be a key part of my year. It's been so important. And I think why it's such a lovely collection of interchange is, as David says, you have the preclinical scientist, The human translational scientists, the clinicians, and you also have people working in development in industry as well. And we all come together on a level playing field, all with the same ambition to understand and help treat mental disorders more effectively across this really broad gamut to activity.\nAndr\u00e9: Somebody like myself who goes to a lot of different mental health conferences, this is probably the most science y one I go to. \nGive us a sense of the sort of stuff that is being discussed. at BAP.\nDavid: Yeah, I think the program is very broad and also [00:05:00] quite detailed. So we have a core scientific program, which is typically about nine sessions, about 36. talks and we try to make sure that each session there's a logical progression from sort of basic neuroscience through to applications in clinical practice.\nSo some of the material within those sessions can be quite dense and hard to comprehend, but Parallel to that, we have lots of other components within the program. So for example, we have these guest lectures and the idea of the guest lectures is that it's very broad and people thinking about almost, the journey from basic neuroscience through to clinical applications within a particular field.\nWe also have [00:06:00] a plenary session that's very much focused on clinical applications. This year, David Nut will be talking about, his career in. alcohol research really going from, animal work right away through to health policy. And gradually over the years, what we've done is we've brought in more and more additional features.\nSo about the last, For the last five years, we've been having a public lecture, which we hope to raise awareness of the society and our core work, and think about how we could reach out to a wider audience and interest them in this area. And I'm really delighted this year that Femi Oyobode will be talking about what psychiatry was like before the psychopharmacological era. We have lots of [00:07:00] opportunities for young people to present their research. It's often the first opportunity that they have to present, work from a master's degree or a doctoral degree. And we try to encourage as many early career researchers as possible. We have lots of awards and prizes and bursaries, which support people's attendance.\nAbout two thirds of people who attend are clinicians and a third are more basic neuroscientists. And, if you talk to the clinicians sometimes they say, yeah, this has gone a bit above my head. But they always seem to recognize the importance of extending their knowledge of neuroscience and thinking about how that can then be applied to clinical practice.\nAndr\u00e9: I'm interested in this because it's about science communication, isn't it? And it's complex. I think, a lot of the time the sessions at BAP have to be really complex and detailed and [00:08:00] nerdy and all those things because that's what's required and it's not appropriate to try and communicate that to the public.\nThat what's going on in that session, let's just let it rip and be nerds together and learn stuff But sometimes as you say david, you might want to have a a lecture on alcohol or you know What psychiatry used to be like years ago before drugs, whatever I think the field as a whole needs to come to terms with the fact that there is a science communication need it's working out which bits and as somebody who's done a lot of this yourself Particularly in relation to antidepressants for young people over the last few years, a lot of media work.\nWhat's your kind of reflections on that?\nCatherine: I agree. I think we do have a really important role in contributing to discussions more generally about psychiatry and medications and treatments. And I think this is really important because There is a lot of misinformation out there and there is a lot of stigma associated with different treatments or different [00:09:00] mental health conditions.\nAnd I think it's very easy now we have these kind of social media platforms for people to, share. Things which can be really useful, but there's also a danger in it, isn't there, because you can get into your own echo chamber where you're only hearing things that are consistent with your own view, and some of that might be based on misunderstanding or misinformation.\nSo I do think the BAP has a really important role in being a source of really good quality information so that people can use that information to make up their own mind about what kind of treatment they might be looking for. like themselves or considerations for family members or how to go about accessing services and things like that.\nThe BAP has a, wonderful membership many are active on the social media platforms providing some really good quality sources of information. But I think it would be good if we could consolidate that and put it out into the world in a way, that would then be a trusted source of information that people could use themselves for decision making.\nAndr\u00e9: Do you think we are at the worst [00:10:00] point ever in terms of how psychopharmacology is viewed within the public I find it quite hard to get a handle on that because I'm every day on social media listening to lots of extreme views. \nDavid: I certainly don't think we're in the worst point at all actually. So I started psychiatry in 1985. I remember the day I started because I had an outpatient clinic to sit in. And people with depression were attending the clinic and the only treatments available to them at that point, pharmacological treatments, were tricyclic antidepressants and monoamine oxidase inhibitors. And psychological treatments like cognitive behavior therapy hadn't actually really been developed and certainly not implemented in practice in 1985. The tricyclic antidepressants. could be very [00:11:00] effective. They were often rather poorly tolerated and in overdose were really dangerous.\nA weeks supply could kill someone if they took an overdose. And so new treatments were being developed in the mid 80s. Known as the SSRIs, and they became available, towards the end of that decade. And they were developed, actually, for greater safety in overdose. And then it gradually became clear that they were, effective antidepressants in many people, and then that their effectiveness was also seen in people with anxiety disorders. At the same time, psychological treatments such as CBT were developing. So by the early 90s, five years into my career as a psychiatrist, suddenly, actually we had new treatments that could be effective in many people. And, people were prepared to undergo treatment much more readily [00:12:00] than they were in the mid 1980s.\nSo we have many more treatments available than we did. back in the 1980s. And I don't think we're at a low point actually. I think we have to recognize that the existing treatments are not ideal. There are a significant proportion of people that don't respond. or respond to only a degree and are troubled by side effects.\nAnd if you're thinking that, treatment often needs to go on for a number of years, you're asking a lot of people to take a treatment that might have side effects. So clearly, there's a kind of pressing need to develop new treatments, both pharmacological and psychological, and all the other approaches as well.\nFor example, neurostimulation. But the way to do that is to improve our understanding of the condition and what is causing, what is maintaining condition. And this is the kind of material of the BAP [00:13:00] actually, is trying to work out what's going on underlying the disorders and also we're underlying the response to treatment because if we understand that better we should be able to develop better psychological and pharmacological treatments that have more effectiveness and better acceptability in clinical practice.\nSo I'm actually very hopeful that As I come towards the end of my career that you know in another 20 years time will be much closer to having treatments which are more acceptable and perhaps more targeted at particular groups of people because we haven't really got that at the moment that kind of precision medicine of being able to say yes this person here is more likely to respond to that kind of treatment.\nWe're not there yet, but I think in 20 years time we will be a lot closer to that. In fact, possibly even doing that in clinical practice.\nAndr\u00e9: And I guess the 80s and 90s were a very exciting time to be a [00:14:00] psychiatrist because all this stuff was happening, lots of developments. And then we had a period of maybe 30 years where there was a considerable amount of stasis in terms of developing new drugs and new treatments. The exciting stuff now seems to be the kind of psychedelics.\nYou've got John Crystal talking about ketamine, for example, at the conference. What do you both think about these? Is this really exciting, this field? Is this a bit of a fad? Is it actually going to really help lots of people? What's your sense, Catherine, of these new developments?\nCatherine: I do think it, we have seen a bit of a paradigm shift over the last few years in, in this area of potential fast acting treatments for depression. As conventional treatments take weeks or even longer before they start to have the effect. major effects. And this is a really tricky time of treatment for many people.\nAnd so observations that things like ketamine or some psychedelics like psilocybin can have much [00:15:00] more rapid effects within hours and often lasting a little bit longer over days or even weeks. I think it is a really exciting development in the field. And as a researcher, I'm really fascinated by this.\n What is it that makes these types of treatments different from more conventional antidepressants? And if we really understood the mechanisms underlying the fast acting clinical effect, maybe we could use it to devise treatments that are fast acting and effective and free from the kinds of problems that you might have with giving ketamine, for example, repeatedly or other drugs like that.\nSo yes, I think it is a really exciting frontier. I think as all new exciting frontiers it brings with it lots of new problems to consider and I don't think we We know for certain about how these drugs are working, how long they last, whether you can still see it if you can more adequately blind your trials so that you're the participants are not aware of which treatment they've been.\n It's a new [00:16:00] challenge for work in this area. I think it's really exciting, but also lots of things to consider as researchers and clinicians going forward.\nAndr\u00e9: So we're going to be getting together in person in Birmingham, a beautiful, lovely city of Birmingham. I'm not in any way saying that ironically, I think Birmingham is an amazing place, really interesting city, really. Culturally diverse, loads going on. So yeah, lovely venue for the event and it's in July 21st to the 24th of July.\nWhat are you looking forward to most, David, about going to the summer meeting? \nDavid: The best thing about the BAP is the atmosphere,, it's always a vibrant, fun meeting where you've got free exchange of ideas from people from a whole range of backgrounds, internationally, of differing ages, different experiences, and it's always really refreshing and uplifting.\nSo that's the thing that I always look forward to at the [00:17:00] BAP. What I'm particularly looking forward to this year the fact that we have three guest lectures focusing on A DHD and on what the ketamine studies tell us about how antidepressant treatments might develop. And also the interesting area of what's called cosmetic psychopharmacology.\nWith Dan Stein coming over from Cape Town, Dan is, philosopher, as well as a psychiatrist, and his talk, I think, will be really interesting. As well, of course, Femi Oyebode is taught right at the beginning of the meeting, and Femi is a fantastic speaker who integrates science with clinical observations and insights from the arts and the humanities, and it's really great that Femi is there right at the beginning of the meeting.\nAndr\u00e9: How about you, Catherine? You've been once or twice over the last three decades. What's, is it going to be [00:18:00] different going as a president elect? What are you looking forward to most?\nCatherine: Well, I'm really looking forward to meeting the great network of psychopharmacologists who come, and I think this year will be a particular celebration because it will be a chance to look backwards and reflect on what's been achieved, but also to take that time to look forward as well and think about what will come.\nSo I, I think it will be a really vibrant meeting with people could, with long histories in psychopharmacology and then the very kind of new PhD students as I was when I first went 28 years ago. So I'm really looking forward to that. to that. I suppose the main difference with coming into being the president is the speech, which is probably what most incoming presidents think about the most, which is on the Tuesday evening when we have our celebratory gala dinner and disco that the the new president gives the after dinner speech.\nAnd I've had great examples over the last few years with David, who's done such a good job, but it's. It's one of those things where you have to be [00:19:00] clever and funny together, which is after dinner, which is a tricky combination.\nAndr\u00e9: Yeah, rather you than me.\nDavid: You'll be fantastic. That's right, you'll be fantastic.\nCatherine: Any tips gratefully\nAndr\u00e9: We won't be live streaming it on Twitter, but I'm sure there'll be lots of lovely comments in tweets from people who listen to you speaking. So, yeah, really looking forward to seeing you both in person in Birmingham and thanks a lot for having a chat today.\nBig, thanks to David Baldwin and Catherine Harmer for whetting our appetites for the BAP summer meeting. Uh, taking place in Birmingham, in July. If you want to join us in person, go to bap.org.uk now and register your place. And there are more podcasts coming up soon in this bap, 2024 series covering ADHD, cosmetic psychopharmacology, and also taking a look back at the history of the bap, which is 50 years old this year. \nSo subscribe now to the mental elf, where you get your pods, click that subscribe button and you won't miss an [00:20:00] episode. Okay. That's all for now. This is Andr\u00e9 signing out. I'll see you next time."}, {"title": "John Krystal - Ketamine for depression #BAP2024", "date": "Mon, 19 Feb 2024 19:10:03 GMT", "year": 2024, "season": "14", "duration": "17:57", "description": "Professor John Krystal will be giving a Guest Lecture at the 2024 British Association for Psychopharmacology Summer Meeting in Birmingham on 24th July 2024. His talk is entitled: Linking depression pathophysiology to the mechanism of action of ketamine and \u201cnext generation\u201d treatments. In this 18-minute podcast, Andr\u00e9 Tomlin from The Mental Elf asks John Krystal how he first got into ketamine research and where we are now with this promising intervention for people with severe and enduring depre", "url": "john-krystal-ketamine-for-depression-bap2024", "transcript": "BAP2024 John Krystal \n [00:00:00] Hello hello hello! Hello, everyone, and a very warm welcome to the B.A.P. Podcast. The British Association of Psychopharmacology are celebrating their 50th anniversary in 2024. And we'll be joining them in Birmingham for that annual summer meeting, which takes place from the 21st to the 24th of July. I'm Andre from the Mental Elf and I'll be covering the event this year with my colleague Flo Martin. Flo will be live tweeting from the Mental Elf, using the hashtag #BAP2024 and I'll be making videos in Birmingham to share online as part of our live coverage. And I'm also recording these podcast interviews in the run-up to the event. I'm really looking forward to interviewing the fantastic lineup of international speakers, covering everything from [00:01:00] ADHD to cosmetic psychopharmacology. In this podcast we're going to hear from Professor John Krystal MD who's best known for leading the discovery of the rapid antidepressant effects of ketamine. His talk at the conference is entitled. Linking depression, pathophysiology to the mechanism of action of ketamine and next generation treatments. And I spoke to him on the 19th of February, 2024. And he started by explaining how he got into studying ketamine in the first place. Our chat lasts for about 15 minutes. So have a listen now and I'll see you at the end. \nJohn: My name is John Crystal. I'm a professor and chair of psychiatry at Yale University. I've been at Yale my entire professional career arrived from medical school 44 years ago.\nI I got into studying ketamine because early in my career [00:02:00] I recognized that Nearly the entire research effort in psychiatry was devoted to studying very simple systems in the brain. What we call the monoamine systems that utilize transmitters that many people are familiar with, serotonin, norepinephrine, and dopamine. Ninety 5 percent of the effort in psychiatry research was devoted to 2 percent of the signaling in the brain. And I realized that the biology of psychiatric disorders probably involve the remaining 95 percent of the signaling in the brain, which involves the main excitatory neurotransmitter in the brain, which is glutamate, and the main inhibitory neurotransmitter in the brain, which is GABA.\nAnd so I started using ketamine as a tool to probe the connection [00:03:00] between the glutamate system and cognition and behavior. I started that work in the late 1980s, and it was initially focused on schizophrenia and psychosis. But in the mid nineties, we decided to study depression with the same idea that, the serotonin system, which had been studied and norepinephrine system, which had been studied in relation to the biology of the depression was undoubtedly relevant to how Our standard antidepressants, SSRIs, SNRIs the medications most people would be familiar with, these systems are undoubtedly critical to how those medications work.\nBut we could deplete, my colleague Dennis Charney, could deplete These systems, we could deplete norepinephrine and serotonin and dopamine at the same time in healthy people without getting them depressed. And that made us think that perhaps [00:04:00] these other systems in the brain might be relevant to the biology of depression.\nAnd so we wanted to use ketamine to probe that biology and. What we found was this remarkable rapid antidepressant effect of ketamine in the depressed patients. And ever since then we've been trying to understand how it works, who it's good for. Are there ways to improve upon it, et cetera.\nAndre: Yeah. And I guess it was about 20 years ago that you published the first placebo controlled double blind trial of ketamine for depression. So looking back over 20 years, are you happy with the progress that's been made since then?\nJohn: All we really care about is helping people to get better. And there are so many times in a scientific career where you make a discovery that you think might eventually lead to something where it just turns into a dead end. In this case, what has been striking, powerful, [00:05:00] is how, studying ketamine was like a loose thread in a garment that's unraveling the more people explore it.\n And the impact is growing. And people are benefiting, and that's been incredibly rewarding.\nAndre: And I guess it's a different sort of treatment in some ways, isn't it? Because I guess if you look at what we offer people frontline for depression, antidepressants, talking treatments, exercise, those sorts of interventions, and then the things that we offer maybe for more severe and enduring Depression, ECT, maybe psychedelics with psychotherapy is a new kind of avenue. Ketamine is there in that sort of space, isn't it? Where it's a kind of opening the door and then being supported by other kind of psychological treatments. Can you give us a flavor of what the intervention is and who it's aimed at?\nJohn: Sure. I think the way you characterized it is exactly right, which iesketamine is an intervention that can be [00:06:00] embedded in a ongoing treatment and, people who have been in treatment for depression and related conditions and have severe and unremitting symptoms even though they have not responded to the standard antidepressant medications, , they may still respond to ketamine.\nAnd that's been one of the very striking things. The data that have come in are really quite impressive. The typical thing to do when a person doesn't respond to an antidepressant medication is to add another medication. And the most commonly added medication is from the class of antipsychotic medication.\nAnd a recent study suggests that ketamine is about twice as effective as adding an antipsychotic medication to produce improvement. When people have treatment resistant symptoms and another medication is added, maybe they have a 10 to 20 percent chance [00:07:00] of having a clinical response. With ketamine or esketamine, they have more like a 50 to 70 percent chance of having a clinical response.\nAnd that's a huge difference. Because by the time people develop these treatment resistant symptoms, they've tried a couple of different antidepressants, they haven't quite worked. They get very discouraged and hopeless about getting better and having the opportunity to get ketamine really has opened up new avenues of hope.\nOne of the other treatments that you mentioned, electroconvulsive therapy new data shows that ketamine and electroconvulsive therapy are similarly effective for treatment resistant depression symptoms. But ketamine and esketamine are a much less invasive procedure, easier to apply.\nIn America ketamine and esketamine are becoming more accessible than electroconvulsive therapy, which [00:08:00] has been offered at a declining number of medical centers. The gold standard of electroconvulsive therapy has been getting harder and harder to get, and that gap is being filled by ketamine and esketamine.\nAndre: And I guess some of those other interventions that you're comparing it to, anti psychotics, ECT, have well documented side effects. What's the side effects profile of these newer drugs?\nJohn: So ketamine and esketamine have the effects that you have while the drug is being administered. You can get perception changes that are sometimes called dissociation symptoms. You can get a headache. You can have a transient increase in your blood pressure. You can uh, might get nauseous, you might even vomit.\nSome people have vomited when after they get ketamine. And we can manage all of those side effects at least by supporting people. The dissociative symptoms are tolerable. We have people get their blood pressure under control before they [00:09:00] start ketamine or esketamine treatment. We can give a medication to manage the nausea at the moment.\nThe only side effect that's really concerning that we can't manage is abuse liability. And so we do not want people to get ketamine or esketamine to take home because we're finding that people may be misusing ketamine that they take home. And so in the United States anyway, ketamine and esketamine administration per the Food and Drug Administration regulations called REMS are limited to clinic settings.\nAndre: I'm just trying to picture from an individual perspective. Let's say I'm a man in my 50s and I've had depression for the last 30 years and I get episodes every now and again. It might be that I'm on antipsychotics and an antidepressant, for good. It might be that I go back and have courses of ECT from time to time when I have a severe episode.\nHow would it work with a ketamine intervention? Is it just a one off from time to time? How does it link in with [00:10:00] everything else?\nJohn: In some ways the profile of ketamine treatment is most similar to electroconvulsive therapy, which is that it started relatively frequently, twice a week, and then tapered down gradually. trying to prevent the depression symptoms from, recurring. And there are some people with electroconvulsive therapy, like ketamine or esketamine, that are just treated with it for a few months and that's it.\nBut a half or even more of patients treated with ketamine or esketamine will be on it long term. And one of the very striking things that's been observed with ketamine, but which has also been observed for electroconvulsive therapy, is that they not only decrease the mortality associated with suicide, In other words, they reduce the chance of dying by suicide.\nBut ketamine and esketamine were just shown to [00:11:00] reduce all cause mortality. What that means is that depression is bad for you. We know it feels bad, but it's bad for your health. It's associated with inflammation in the body, particularly these severe kinds of depression. It can worsen your heart disease.\nIt can worsen your kidney disease, your respiratory illness, other medical illnesses. And so depression without suicide shortens lifespan, expected lifespan by five to 10 years. And ketamine and esketamine address that more effectively than standard antidepressants. So it not only reduces all cause mortality with regard to being not treated, it reduces all cause mortality in comparison to historical data when people are treated with standard antidepressant medications.\nSo this is really a profound kind of treatment, the other thing that I found very striking with the ascetamine data, it has to do with [00:12:00] relapse. I think one of the most discouraging parts about depression treatment as a doctor prescribing medications or as a person getting treatment Is the, that we can go through many different medication combinations to find the one that produces a good clinical response that can take a year or even more, and then within a few months, sometimes these people will relapse, the depression will come back, and that's very disheartening.\nI'm always reminded of the story about Virginia Wolf, who. Committed suicide, not because she was depressed, but because she could feel the depression coming back after a period when she was in remission. Ketamine and esketamine in long term treatment seem about twice as effective in preventing relapse compared to standard medication, which to me, as a treater, is also an important piece of data that people don't pay much attention.\nAndre: [00:13:00] So I'm wondering, finally, what the perspective on this whole field is from commissioners of services, from guideline developers, because obviously we have an evidence base here, as you've referred to a few times this is an effective treatment. It's safe, certainly in the short term.\nDo we have that kind of long term safety data?\nJohn: So the data that I was referring to in that comparison, the average duration of treatment was 42 months. So that's pretty long term as these things go.\nAndre: Yeah. So what's the barrier then to widening access to this? Or is it just that actually this is only going to be for quite a small, proportion of people who get depression.\nJohn: There are always many different barriers. One barrier is psychological, which is that doctors have to decide they want to deliver the treatment, patients have to decide they're willing to give it a try. And then there are practical barriers, which is that. The [00:14:00] classic psychiatry equipment involved a comfy chair and a pad of paper.\nAnd this requires having a clinic space where you're delivering treatments. Ketamine or Esketamine, or perhaps in the future, other treatments, like you mentioned psychedelics and potentially MDMA. And these treatments like ECT are interventions. They require a doctor or a medical staff to be prepared to deliver a medication that has a response and to monitor the patient through it.\nAnd that transition of doctors And practices setting up this resource turned out to be one of the barriers to access. And what I've been told in the States is that they've already seen a tenfold increase in the number of practices that are able to deliver this and the rate of expansion of these resources seems to be growing very rapidly.\nSo [00:15:00] not only psychiatrists delivering this. as a treatment, but there are clinics where the ketamine or esketamine is provided by anesthesiologists, pain doctors other kinds of physicians, but also nurse anesthetists advanced practice nurses.\nI think that the distribution or access to these medications will grow significantly and the more data that we have with these medications, I think. Continues to support broader prescription for treatment resistant symptoms as opposed to more narrow. In the trial that compared ketamine to one of the antipsychotic medications that was published in the New England Journal last year, the dropout rate due to side effects was higher with the antipsychotic medications than it was to the esketamine and that may be related to the fact that when you're getting these treatments, the medicine's only in your body for an hour or [00:16:00] so.\nOnce every two weeks, if you're taking it on a long term basis, , twice a week at the beginning, but the frequency goes down over time. And maybe, There's something about that enhances tolerability. In other words, you're not waking up. tired every morning or having other side effects every day.\nYou have your side effects, but they're limited to a relatively short period of time and you're supported during that. And you set aside the time for those side effects so that they're not interfering with your life so much.\nAndre: I'm just imagining people are going to come to the conference in Birmingham, the BAP annual conference, in a few months time. Tell us why people should come along and listen to your keynote talk. \nJohn: What I'm going to be talking about is how The mechanisms through which ketamine work link up with the biology of depression. I'll be talking about some really interesting research that suggests that we're tapping into brain resilience mechanisms when we give a dose of [00:17:00] ketamine.\nAnd I'll also be talking about the next generation of ketamine like treatment ways that we may be able to enhance the effectiveness of ketamine by combining it with certain psychotherapies or even novel medications.\n Big, thanks to John Krystal for that whistle-stop tour of his work. I'm really looking forward to hearing more from him in Birmingham on Wednesday, the 24th of July. And if you want to join, in-person, go to bap.org.uk now, and register your place. There's going to be more podcasts coming up in this BAP2024 series, so subscribe now to the Mental Elf, where you get your pods, whether that's Apple or Spotify or YouTube or wherever else, click that subscribe button and you won't miss an episode. Okay. That's it for now. This is Andr\u00e9 signing out. I'll see you next time. "}, {"title": "Heather O'Mahen - Are perinatal community mental health teams effective? What's the evidence?", "date": "Tue, 09 Jan 2024 11:55:13 GMT", "year": 2024, "season": "12", "duration": "19:10", "description": "Professor Heather O'Mahen from the University of Exeter previews her talk at the 2024 UK and Ireland Marc\u00e9 Society Annual Conference in London on 25th January:&nbsp;Are perinatal community mental health teams effective? What's the evidence?&nbsp; Find out more about the International Marc\u00e9 Society for Perinatal Mental Health&nbsp; https://marcesociety.com/regional-groups/uk-ireland-marce-society/ View the programme for the 2024 UK and Ireland Marc\u00e9 Society Annual Conference&nbsp; https://www.kcl", "url": "heather-omahen-perinatal-community-mental-health-teams"}, {"title": "Zo\u00eb Darwin and Jacob Stokoe - Gestational and non-gestational parents: transcending existing perinatal mental health frameworks", "date": "Sat, 06 Jan 2024 15:46:06 GMT", "year": 2024, "season": "12", "duration": "27:47", "description": "Zo\u00eb Darwin from the University of Huddersfield and Jacob Stokoe from Transparent Change preview their talk at the 2024 UK and Ireland Marc\u00e9 Society Annual Conference in London on 25th January: Gestational and non-gestational parents: transcending existing perinatal mental health frameworks. Find out more about the International Marc\u00e9 Society for Perinatal Mental Health https://marcesociety.com/regional-groups/uk-ireland-marce-society/ View the programme for the 2024 UK and Ireland Marc\u00e9 Society ", "url": "zoe-darwin-and-jacob-stokoe"}, {"title": "PPI in the AVATAR2 Trial - Alie Phiri, Leonie Richardson and Stephanie Allan", "date": "Fri, 27 Oct 2023 06:30:39 GMT", "year": 2023, "season": "11", "duration": "22:57", "description": "Effective patient and public involvement (PPI) is crucial to conducting research that meets the needs and values of patients. In this podcast, we hear from a team of researchers and people with lived experience about getting involved in the AVATAR2 trial. This study is investigating the effects of digital avatar therapy in people with psychosis who hear voices. We hear about how PPI makes a difference, what getting involved entails, and how people with lived experience shaped the questions, meth", "url": "ppi-in-the-avatar2-trial-alie-phiri-leonie-richardson-and-st"}, {"title": "Sustainability and climate change - Roslyn Morgan and Kate Charlesworth #Quality2023", "date": "Thu, 26 Oct 2023 15:30:32 GMT", "year": 2023, "season": "10", "duration": "11:42", "description": "Roslyn Morgan and Kate Charlesworth speak to Laura Hemming from The Mental Elf about their sessions at the Quality Forum in Melbourne in October 2023. Roslyn Morgan is the ANMF (Vic Branch) Environmental Health Officer and her talk at #Quality2023 in Melbourne is entitled: Workplace Sustainability and Environmental Reform, Be the change. Dr Kate Charlesworth is the Medical Director at the Climate Risk &amp; Net Zero Unit, NSW Health. Find out more about the International Forum on Quality and Saf", "url": "sustainability-and-climate-change"}, {"title": "Danny Smith on investigating the role of light, circadian rhythms and sleep in bipolar disorder", "date": "Wed, 25 Oct 2023 16:07:12 GMT", "year": 2023, "season": "11", "duration": "23:15", "description": "Professor Daniel Smith from Edinburgh University gives a short overview of bipolar disorder, and introduces two studies he is working on to investigate the role of light, circadian rhythms and sleep in bipolar disorder, and their effect on the action of lithium as a treatment. This podcast is part of the Annual Scientific Meeting of NHS Research Scotland's Mental Health Network, which takes place on 30th October in Glasgow. Find out more about this event , which is free to attend, in person or o", "url": "danny-smith-on-investigating-the-role-of-light-circadian-rhy"}, {"title": "Simon Hackett on Arts Psychotherapy in people with Intellectual Disabilities - #NRSMH23", "date": "Fri, 20 Oct 2023 14:45:24 GMT", "year": 2023, "season": "11", "duration": "17:20", "description": "Simon Hackett sits down with Douglas Badenoch to discuss Arts Psychotherapy for people with Intellectual ation: Deon York and Ashfaq Chauhan", "date": "Wed, 13 Sep 2023 15:18:10 GMT", "year": 2023, "season": "10", "duration": "16:48", "description": "Deon York and Ashfaq Chauhan speak to Laura Hemming from The Mental Elf about their sessions at the Quality Forum in Melbourne in October 2023. Deon York is Director of Consumer Engagement at Te T\u0101h\u016b Hauora Health Quality &amp; Safety Commission New Zealand.&nbsp;&nbsp;Deon's talk at the Quality Forum in Melbourne will be on: Expertise by experience: A national code of expectations for consumer engagement. Dr Ashfaq Chauhan&nbsp;is a Postdoctoral Research Fellow in the Centre for Health Systems ", "url": "patient-safety-and-co-creation-deon-york-and-ashfaq-chauhan"}, {"title": "Louis Appleby - Suicide Prevention: is it possible? #IoMHconf23", "date": "Thu, 07 Sep 2023 09:58:44 GMT", "year": 2023, "season": "9", "duration": "14:02", "description": "Students from the Wellcome Trust PhD in Mental Health Science at UCL speak to Prof Sir Louis Appleby from the University of Manchester before his talk at the 2023 UCL Institute of Mental Health Conference. Hosted on Acast. See acast.com/privacy for more information.", "url": "louis-appleby-suicide-prevention-is-it-possible-iomhconf23"}, {"title": "Scott Kim - Assisted Suicide and mental disorder #IoMHconf23", "date": "Thu, 07 Sep 2023 09:45:27 GMT", "year": 2023, "season": "9", "duration": "13:34", "description": "Students from the Wellcome Trust PhD in Mental Health Science at UCL speak to Dr Scott Kim from the US National Institutes of Health before his talk at the 2023 UCL Institute of Mental Health Conference. Hosted on Acast. See acast.com/privacy for more information.", "url": "scott-kim-assisted-suicide-and-mental-disorder-iomhconf23"}, {"title": "Hamish McAllister-Williams - The clinical utility and potential generalisability of the \u201cdifficult to treat...\u201d concept #BAP2023", "date": "Mon, 24 Jul 2023 12:49:09 GMT", "year": 2023, "season": "8", "duratio sectionality in Addressing Harm in Services #BIGSPD23", "date": "Mon, 12 Jun 2023 16:15:33 GMT", "year": 2023, "season": "7", "duration": "19:29", "description": "Before her keynote talk at the 2023 BIGSPD conference in Glasgow, Dr Satbinder Kaul Bhogal, talks about the importance of exploring intersectionality in addressing harm in services. Dr Satbinder Kaur Bhogal, Clinical Psychologist.&nbsp; Dr Kaur Bhogal has worked for over 20 years within the field of Mental Health in various organisations. She has led services to support children and adults experiencing complex emotional, social, and interpersonal difficulties,&nbsp;often referred to as \u2018Personal", "url": "satbinder-kaul-bhogal-bigspd23"}, {"title": "Daniel Taggart - Lessons from the Truth Project #BIGSPD23", "date": "Fri, 26 May 2023 08:00:09 GMT", "year": 2023, "season": "7", "duration": "25:54", "description": "Before his keynote talk at the 2023 BIGSPD conference in Glasgow, Dr Daniel Taggart, from the University of Essex, talks about mental health provision for adult survivors in the wake of the Independent Inquiry into Child Sexual Abuse (IICSA) - lessons from the Truth Project. Dr Daniel Taggart, Senior Lecturer in Clinical Psychology, University of Essex&nbsp; is a senior lecturer in clinical psychology at the University of Essex, and a chartered psychologist. Danny worked at the Independent Inqui", "url": "daniel-taggart-bigspd23"}, {"title": "Giles Newton-Howes - Is the label too taxing? Where to for the diagnosis personality disorder #BIGSPD23", "date": "Fri, 12 May 2023 16:17:17 GMT", "year": 2023, "season": "7", "duration": "16:01", "description": "Before his keynote talk at the 2023 BIGSPD conference in Glasgow, Prof Giles Newton-Howes from the University of Otago in New Zealand, talks about the history of the term personality disorder and how thinking about taxonomy can help us consider the benefits and harms of diagnosis. Professor Giles Newton-Howes, Professor &amp; Consultant Psychiatrist, University of Otago.&nbsp; A consultant psychiatrist and academic who works in Wellington New Zealand. After completing degrees in classical studie", "url": "giles-newton-howes-bigspd23"}, {"title": "Oscar Marin Parra - Cortical interneurons in health and disease", "date": "Thu, 11 May 2023 10:49:10 GMT", "year": 2023, "season": "6", "duration": "20:52", "description": "Speaking before his keynote talk at the 2023 IoPPN Research Festival, Professor Oscar Marin talks about his work investigating the development of the cerebral cortex in health and disease, specifically how alterations in the development of the cerebral cortex may predispose humans to schizophrenia or autism. Hosted on Acast. See acast.com/privacy for more information.", "url": "oscar-marin-cortical-interneurons-in-health-and-disease"}, {"title": "Janet Treasure - Eating disorders: a paradigm of a psychosomatic illness", "date": "Thu, 11 May 2023 10:02:17 GMT", "year": 2023, "season": "6", "duration": "23:28", "description": "Speaking before her keynote talk at the 2023 IoPPN Research Festival, Professor Janet Treasure talks about the history of eating disorders, how services and research have developed over the last 30 years, and the problems she is now trying to solve in her work at KCL. The Centre for Research in Eating and Weight Disorders (CREW) aims to find out more about the neurobiological, genetic and psychological causes and consequences of anorexia nervosa, bulimia nervosa and other eating disorders, and t", "url": "janet-treasure-eating-disorders"}, {"title": "Robin Murray - Half a Century to emerge from the Fog of Schizophrenia", "date": "Thu, 11 May 2023 07:15:10 GMT", "year": 2023, "season": "6", "duration": "22:17", "description": "Speaking before his keynote talk at the 2023 IoPPN Research Festival, Professor Sir Robin Murray reflects on his 50 years working as a psychiatrist and researcher. Hosted on Acast. See acast.com/privacy for more information.", "url": "robin-murray-half-a-century-to-emerge-from-the-fog-of-schizo"}, {"title": "Learning from adverse events - Jesper Ekberg and Tracey Herlihey", "date": "Tue, 09 May 2023 15:53:37 GMT", "year": 2023, "season": "5", "duration": "22:26", "description": "Jesper Ekberg&nbsp;(Strategy for Health Lead; Swedish Association of Local Authorities and Regions (SALAR), Sweden) and Tracey Herlihey&nbsp;(Head of Patient Safety Incident Response Policy; NHS England) talk about precision and passion \u2013 the art of making population health actionable; and learning from patient and relative reported adverse events. Jesper and Tracey will be running sessions at the International Forum on Quality and Safety in Healthcare, which is taking place in Copenhagen on 15-", "url": "learning-from-adverse-events-jesper-ekberg-tracey-herlihey"}, {"title": "Patient involvement - Joan Russell, Douglas Findlay, Charlotte Verner Rossing, Radha Sundaram #Quality2023", "date": "Thu, 04 May 2023 16:51:26 GMT", "year": 2023, "season": "5", "duration": "22:38", "description": "Joan Russell (NHS England), Douglas Findlay (Royal Berkshire NHS Foundation Trust), Charlotte Verner Rossing (Danish College of Pharmacy Practice) and Radha Sundaram (NHS Greater Glasgow and Clyde) talk about involving and working in partnership with patients in patient safety; building capacity to understand the patient, and yourself; and care at end of life in ICU \u2013 what matters to patients matters to staff! Joan, Douglas, Charlotte and Radha will be running sessions at the International Forum", "url": "patient-involvement-quality2023"}, {"title": "Equity - Alice Forsythe, Cian Wade & Mando Watson #Quality2023", "date": "Tue, 18 Apr 2023 17:02:36 GMT", "year": 2023, "season": "5", "duration": "23:57", "description": "Alice Forsythe (Virginia Mason Institute), Cian Wade (Harvard School of Public Health) and Mando Watson (Connecting Care for Children) talk about embedding equity into leadership and practice management, reducing health inequalities through collaboration, and how action on patient safety can reduce health inequalities. Alice, Kian and Mando will be running sessions at the International Forum on Quality and Safety in Healthcare, which is taking place in Copenhagen on 15-17 May 2023. Visit the pro", "url": "equity-alice-forsythe-cian-wade-mando-watson-quality2023"}, {"title": "Wellbeing - G\u00f6ran Lindahl, Cat Chatfield & Paul Barach #Quality2023", "date": "Sun, 19 Mar 2023 10:56:44 GMT", "year": 2023, "season": "5", "duration": "31:28", "description": "G\u00f6ran Lindahl (Chalmers University of Technology, Gothenburg, Sweden), Cat Chatfield (Director of Health Services Research UK) &amp; Paul Barach (Thomas Jefferson University, Philadelphia, US) talk about the challenges currently facing health systems around the world, in terms of recruitment and retention of health professionals, and staff wellbeing. They discuss the built environment and how we can design hospitals that promote staff wellbeing and retention. G\u00f6ran, Cat &amp; Paul will be leadin", "url": "wellbeing-lindahl-chatfield-barach-quality2023"}, {"title": "Sustainability - Jason Leitch & Laura Wilson #Quality2023", "date": "Tue, 07 Feb 2023 21:56:08 GMT", "year": 2023, "season": "5", "duration": "20:11", "description": "Jason Leitch (National Clinical Director for Scotland) and Laura Wilson (Director for Scotland for the Royal Pharmaceutical Society) talk about the impact that our healthcare systems have on climate change, the commitments made to address these problems, and what everyone (from big corporations to frontline practitioners) can do to make our healthcare more sustainable. Jason and Laura will be presenting their work at the International Forum on Quality and Safety in Healthcare, which is taking pl", "url": "sustainability-jason-leitch-laura-wilson-quality2023"}, {"title": "#Quality2023 podcast introduction", "date": "Tue, 07 Feb 2023 21:46:36 GMT", "year": 2023, "season": "5", "duration": "1:06", "description": "Welcome to the podcast for the International Forum on Quality and Safety in Healthcare https://internationalforum.bmj.com/copenhagen/ Jointly organised by the&nbsp; Institute for Healthcare Improvement (IHI) &nbsp;and&nbsp; BMJ , the International Forum has a rich history of supporting and energising the international movement for health and care improvement. From 300 people meeting in London in 1996 to around 5000 improvers attending the International Forum events every year, the conference is ", "url": "quality2023-podcast-introduction"}, {"title": "Deanna Van Buren", "date": "Tue, 10 Jan 2023 09:40:45 GMT", "year": 2023, "season": "2", "duration": "15:52", "description": "Deanna Van Buren is an award-winning architect and activist recognized internationally for her leadership in using architecture, design, and real estate innovations to address the social inequities behind the mass incarceration crisis. Van Buren is co-founder of&nbsp; Designing Justice + Designing Spaces , an architecture and design firm with the mission of dismantling the punitive infrastructure of the prison system by designing and building new spaces informed by restorative justice: peacemaki", "url": "deanna-van-buren"}, {"title": "GameChange VR - Automated Virtual Reality Therapy for Psychosis", "date": "Fri, 09 Dec 2022 14:54:44 GMT", "year": 2022, "season": "4", "duration": "13:58", "description": "Alex Kenny (Peer Researcher) and Jessica Bond (Senior Researcher) from the McPin Foundation&nbsp;talk about the patient experience of gameChange using a peer research approach. Dr Sin\u00e9ad Lambe, Research Clinical Psychologist &amp; NIHR Doctoral Fellow at the University of Oxford presents the results from the gameChange trial and next steps with implementation in the UK and overseas. Hosted on Acast. See acast.com/privacy for more information.", "url": "gamechange-mindtech2022"}, {"title": "Stefan Rennick-Egglestone - The NEON study", "date": "Fri, 09 Dec 2022 14:49:16 GMT", "year": 2022, "season": "4", "duration": "40:43", "description": "Dr&nbsp;Stefan Rennick-Egglestone, Senior Research Fellow at the University of Nottingham Institute of Mental Health, speaks about the NEON study (Narrative Experiences Online) after his talk at the MindTech conference in London on 24th November 2022. Hosted on Acast. See acast.com/privacy for more information.", "url": "stefan-rennick-egglestone-mindtech2022"}, {"title": "Tim Kendall - Digital Mental Health Therapies in the NHS \u2013 a new way forward? #MindTech2022", "date": "Fri, 09 Dec 2022 14:45:28 GMT", "year": 2022, "season": "4", "duration": "12:18", "description": "Professor Tim Kendall, National Clinical Director for Mental Health from NHS England, speaks to us before his keynote talk at the MindTech conference in London on 24th November 2022. Hosted on Acast. See acast.com/privacy for more information.", "url": "tim-kendall-mindtech22"}, {"title": "Episode 6: School Connectedness - Wellcome Whatever Works #ActiveIngredientsMH", "date": "Fri, 09 Dec 2022 14:13:31 GMT", "year": 2022, "season": "3", "duration": "27:50", "description": "Can school connectedness help prevent anxiety and depression? How can schools support the mental health of LGBTQ+ youth? In this 28-minute discussion, Dr Monika Raniti and Dr Gemma Lewis explore the links between school connectedness and mental health; specifically how the school ethos, environment and policy can help promote mental health in LGBTQ+ young people. 00:44 Introductions 01:06 What is school connectedness? 02:11 Can school connectedness help prevent anxiety and depression? 08:14 What", "url": "school-connectedness-wellcome-whatever-works"}, {"title": "Episode 5: Money and Mental Health - Wellcome Whatever Works #ActiveIngredientsMH", "date": "Fri, 09 Dec 2022 14:13:17 GMT", "year": 2022, "season": "3", "duration": "23:50", "description": "What's the relationship between money and mental health? What impact can we have with cash transfers or universal basic income? In this 24-minute panel discussion, Prof Johannes Haushofer, Prof Matthew Johnson and Laura Peters from Rethink explore the links between money and mental health; specifically how interventions like cash transfers or universal basic income can help prevent or treat anxiety or depression. 00:50 Introductions 01:35 What's the relationship between money and mental health? ", "url": "money-and-mental-health-wellcome-whatever-works"}, {"title": "Episode 4: Managing Emotions - Wellcome Whatever Works #ActiveIngredientsMH", "date": "Thu, 08 Dec 2022 10:00:32 GMT", "year": 2022, "season": "3", "duration": "22:09", "description": "How can emotional regulation help with youth anxiety and depression? How can we teach emotion skills to young people? In this 22-minute panel discussion, Dr Alex Daros (Toronto, Canada), Dr Matt Sommerville (London, UK) and Chlo\u00eb Morgan explore the links between our emotions and our mental health; specifically how giving young people the skills to manage and control their emotions can help prevent or treat anxiety or depression. 00:36 Introductions 01:05 How can emotional regulation help with yo", "url": "managing-emotions-wellcome-whatever-works"}, {"title": "Episode 3: Movement and Monitoring - Wellcome Whatever Works #ActiveIngredientsMH", "date": "Mon, 05 Dec 2022 10:00:31 GMT", "year": 2022, "season": "3", "duration": "25:52", "description": "Can physical activity prevent or treat youth anxiety or depression? How can remote measurement technologies help with youth mental health? In this half hour panel discussion, Dr Alan Bailey (Melbourne, Australia), Fiyory Ghezae, and Dr Annie Walsh (London/Birmingham) explore the links between physical activity, exercise and good mental health, and consider the future possibilities of wearable technology as a way to monitor our physical activity and physiology and self-manage our mental health. 0", "url": "movement-and-monitoring-wellcome-whatever-works"}, {"title": "Episode 2: Sleep and Development - Wellcome Whatever Works #ActiveIngredientsMH", "date": "Fri, 02 Dec 2022 10:00:19 GMT", "year": 2022, "season": "3", "duration": "25:51", "description": "Why is sleep so important for youth mental health? In this half hour panel discussion, Prof Sarah-Jayne Blakemore (Cambridge, UK), Prof Russell Foster (Oxford, UK) and Prof Ian Hickie (Sydney, Australia) explore the relationship between sleep and youth anxiety and depression. They explain why sleep is so important during adolescence and present some of the ways that young people can learn more about sleep, which can have a positive impact on their health and wellbeing. 00:38 Introductions 01:08 ", "url": "sleep-and-development-wellcome-whatever-works"}, {"title": "Episode 1: Beliefs and Purpose - Wellcome Whatever Works #ActiveIngredientsMH", "date": "Tue, 29 Nov 2022 10:00:42 GMT", "year": 2022, "season": "3", "duration": "25:29", "description": "Can having a sense of purpose in life help with youth mental health? How can spiritual and religious beliefs help us to stay mentally healthy? In this half hour panel discussion, Dr Emily Hielscher (Brisbane, Australia), Prof Christopher Cook (Durham, UK) and Dr Shilpa Aggarwal (Mumbai, India) explore the links between religion, sprituality, sense of purpose and youth mental health. 01:17 Introductions 02:28 How does sense of purpose affect youth mental health? 05:54 What are the key components ", "url": "beliefs-and-purpose-wellcome-whatever-works"}, {"title": "Warren Binford", "date": "Mon, 31 Oct 2022 09:30:30 GMT", "year": 2022, "season": "2", "duration": "15:52", "description": "Warren Binford is an internationally recognized children\u2019s rights scholar and advocate who is a frequent writer and speaker on a variety of children\u2019s issues, including 21st century forms of child abuse, exploitation, and neglect. She founded the Child and Family Advocacy Law Clinic at Willamette Law School and has provided legal expertise to many international organizations, including Save the Children and the International Red Cross, as well as major media outlets, including the New York Times", "url": "warren-binford"}, {"title": "Nadha Hassen", "date": "Sat, 29 Oct 2022 22:54:50 GMT", "year": 2022, "season": "2", "duration": "8:55", "description": "Nadha Hassen is a PhD Candidate at York University in Toronto. In this short podcast interview, recorded at the #Together4Action2022 conference in Baltimore, she talks about her \"Park Perceptions and Racialized Realities\" community-based participatory research (CBPR) dissertation, which explores the experiences of people of color in greenspaces in two underserved neighborhoods in Toronto, Canada, to examine issues of mental health, wellbeing, equity and inclusivity.Adapting the photovoice proces", "url": "nadha-hassen"}, {"title": "Rodrigo Heng-Lehtinen", "date": "Sat, 29 Oct 2022 22:25:10 GMT", "year": 2022, "season": "2", "duration": "11:04", "description": "Rodrigo Heng-Lehtinen is the Executive Director of the National Center for Transgender Equality. He is a transgender policy, advocacy, and messaging expert. As a transgender man, his wide-ranging experience in the LGBTQ movement has covered field organizing, leadership development, fundraising, and media advocacy. He previously worked with Freedom for All Americans, GLAAD, the Transgender Law Center, Gender Justice LA, and the National LGBTQ Task Force. In this interview, following his keynote t", "url": "rodrigo-heng-lehtinen"}, {"title": "Deborah Klein Walker - Closing the gap between research and policy", "date": "Sat, 29 Oct 2022 09:43:32 GMT", "year": 2022, "season": "2", "duration": "12:15", "description": "Deborah Klein Walker, EdD, a behavioral sciences researcher, public health leader, and advocate for public health and social justice, has more than 40 years of experience conducting research and evaluation in community settings, and developing and implementing programs. policies and system changes at the local and state le
