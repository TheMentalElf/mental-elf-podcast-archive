CoUMH Conference website . Further reading (mentioned by", "url": "laura-bringmann-icoumh"}, {"title": "Andrea Wittenborn #ICoUMH", "date": "Sun, 02 Oct 2022 14:44:30 GMT", "year": 2022, "season": "1", "duration": "16:38", "description": "Dr. Andrea Wittenborn is Professor of Human Development and Family Studies at Michigan State University. In this podcast she talks about her research, which explores methods for personalising treatment for depression, which she will be presenting at the 2022 International Conference on Urban Mental Health, which is taking place in Amsterdam on Friday 7th October. Find out more on the&nbsp; #ICoUMH Conference website . Papers mentioned by Dr. Wittenborn in the interview: Wittenborn, A. K., Rahman", "url": "andrea-wittenborn-icoumh"}, {"title": "Sandro Galea #ICoUMH", "date": "Sun, 02 Oct 2022 13:29:36 GMT", "year": 2022, "season": "1", "duration": "13:15", "description": "Prof Sandro Galea from the Boston University School of Public Health talks about the lessons learned from the COVID-19 pandemic, and previews his talk on urban mental health, which is taking place at the 2022 International Conference on Urban Mental Health in Amsterdam on Friday 7th October. Find out more on the&nbsp; #ICoUMH Conference website . Hosted on Acast. See acast.com/privacy for more information.", "url": "sandro-galea-icoumh"}, {"title": "Peter Sloot #ICoUMH", "date": "Thu, 29 Sep 2022 13:58:17 GMT", "year": 2022, "season": "1", "duration": "16:01", "description": "Prof Peter Sloot, Professor of Complex Adaptive Systems at the University of Amsterdam, speaks to us before the International Conference on Urban Mental Health, which is taking place in Amsterdam on Friday 7th October 2022. Find out more on the #ICoUMH Conference website . Hosted on Acast. See acast.com/privacy for more information.", "url": "peter-sloot-icoumh"}, {"title": "Claudi Bockting and Reinout Weirs #ICoUMH", "date": "Thu, 29 Sep 2022 12:38:18 GMT", "year": 2022, "season": "1", "duration": "8:03", "description": "Prof Claudi Bockting and Prof Reinout Weirs, Co-Directors of the International interdisciplinary Centre for Urban Mental Health at the University of Amsterdam, speak about the 2022 International Conference on Urban Mental Health, which is taking place in Amsterdam on Friday 7th October. Find out more on the #ICoUMH Conference website . Hosted on Acast. See acast.com/privacy for more information.", "url": "claudi-bockting-reinout-weirs-icoumh"}, {"title": "Ed Watkins speaking to Mark Brown at #ECoWeB in Barcelona", "date": "Mon, 12 Sep 2022 16:25:59 GMT", "year": 2022, "season": "", "duration": "10:21", "description": "Edward Watkins is Professor of Experimental and Applied Clinical Psychology at the University of Exeter. At the #ECoWeB conference in Barcelona on Monday 12th September 2022, Ed speaks to Mark Brown who is reporting from The Mental Elf. Hosted on Acast. See acast.com/privacy for more information.", "url": "ed-watkins-ecoweb"}, {"title": "Holly Bear speaking to Mark Brown at #ECoWeB in Barcelona", "date": "Mon, 12 Sep 2022 14:44:20 GMT", "year": 2022, "season": "", "duration": "4:49", "description": "Dr Holly Bear is a postdoctoral researcher working in the Department of Psychiatry at the University of Oxford.&nbsp;Her current research focuses on how implementation science can be leveraged to enhance the adoption and sustainability of evidence-based digital interventions in child and adolescent mental health. At the #ECoWeB conference in Barcelona on Monday 12th September 2022, Holly speaks to Mark Brown who is reporting from The Mental Elf. Hosted on Acast. See acast.com/privacy for more in", "url": "holly-bear"}, {"title": "Johnny Fontaine speaking to Mark Brown at #ECoWeB in Barcelona", "date": "Mon, 12 Sep 2022 14:21:23 GMT", "year": 2022, "season": "", "duration": "8:19", "description": "Johnny R. J. Fontaine is associate professor the Department of Personnel Management, Work and Organizational Psychology at Ghent University in Belgium. At the #ECoWeB conference in Barcelona on Monday 12th September 2022, he speaks to Mark Brown who is reporting from The Mental Elf. Hosted on Acast. See acast.com/privacy for more information.", "url": "johnny-fontaine"}, {"title": "Cathy Creswell and Rachel", "date": "Thu, 14 Jul 2022 16:50:29 GMT", "year": 2022, "season": "", "duration": "25:54", "description": "Professor Cathy Creswell (from the University of Oxford) and Rachel (the parent of a young child with anxiety) speak about child anxiety problems and the research going on in Oxford to help families. Hosted on Acast. See acast.com/privacy for more information.", "url": "cathy-creswell-and-rachel-brant"}, {"title": "Paul Edwards And Sarah Watts", "date": "Thu, 14 Jul 2022 11:17:17 GMT", "year": 2022, "season": "", "duration": "18:27", "description": "Dr Sarah Watts and her former patient Paul Edwards speak abut their journey together as a CBT therapist and client, and the book they are writing together about hope and recovery. Hosted on Acast. See acast.com/privacy for more information.", "url": ""}, {"title": "Michel Dugas - Behavioural experiments for intolerance of uncertainty", "date": "Mon, 11 Jul 2022 11:16:46 GMT", "year": 2022, "season": "", "duration": "18:03", "description": "Dr. Michel Dugas, Professor of Psychology at the Universit\u00e9 du Qu\u00e9bec en Outaouais, speaks about his work looking at uncertainty and generalised anxiety disorder.Find out more about the 50th Annual Conference of the British Association for Behavioural and Cognitive Psychotherapies, which is taking place in London on 20-23 July 2022: babcp2022.org/ Hosted on Acast. See acast.com/privacy for more information.", "url": ""}, {"title": "Tony Kelly, Matt Hill and Nicola Mackintosh", "date": "Fri, 17 Jun 2022 08:26:18 GMT", "year": 2022, "season": "", "duration": "22:39", "description": "How do they do that? Using Appreciative Enquiry to Develop Safety Culture.As they prepare for their workshop at the #Quality2022 conference in Gothenburg, Tony Kelly, Matt Hill and Nicola Mackintosh speak about:- Understanding the interdependence between safety culture and safety/quality improvement- Appreciating how the local relational aspects of effective teams can support shifts in safety culture- How to practically provide support to teams to generate and nurture effective safety cultureSpe", "url": ""}, {"title": "Keir Harding and Hollie Berrigan", "date": "Thu, 16 Jun 2022 14:19:51 GMT", "year": 2022, "season": "", "duration": "11:56", "description": "Keir Harding and Hollie Kerrigan from Beam Consultancy talk about 'personality disorders', out of area placements and diagnostic labels, as they reflect on everything that has happened at the BIGSPD annual conference in Northampton. Hosted on Acast. See acast.com/privacy for more information.", "url": ""}, {"title": "David Gibbs And Allison Joseph", "date": "Thu, 16 Jun 2022 13:43:44 GMT", "year": 2022, "season": "", "duration": "20:49", "description": "David Gibbs and Allison Joseph share their thoughts on racism at the British and Irish Group for the Study of 'Personality Disorder' conference in Northampton.David is a trainer and consultant on race and mental health. He also serves as a Magistrate in Birmingham. As an Expert by Experience consultant, he works with the Department of Psychology, University of Birmingham and with the Common Awards, University of Durham, on race and inclusion.Allison is the @MadBlackPixie, a mental health activis", "url": ""}, {"title": "Fiona Kuhn-Thompson and Melanie Ball - An Open Letter", "date": "Wed, 15 Jun 2022 19:21:29 GMT", "year": 2022, "season": "", "duration": "17:23", "description": "Having just performed their Open Letter piece at the BIGSPD Annual Conference: A Performed Exploration of Democratic Solutions for Distress Often Referred to as \u2018Personality\u2019, Fi and Mel talk about their lived experience of mental health difficulties, their creative approach to starting meaningful conversations about 'personality disorders', and their hopes for the future of training for people who work in the mental health system. Hosted on Acast. See acast.com/privacy for more information.", "url": ""}, {"title": "Rob Schafer - 'Personality Disorder' training for primary care teams", "date": "Tue, 14 Jun 2022 21:26:01 GMT", "year": 2022, "season": "", "duration": "7:16", "description": "Dr Rob Schafer, a GP from the homeless medical centre in Oxford, speaks about his work with Oxford Health NHS Foundation Trust, developing a personality disorder training programme for general practice teams that transforms attitudes and facilitates specific practice level change. Hosted on Acast. See acast.com/privacy for more information.", "url": ""}, {"title": "Helen Morgan - Whiteness: a problem for our time", "date": "Thu, 09 Jun 2022 19:36:26 GMT", "year": 2022, "season": "", "duration": "20:18", "description": "Ms Helen Morgan, Psychoanalytic Psychotherapist from the British Psychotherapy Foundation, speaks about whiteness before her keynote talk at the 2022 BIGSPD Annual Conference, which is taking place in Northampton on 14-16 June 2022.bigspd.org.uk/conference-2022/ Hosted on Acast. See acast.com/privacy for more information.", "url": ""}, {"title": "Andrew Beck and Saiqa Naz help us prepare for #BABCP2022", "date": "Thu, 09 Jun 2022 08:49:45 GMT", "year": 2022, "season": "", "duration": "23:39", "description": "Andrew Beck (President of the BABCP) and Saiqa Naz (President-Elect of the BABCP) help us prepare for the 50th Annual Conference of the British Association for Behavioural and Cognitive Psychotherapies, which is taking place in London on 20-23 July 2022.Find out more on the #BABCP2022 website: https://babcp2022.org/ Hosted on Acast. See acast.com/privacy for more information.", "url": ""}, {"title": "Carolina Kl\u00fcft - Generation Pep: physical activity and healthy eating in young people", "date": "Wed, 08 Jun 2022 13:16:01 GMT", "year": 2022, "seaso rders. This conversation was recorded at the Tale of Three Cities event, which took place at Manchester Cathedral on 31st May 2022. Hosted on Acast. See acast.com/privacy for more information.", "url": ""}, {"title": "Dean Rogers Govender", "date": "Tue, 31 May 2022 15:49:45 GMT", "year": 2022, "season": "", "duration": "12:27", "description": "Dean Rogers Govender, the Dean of Manchester, opens the Tale of Three Cities podcast, which was recorded at Manchester Cathedral on 31st May 2022. Hosted on Acast. See acast.com/privacy for more information.", "url": ""}, {"title": "Thanos Karatzias - Complex PTSD and Borderline Personality Disorder", "date": "Tue, 24 May 2022 07:33:41 GMT", "year": 2022, "season": "", "duration": "29:38", "description": "Dr Thanos Karatzias from Edinburgh Napier University, talks about\"Complex PTSD and Borderline Personality Disorder: the overlaps and differences\" before his keynote talk at the 2022 annual conference of the British and Irish Group for the Study of Personality Disorder.Find out more: https://bigspd.org.uk/conference-2022/ Hosted on Acast. See acast.com/privacy for more information.", "url": ""}, {"title": "Colin King - Personality Disorder and Racial Inequality", "date": "Fri, 20 May 2022 07:32:10 GMT", "year": 2022, "season": "", "duration": "27:05", "description": "Speaking before his plenary talk at the 2022 BIGSPD conference, Dr Colin King from the University of Oxford Race Equality and Whiteness Network, speaks about Personality Disorder and Racial Inequalityhttps://valuesbasedpractice.org/what-do-we-do/networks/race-equality-and-whiteness-network/ Hosted on Acast. See acast.com/privacy for more information.", "url": ""}, {"title": "The architecture of mental health research", "date": "Fri, 13 May 2022 07:57:47 GMT", "year": 2022, "season": "", "duration": "13:24", "description": "Professor Andrew Thompson, Dr Sarah Maguire and Professor Mark Dadds discuss a number of national research centres in Australia. Hosted on Acast. See acast.com/privacy for more information.", "url": ""}, {"title": "Oliver Dale and Kirsten Barnicot preview #BIGSPD22", "date": "Tue, 10 May 2022 06:40:28 GMT", "year": 2022, "season": "", "duration": "16:37", "description": "Oliver Dale and Kirsten Barnicot preview the 2022 Annual Conference of the British and Irish Group for the Study of Personality Disorder (BIGSPD), which is taking place in Northampton on 14-16 June 2022.https://bigspd.org.uk/conference-2022/ Hosted on Acast. See acast.com/privacy for more information.", "url": ""}, {"title": "Louise Howard - Breaking the bias to impact on mental health #IoPPNfestival", "date": "Tue, 10 May 2022 06:39:33 GMT", "year": 2022, "season": "", "duration": "16:49", "description": "Professor Louise Howard, Professor in Women\u2019s Mental Health in theDepartment of Health Service & Population Research at King's College London.Differences in the epidemiology of mental disorders in men and women are well-established. Despite this, it could be argued that until recently mental health research largely ignored sex (and gender) differences, risking undermining of scientific validity and efficiency, and potentially contributing to a failure of health providers to deliver gender-sensit", "url": ""}, {"title": "Christina Krause - Burnout", "date": "Mon, 09 May 2022 12:04:49 GMT", "year": 2022, "season": "", "duration": "19:45", "description": "How do we support health and care staff who are burned out, exhausted and thinking of leaving their profession?Christina Krause, CEO of the BC Patient Safety & Quality Council previews her workshop with Helen Bevan from NHS Horizons, which takes place on Wednesday 22nd June 2022: Rest and recovery post-covid: a necessary step for quality.Covid-19 placed unprecedented stress on healthcare systems across the globe. The pandemic took us through the fear of the unknown, overwhelmed health systems, d", "url": ""}, {"title": "Roz Shafran & Adam Radomsky", "date": "Mon, 09 May 2022 10:03: he role of", "url": ""}, {"title": "How can AI help us to manage mental health condtiions? With Amid Ayobi and Aisling Ann O'Kane", "date": "Tue, 19 Apr 2022 08:48:18 GMT", "year": 2022, "season": "", "duration": "26:12", "description": "The Mental Health Research Matters team spoke to Dr Aisling Ann O'Kane and Dr Amid Ayobi from the SPHERE project to find out more about human-computer interactions and mental health.Amid and Aisling are part of a team of 100 researchers from different disciplines working on SPHERE - an EPSRC-funded project where participants use wearable or at-home sensors to monitor physical and mental health problems at home. These sensors can help researchers better understand physical and mental health condi", "url": ""}, {"title": "Tony LaMontagne - Work as a social determinant of mental health and wellbeing", "date": "Mon, 28 Mar 2022 16:22:38 GMT", "year": 2022, "season": "", "duration": "14:32", "description": "Prof. Tony LaMontagne talks to Adam Nebbs at the Society for Mental Health Research conference in Hobart in March 2022.Anthony D. LaMontagne is a Professor of Work, Health & Wellbeing at the Institute for Health Transformation and the School of Health & Social Development at Deakin University Hosted on Acast. See acast.com/privacy for more information.", "url": ""}, {"title": "SMHR Big Ideas", "date": "Thu, 24 Mar 2022 14:42:58 GMT", "year": 2022, "season": "", "duration": "12:36", "description": "Fiona Cocker facilitates a discussion with early career researchers about how SMHR can ensure a commitment to building our evidence base to enhance knowledge, services delivery and outcomes. Hosted on Acast. See acast.com/privacy for more information.", "url": ""}, {"title": "Gemma Sharp - KIT The Positive Body Image Chatbot", "date": "Thu, 24 Mar 2022 14:03:34 GMT", "year": 2022, "season": "", "duration": "14:48", "description": "Gemma Sharp - KIT The Positive Body Image Chatbot by The Mental Elf Hosted on Acast. See acast.com/privacy for m n is is Professor Emeritus of Psychiatry at Orygen and the Centre for Youth Mental Health, The University of Melbourne, and Director of the World Health Organization (WHO) Collaborating Centre in Mental Health, Melbourne. She is former president of the World Psychiatric Association (WPA \u2013 2017-2020) and the International Association of Women\u2019s Mental Health. She is appointed an Officer of the Order of Australia, included in the Victorian Honour Roll of Women and awarded an ", "url": ""}, {"title": "Amanda Neil and Fiona Cocker", "date": "Tue, 15 Mar 2022 09:14:38 GMT", "year": 2022, "season": "", "duration": "15:03", "description": "Amanda Neil and Fiona Cocker introduce the Society for Mental Health Research podcast, which will accompany the #SMHR22 conference taking place in Hobart, Tasmania, Australia on 24-26 March 2022.Conference website: https://www.smhrconference.com.auConference programme: https://www.waldronsmith.com.au/wp-content/uploads/SMHR2022_Program_V6.1-with-session-chairs.pdf Hosted on Acast. See acast.com/privacy for more information.", "url": ""}, {"title": "Announcing #BABCP2022 - Shirley Reynolds and Jo Daniels", "date": "Thu, 24 Feb 2022 13:54:04 GMT", "year": 2022, "season": "", "duration": "18:16", "description": "The 50th Annual BABCP Conference will take place in London on 20-23 July 2022: https://babcp2022.org/In this podcast, Prof Shirley Reynolds and Dr Jo Daniels talk about the British Association for Behavioural and Cognitive Psychotherapies, and preview the programme for the conference which will include talks and sessions on Adult Mental Health, Children and Young People, Basic Processes and Experimental Psychopathology, Bipolar Disorder, Enduring Personality Issues and Psychosis, Older Adults, I", "url": ""}, {"title": "Sara Riggare, Patrik Blomkvist & Elin Cederbrant - Patient Representation #Quality2022", "date": "Wed, 23 Feb 2022 18:25:34 GMT", "year": 2022, "season": "", "duration": "32:20", "description": "How do we work in partnership with patients, carers and service users?Sara Riggare, Patrik Blomkvist and Elin Cederbrant are all members of the patient working group that are working to enhance patient representation across the International Forum.As we prepare for the 2022 European Quality Forum, which takes place in Gothenburg on 20-22 June 2022, Sara, Patrik and Elin speak to us about patient involvement and moving towards a future vision for this quality improvement conference becoming a \"pa", "url": ""}, {"title": "Anette Nilsson - Integrated care: learning from the Swedish experience #Quality2022", "date": "Thu, 16 Dec 2021 17:06:08 GMT", "year": 2021, "season": "", "duration": "26:49", "description": "Anette Nilsson, Region J\u00f6nk\u00f6ping County, Sweden\"Don't miss the party in Gothenburg, where new possibilities, inspiration and hope will be created.\"As we prepare for the 2022 European Quality Forum, which takes place in Gothenburg on 20-22 June 2022, Anette Nilsson speaks to us about how can we build more integrated health and care systems that focus on giving the right care at the right place at the right time.Anette will be involved in this session at the conference:A8: Integrated care: learnin", "url": ""}, {"title": "Jesper Ekberg - Health Inequalities #Quality2022", "date": "Wed, 08 Dec 2021 12:34:53 GMT", "year": 2021, "season": "", "duration": "19:02", "description": "Jesper Ekberg, SALAR and Region J\u00f6nk\u00f6ping County, Sweden\"My heart is really beating a lot around quality improvement and how that can come closer to the public health area\".As we prepare for the 2022 European Quality Forum, which takes place in Gothenburg on 30 March - 1 April 2022, Jesper Ekberg speaks to us about creating fairer systems to tackle the inequalities in health.Jesper will be involved in three sessions at the conference:M5: Europe together for population health \u2013 Health Improvement", "url": ""}, {"title": "Antidepressants, autism diagnosis & self-harm. Elf Nuggets - Oct 2021", "date": "Tue, 30 Nov 2021 14:10:42 GMT", "year": 2021, "season": "", "duration": "32:43", "description": "Welcome to our first ever #ElfNuggets show!If you prefer, you can watch this Elf Nuggets episode on the Mental Elf YouTube channel: https://www.youtube.com/watch?v=x6zZrQ45MbQThis show will:- Help mental health practitioners keep up to date with the latest reliable research that they can use in practice- Each month we will discuss three recent studies that we've blogged about on the Mental Elf, which our panel think we should be using in practiceOur expert panel- Chair: Andr\u00e9 Tomlin, Founder, Th", "url": ""}, {"title": "Jon Roiser & Ron Kessler - Precision Psychiatry #IoMHconf2021", "date": "Mon, 13 Sep 2021 13:11:02 GMT", "year": 2021, "season": "", "duration": "40:25", "description": "Ron Kessler, \u201cPragmatic Precision Psychiatry\u201dRonald C. Kessler, Ph.D. is the McNeil Family Professor of Health Care Policy at Harvard Medical School and Director of the World Health Organization World Mental Health (WMH) Survey Initiative.Jon Roiser, \u201cTowards mechanistic precision psychiatry\"Jonathan Roiser is Professor of Neuroscience and Mental Health and Deputy Director of the UCL Institute of Cognitive Neuroscience.Precision psychiatry talks by Ron Kessler and Jon Roiser will take place at t", "url": ""}, {"title": "Merle Schlief, Jackie Hardy, Tamar Jeynes & Mary Birken - Lived Experience Research #IoMHconf2021", "date": "Mon, 13 Sep 2021 10:42:44 GMT", "year": 2021, "season": "", "duration": "32:43", "description": "Towards coproduction: Involvement in the Mental Health Policy Research UnitMerle Schlief, \"Co-production on the PRU Covid interviews project: what we did\"Jackie Hardy, Tamar Jeynes and Mary Birken, \"Co-production on the PRU Covid interviews project: reflections - Panel discussion\"The IoMH Annual Conference takes place online on Wednesday 15th September 2021: www.ucl.ac.uk/mental-health/iomh\u2026nference-programmeTickets cost \u00a310 and can be purchased here: https://www.ucl.ac.uk/mental-health/iomh-con", "url": ""}, {"title": "Alexandra Pitman - The impact of peer suicide, suicide attempt and self-harm #IoMHconf2021", "date": "Fri, 10 Sep 2021 09:00:12 GMT", "year": 2021, "season": "", "duration": "20:52", "description": "Dr Alexandra Pitman is an Associate Professor in Psychiatry in the UCL Division of Psychiatry and an Honorary Consultant Psychiatrist at Camden and Islington NHS Foundation Trust. Her research interests are in the epidemiology of suicide and self-harm, and preventing suicide.She will be giving a talk on \u201cThe impact of peer suicide, suicide attempt, and self-harm on risk of self-harm and suicidal behaviour\u201d at the forthcoming IoMH Annual Conference, which takes place online on Wednesday 15th Sept", "url": ""}, {"title": "Prof Laurence Kirmayer - Landscapes of trauma #ACOTS2021", "date": "Wed, 01 Sep 2021 16:47:42 GMT", "year": 2021, "season": "", "duration": "39:05", "description": "Professor Laurence Kirmayer from McGill University is a psychiatrist and expert in transcultural psychiatry.He will be giving the opening keynote talk at the 21st Australasian Conference on Traumatic Stress, which will take place online on 14-18 September 2021: www.acots.org/Prof Kirmayer's talk is entitled: \"Landscapes of trauma: A social-ecological approach to cultural diversity in mental health research, theory and practice.\".The 2021 ACOTS conference is a collaboration between ASTSS (the Aus", "url": ""}, {"title": "Dr Duleeka Knipe - Suicide in low and middle-income countries #IoMHconf2021", "date": "Wed, 01 Sep 2021 13:07:50 GMT", "year": 2021, "season": "", "duration": "26:15", "description": "Dr Duleeka Knipe is a Vice Chancellor's Fellow, Bristol Medical School (PHS) at the University of Bristol. She will be giving a talk in the forthcoming IoMH Annual Conference, which takes place online on Wednesday 15th September 2021: https://www.ucl.ac.uk/mental-health/iomh-conference/conference-programmeDr Duleeka Knipe's talk is entitled: \"Suicide in low and middle-income countries \u2013 what do we know?\". Poster presentations can be submitted here: https://www.ucl.ac.uk/mental-health/iomh-confer", "url": ""}, {"title": "Prof Meaghan O'Donnell #ACOTS2021", "date": "Wed, 18 Aug 2021 08:25:49 GMT", "year": 2021, "season": "", "duration": "19:38", "description": "Professor Meaghan O'Donnell is the Head of Research at Phoenix Australia, and Professor in the Department of Psychiatry, University of Melbourne.She will be leading a parallel session at the The 21st Australasian Conference on Traumatic Stress will take place online on 14-18 September 2021: www.acots.org/Prof O'Donnell's session is entitled: \"Unified Protocol for Transdiagnostic Treatment of Emotional Disorders\u2019 and its treatment of PTSD\".The 2021 ACOTS conference is a collaboration between ASTS", "url": ""}, {"title": "Prof Katherine Iverson - Intimate partner violence #ACOTS2021", "date": "Tue, 17 Aug 2021 15:22:43 GMT", "year": 2021, "season": "", "duration": "27:29", "description": "Professor Katherine Iverson from the Women\u2019s Health Sciences Division of the National Center for PTSD at the VA Boston Healthcare System, and the University of Boston is a clinical research psychologist and an expert in intimate partner violence.She will be giving a keynote talk at the The 21st Australasian Conference on Traumatic Stress will take place online on 14-18 September 2021: www.acots.org/Prof Iverson's talk is entitled: \"Harnessing health services research and implementation science t", "url": ""}, {"title": "Prof Tony David #IoMHconf2021 preview", "date": "Fri, 06 Aug 2021 08:43:09 GMT", "year": 2021, "season": "", "duration": "14:33", "description": "Professor Tony David, Director of the UCL Institute of Mental Health, talks about the forthcoming IoMH Annual Conference, which takes place online on Wednesday 15th September 2021: https://www.ucl.ac.uk/mental-health/iomh-conference/conference-programmePoster presentations can be submitted here: https://www.ucl.ac.uk/mental-health/iomh-conference/iomh-conference-poster-presentationsTickets cost \u00a310 and can be purchased here: https://www.ucl.ac.uk/mental-health/iomh-conference/conference-registra", "url": ""}, {"title": "Prof Nicholas Procter - Trauma informed approach #ACOTS2021", "date": "Tue, 03 Aug 2021 09:21:27 GMT", "year": 2021, "season": "", "duration": "15:28", "description": "Professor Nicholas Procter from the University of South Australia is a mental health nurse and will speak about the use of co-design and lived experience within vulnerable populationsHe will be giving a keynote talk at the The 21st Australasian Conference on Traumatic Stress will take place online on 14-18 September 2021: www.acots.org/The 2021 ACOTS conference is a collaboration between ASTSS (the Australasian Society for Traumatic Stress Studies) and Phoenix Australia \u2013 Centre for Posttraumati", "url": ""}, {"title": "Prof Tim Dalgleish - Transdiagnostic approaches... #ACOTS2021", "date": "Fri, 30 Jul 2021 13:19:53 GMT", "year": 2021, "season": "", "duration": "19:41", "description": "Professor Tim Dalgleish from the University of Cambridge is a clinical psychologist who specialises in transdiagnostic interventions.He will be giving a keynote talk at the The 21st Australasian Conference on Traumatic Stress will take place online on 14-18 September 2021: www.acots.org/Prof Dalgleish's talk is entitled: \"Transdiagnostic approaches to human distress in the aftermath of trauma\".The 2021 ACOTS conference is a collaboration between ASTSS (the Australasian Society for Traumatic Stre", "url": ""}, {"title": "Zac Steel #ACOTS2021", "date": "Tue, 20 Jul 2021 09:17:57 GMT", "year": 2021, "season": "", "duration": "18:40", "description": "Professor Zachary Steel, President of the Australasian Society for Traumatic Stress Studies (https://www.astss.org.au/) helps us prepare for the 21st Australasian Conference on Traumatic Stress, which is taking place online on 14-18 Sep 2021.The 2021 ACOTS conference is a collaboration between ASTSS (the Australasian Society for Traumatic Stress Studies) and Phoenix Australia \u2013 Centre for Posttraumatic Mental Health.This year\u2019s conference theme lays down a challenge to us all in our enduring que", "url": ""}, {"title": "Kindness #Quality2021", "date": "Mon, 19 Jul 2021 14:52:46 GMT", "year": 2021, "season": "", "duration": "22:39", "description": "Dr Bob Klaber, Consultant General Paediatrician and Director of Strategy, Research and Innovation at Imperial College Healthcare NHS Trust, speaks about the importance of kindness in relation to healthcare and quality improvement.https://twitter.com/BobKlaberFind out more about the International Forum on Quality and Safety in Healthcare Europe 2021, which took place on 9-11 June 2021 internationalforum.bmj.com/europe/ Hosted on Acast. See acast.com/privacy for more information.", "url": ""}, {"title": "Equity and quality improvement #Quality2021", "date": "Tue, 06 Jul 2021 15:05:26 GMT", "year": 2021, "season": "", "duration": "27:51", "description": "Don Goldmann (Harvard Professor and Chief Scientific Officer, Emeritus at the Institute for Healthcare Improvement) and Amar Shah (Forensic Psychiatrist, Chief Quality Officer at East London Foundation NHS Trust, and National Improvement Lead for Mental Health at the Royal College of Psychiatrists) speak about the importance of equity.https://twitter.com/dagoldmannhttps://twitter.com/DrAmarShahFind out more about the International Forum on Quality and Safety in Healthcare Europe 2021, which took", "url": ""}, {"title": "Workforce wellbeing #Quality2021", "date": "Fri, 25 Jun 2021 09:56:15 GMT", "year": 2021, "season": "", "duration": "29:37", "description": "Dr. Cat Chatfield, Research Integrity Editor at The BMJ (https://twitter.com/drcatchatfield) and Dr. Daljit Hothi, Home HD Lead, Consultant Paediatric Nephrologist, Associate Medical Director at Great Ormond Street Hospital (https://twitter.com/DalHothi_HD_QI) speak about the importance of workforce wellbeing.Find out more about the International Forum on Quality and Safety in Healthcare Europe 2021, which took place on 9-11 June 2021 https://internationalforum.bmj.com/europe/ Hosted on Acast. S", "url": ""}, {"title": "Anna Motz BIPSPD21", "date": "Fri, 21 May 2021 09:27:32 GMT", "year": 2021, "season": "", "duration": "19:59", "description": "Anna Motz - Working Psychotherapeutically with Women\u2019s Invisible Trauma. Consultant Clinical and Forensic Psychologist working in the Offender Care Service at the Central and North West London NHS Foundation Trust, who has extensive clinical experience working with women in prison and in the community, and with the staff teams who support them. Hosted on Acast. See acast.com/privacy for more information.", "url": ""}, {"title": "Peter Kinderman #BIGSPD21", "date": "Mon, 17 May 2021 14:16:44 GMT", "year": 2021, "season": "", "duration": "28:20", "description": "Professor Peter Kinderman, Professor of Clinical Psychology at the University of Liverpool will be speaking at the BIGSPD 2021 online conference, which takes place on 15-16 June 2021. His talk is entitled: \"Beyond disagreement and consensus - managing multiple perspectives.\"Visit the conference website to find out more:https://bigspd.org.uk/online-conference-june-2021/ Hosted on Acast. See acast.com/privacy for more information.", "url": ""}, {"title": "Grainne McAlonan #IoPPNfestival", "date": "Thu, 15 Apr 2021 16:12:27 GMT", "year": 2021, "season": "", "duration": "13:32", "description": "Prof Grainne McAlonan, Professor of Translational Neuroscience in the Department of Forensic and Neurodevelopmental Sciences at King's College London.Synopsis: Autism Spectrum Disorder (ASD) is clinically diverse, and its etiological mechanisms are poorly understood. To inform prognosis and generate intervention opportunities we need a better understanding of causal pathways; and subsequently, a means to examine target engagement. There is fresh hope however, based on evidence that multiple risk", "url": ""}, {"title": "Terrie Moffitt #IoPPNfestival", "date": "Thu, 15 Apr 2021 12:09:03 GMT", "year": 2021, "season": "", "duration": "22:23", "description": "Professor Terrie E. Moffitt, Professor of Social Development in the Social, Genetic & Developmental Psychiatry Centre at King's College London.Synopsis: Repeated mental-health assessments in a birth cohort followed to age 45 reveal that mental disorder eventually affects virtually everyone. The predominant pattern among clinically significant cases is adolescent onset followed by a succession of different diagnoses emerging over decades. Findings challenge our field\u2019s over-reliance on researchin", "url": ""}, {"title": "Final reflections from #ImpactFrameworks", "date": "Wed, 31 Mar 2021 08:45:38 GMT", "year": 2021, "season": "", "duration": "32:25", "description": "#ImpactFrameworks conference organisers Mark Taylor, Jess Romo and Shaun Leamon discuss the conference highlights over the two days and lessons learnt. Hosted on Acast. See acast.com/privacy for more information.", "url": ""}, {"title": "Jenny Donovan", "date": "Mon, 29 Mar 2021 07:28:20 GMT", "year": 2021, "season": "", "duration": "21:52", "description": "Dr Jenny Donovan, CEO of the Australian Education Research Organisation (AERO) Presentation Title: Evidence for ChangeThe Australian Education Research Organisation (AERO) was established to advance an evidence-based education system. What does that mean for educators and teachers? Presumably, it implies that there needs to be some sort of change: some adjustments to practice and some shift towards greater utilisation and implementation of evidence at scale. But teachers are weary of top-down ed", "url": ""}, {"title": "Yara Toenders - Inflammation and depression in young people", "date": "Wed, 24 Mar 2021 12:58:07 GMT", "year": 2021, "season": "", "duration": "23:52", "description": "Yara Toenders and Dr Lianne Schmaal from Orygen in Melbourne, Australia, talk about their Wellcome Trust Active Ingredients project on inflammation and depression in young people. Hosted on Acast. See acast.com/privacy for more information.", "url": ""}, {"title": "Suicide Means Restriction", "date": "Mon, 22 Mar 2021 14:34:00 GMT", "year": 2021, "season": "", "duration": "1:04:05", "description": "Welcome to this podcast on suicide means restriction, brought to you by the Cochrane Common Mental Disorders group and the Mental Elf.*TRIGGER WARNING*This podcast is aimed at mental health researchers and policy makers. In it we discuss the ways that we can prevent suicide, restricting the means of people taking their own lives, and methods of suicide. Please do not listen to this discussion if you are feeling unsafe. Prof Ann JohnProfessor in Public Health and Psychiatry at the Swansea Univers", "url": ""}, {"title": "Ruth Levine", "date": "Thu, 18 Mar 2021 18:43:48 GMT", "year": 2021, "season": "", "duration": "16:38", "description": "Presentation Title: The Promise and Pitfalls of Co-creation In this talk, Ruth Levine, CEO of IDInsight, will highlight the ways in which sustained evidence uptake depends on openness to co-creation of research and evaluation questions and methods with members of the policy community, as well as with civil society. She will discuss the importance of breaking barriers to collaboration to ensure relevance of research findings. She will also note the risks and how they can be mitigated. Ruth Levine", "url": ""}, {"title": "MQ Data Science 2020", "date": "Thu, 18 Mar 2021 18:20:59 GMT", "year": 2021, "season": "", "duration": "42:00", "description": "Professor Andrew McIntosh from the University of Edinburgh, Professor Ann John from Swansea University, Professor Dermot O'Reilly from Queen's University Belfast and Professor Robert Stewart from King's College London, talk about mental health data science in this podcast recorded shortly after the MQ Data Science meeting in December 2020. Hosted on Acast. See acast.com/privacy for more information.", "url": ""}, {"title": "Rinad Beidas", "date": "Mon, 15 Mar 2021 16:21:37 GMT", "year": 2021, "season": "", "duration": "26:22", "description": "Dr Rinad Beidas, University of PennsylvaniaPresentation Title: Harnessing implementation science to realize the promise of evidence based practice in mental health care.Implementation science, or the study of methods to improve the adoption, implementation, and sustainment of evidence-based practices, has grown exponentially in the past decade in response to growing concerns about the research to practice chasm. Implementation researchers have developed a set of frameworks, measures, and outcome", "url": ""}, {"title": "#MentalHealthResearchMatters - The Funder\u2019s Perspective: BBSRC", "date": "Fri, 26 Feb 2021 14:35:09 GMT", "year": 2021, "season": "", "duration": "19:07", "description": "How can understanding and technologies from the basic biosciences contribute to the wider field of mental health research? What cross-disciplinary interface areas involving biosciences open up areas for innovative translational research? And what are some of the barriers and enablers to working across disciplines involving the basic biosciences? In this #MentalHealthResearchMatters podcast Dr Sadhana Sharma (Strategy and Policy Manager) and Dr Iain Templeman (Senior Portfolio Manager) at the Bio", "url": ""}, {"title": "Angela Tilby - Thought for the Day, 23rd Feb 2021", "date": "Tue, 23 Feb 2021 09:22:57 GMT", "year": 2021, "season": "", "duration": "2:59", "description": "Angela Tilby, Canon Emeritus of Christ Church Cathedral in Oxford talks about mental health and the Mental Elf. Hosted on Acast. See acast.com/privacy for more information.", "url": ""}, {"title": "The Importance of Libraries in Impact Assessment", "date": "Mon, 22 Feb 2021 19:15:06 GMT", "year": 2021, "season": "", "duration": "35:28", "description": "Interviewer Mark Taylor (NIHR)Danny Kingsley (Australian National Centre for the Public Awareness of Science)Helen Bingham (Health Education England) Hosted on Acast. See acast.com/privacy for more information.", "url": ""}, {"title": "The History of the International School of Research Impact Assessment", "date": "Mon, 22 Feb 2021 19:14:34 GMT", "year": 2021, "season": "", "duration": "31:42", "description": "Interviewer Mark Taylor (NIHR)Jonathan Grant (Kings College London)Paula Adam (AQuAS)Kathryn Graham (Alberta Innovates) Hosted on Acast. See acast.com/privacy for more information.", "url": ""}, {"title": "The Impact of Global Health Research", "date": "Mon, 22 Feb 2021 19:14:06 GMT", "year": 2021, "season": "", "duration": "38:42", "description": "Interviewer Saumu Lwembe (NIHR)Imelda Bates (Liverpool School of Tropical Medicine)Katherine Wright (Nuffield Council on Bioethics)David Phipps (York University, Canada) Hosted on Acast. See acast.com/privacy for more information.", "url": ""}, {"title": "The Impact of PPIE and PPIE in Impact", "date": "Mon, 22 Feb 2021 19:13:29 GMT", "year": 2021, "season": "", "duration": "44:39", "description": "Interviewer Chris Carrigan (HDR-UK Rutherford Fellow, Patients and Data at Leeds Institute for Data Analytics)Mark Taylor (NIHR)Trish Greenhalgh (University of Oxford) Hosted on Acast. See acast.com/privacy for more information.", "url": ""}, {"title": "Allocation - Catriona Firth, UKRI", "date": "Thu, 11 Feb 2021 00:00:00 GMT", "year": 2021, "season": "", "duration": "16:08", "description": "Catriona Firth, Associate Director for Research Environment at Research England, talks about allocation with Sana Zakaria from the National Institute for Health Research.This is one in a series of Impact Lenses Podcasts from the Impact Frameworks and Cultural Change conference, taking place online on 25-26 February 2021: https://impactframeworks.info/Catriona Firth Twitter: https://twitte   "Substance Use": ["substance","alcohol","drug"],
  "Treatment": ["treatment","therapy","cbt","medication"],
  "Prevention": ["prevention","prevent"],
  "Digital/Tech": ["digital","online"," app ","technology"],
  "COVID": ["covid","pandemic"],
  "Workforce": ["workforce","staff","clinician"],
  "ReSET": ["reset"],
  "Nurture-U": ["nurture"]
};

let currentPage = 1;
const PAGE_SIZE = 12;
let filtered = [];
let activeTopics = new Set();
let selectedEpisode = null;

// Tag episodes with topics
EPISODES.forEach(ep => {
  const text = (ep.title + " " + ep.description).toLowerCase();
  ep.topics = Object.entries(TOPICS)
    .filter(([, kws]) => kws.some(kw => text.includes(kw)))
    .map(([t]) => t);
});

function formatDate(dateStr) {
  if (!dateStr) return "";
  try {
    return new Date(dateStr).toLocaleDateString("en-GB", {day:"numeric",month:"short",year:"numeric"});
  } catch(e) { return dateStr; }
}

function doSearch() {
  const q = document.getElementById("searchInput").value.toLowerCase().trim();
  const year = document.getElementById("yearFilter").value;
  const season = document.getElementById("seasonFilter").value;
  const sort = document.getElementById("sortFilter").value;

  const transcriptOnly = document.getElementById("transcriptOnly").checked;
  filtered = EPISODES.filter(ep => {
    if (transcriptOnly && !ep.transcript) return false;
    if (year && String(ep.year) !== year) return false;
    if (season && ep.season !== season) return false;
    if (activeTopics.size > 0 && ![...activeTopics].some(t => ep.topics.includes(t))) return false;
    if (q) {
      const text = (ep.title + " " + ep.description + " " + (ep.transcript || "")).toLowerCase();
      return q.split(/\s+/).every(w => text.includes(w));
    }
    return true;
  });

  if (sort === "oldest") filtered = [...filtered].reverse();
  currentPage = 1;
  renderResults();
}

function renderResults() {
  document.getElementById("resultsCount").innerHTML =
    `Showing <span>${filtered.length}</span> episode${filtered.length !== 1 ? "s" : ""}`;

  const grid = document.getElementById("episodeGrid");
  const page = filtered.slice((currentPage-1)*PAGE_SIZE, currentPage*PAGE_SIZE);

  if (!page.length) {
    grid.innerHTML = `<div class="no-results"><div class="emoji">🔍</div><div>No episodes found.</div></div>`;
  } else {
    grid.innerHTML = page.map(ep => {
      const idx = EPISODES.indexOf(ep);
      return `<div class="episode-card" data-idx="${idx}">
        <div class="card-meta">
          <span class="card-date">${formatDate(ep.date)}</span>
          ${ep.season ? `<span class="card-season">S${ep.season}</span>` : ""}
          <span class="card-duration">${ep.duration || ""}</span>
        </div>
        <div class="card-title">${ep.title}</div>
        <div class="card-desc">${ep.description}</div>
        <div class="card-tags">
          ${ep.transcript ? `<span class="card-tag" style="background:#d8f3dc;color:#2d6a4f;border-color:#52b788">📝 Transcript</span>` : ""}
          ${ep.topics.slice(0,3).map(t=>`<span class="card-tag">${t}</span>`).join("")}
        </div>
      </div>`;
    }).join("");

    grid.querySelectorAll(".episode-card").forEach(card => {
      card.addEventListener("click", () => openModal(parseInt(card.dataset.idx)));
    });
  }
  renderPagination();
}

function renderPagination() {
  const total = Math.ceil(filtered.length / PAGE_SIZE);
  const pg = document.getElementById("pagination");
  if (total <= 1) { pg.innerHTML = ""; return; }
  let html = `<button class="page-btn" id="pgPrev" ${currentPage===1?"disabled":""}>← Prev</button>`;
  for (let i = 1; i <= total; i++) {
    if (i===1||i===total||(i>=currentPage-2&&i<=currentPage+2)) {
      html += `<button class="page-btn ${i===currentPage?"active":""}" data-page="${i}">${i}</button>`;
    } else if (i===currentPage-3||i===currentPage+3) {
      html += `<span style="color:var(--muted);padding:0 4px">…</span>`;
    }
  }
  html += `<button class="page-btn" id="pgNext" ${currentPage===total?"disabled":""}>Next →</button>`;
  pg.innerHTML = html;
  pg.querySelectorAll("[data-page]").forEach(btn => {
    btn.addEventListener("click", () => goPage(parseInt(btn.dataset.page)));
  });
  const prev = pg.querySelector("#pgPrev");
  const next = pg.querySelector("#pgNext");
  if (prev) prev.addEventListener("click", () => goPage(currentPage-1));
  if (next) next.addEventListener("click", () => goPage(currentPage+1));
}

function goPage(p) {
  const total = Math.ceil(filtered.length / PAGE_SIZE);
  if (p < 1 || p > total) return;
  currentPage = p;
  renderResults();
  document.getElementById("tab-search").scrollIntoView({behavior:"smooth",block:"start"});
}

function openModal(idx) {
  const ep = EPISODES[idx];
  selectedEpisode = ep;
  document.getElementById("modalSeason").textContent = ep.season ? `Season ${ep.season}` : "";
  document.getElementById("modalTitle").textContent = ep.title;
  document.getElementById("modalMeta").innerHTML = `
    <span>📅 ${formatDate(ep.date)}</span>
    ${ep.duration ? `<span>⏱ ${ep.duration}</span>` : ""}
    ${ep.topics.length ? `<span>🏷 ${ep.topics.slice(0,3).join(", ")}</span>` : ""}
  `;
  document.getElementById("modalDesc").textContent = ep.description;
  
  // Transcript section
  const existingTranscript = document.getElementById("modalTranscript");
  if (existingTranscript) existingTranscript.remove();
  
  if (ep.transcript) {
    const tDiv = document.createElement("div");
    tDiv.id = "modalTranscript";
    tDiv.style.cssText = "margin-top:20px;";
    tDiv.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <div style="font-size:12px;font-weight:600;color:#2d6a4f;text-transform:uppercase;letter-spacing:1px;">📝 Full Transcript</div>
        <button id="transcriptToggle" style="font-size:12px;color:#6b7280;background:none;border:1px solid #e8e4dc;border-radius:6px;padding:3px 10px;cursor:pointer;">Show</button>
      </div>
      <div id="transcriptText" style="display:none;max-height:300px;overflow-y:auto;background:#faf7f2;border-radius:8px;padding:16px;font-size:13px;line-height:1.8;color:#374151;white-space:pre-wrap;border:1px solid #e8e4dc;">${ep.transcript.replace(/</g,"&lt;").replace(/>/g,"&gt;")}</div>
    `;
    document.getElementById("modalDesc").after(tDiv);
    document.getElementById("transcriptToggle").addEventListener("click", function() {
      const txt = document.getElementById("transcriptText");
      const shown = txt.style.display !== "none";
      txt.style.display = shown ? "none" : "block";
      this.textContent = shown ? "Show" : "Hide";
    });
  }
  document.getElementById("modalActions").innerHTML =
    `<button class="btn btn-primary" id="aiEpBtn">✨ AI Summary & Repurpose Ideas</button>`;
  document.getElementById("aiEpBtn").addEventListener("click", doAIEpisode);
  document.getElementById("modalOverlay").classList.add("open");
}

async function doAISearch() {
  const q = document.getElementById("searchInput").value.trim();
  if (!q) { alert("Please enter a search query first"); return; }
  const resultDiv = document.getElementById("aiResult");
  const resultText = document.getElementById("aiResultText");
  resultDiv.classList.add("show");
  resultText.innerHTML = '<span class="loading">Searching…</span>';

  const matches = filtered.slice(0, 20).map(ep =>
    `- ${ep.title} (${ep.year}): ${ep.description.substring(0,150)}`
  ).join("\n");

  const prompt = `You are helping explore The Mental Elf podcast archive (774 episodes, 2018–2026, covering mental health research).

The user searched for: "${q}"

Here are the top matching episodes:
${matches}

In 2-3 sentences, describe what this search reveals about The Mental Elf's coverage of this topic. What patterns, gaps, or insights are worth noting? Be specific and useful.`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{role:"user",content:prompt}]
      })
    });
    const data = await res.json();
    resultText.textContent = data.content[0].text;
  } catch(e) {
    resultText.textContent = "AI analysis unavailable. Try again later.";
  }
}

async function doAIEpisode() {
  const ep = selectedEpisode;
  if (!ep) return;
  const actionsDiv = document.getElementById("modalActions");
  actionsDiv.innerHTML = '<span class="loading">Generating ideas…</span>';

  const hasTranscript = !!ep.transcript;
  const content = hasTranscript 
    ? `Full transcript:\n${ep.transcript.substring(0, 3000)}...` 
    : `Description:\n${ep.description}`;
  
  const prompt = `You are helping repurpose content from The Mental Elf podcast archive.

Episode: "${ep.title}"
Date: ${ep.date}
${content}

Provide:
1. A 2-sentence summary for a clinical audience
2. ${hasTranscript ? "A compelling verbatim quote from the transcript (under 30 words)" : "A suggested angle for a pull quote"}
3. Three specific content repurposing ideas (social post angle, blog hook, LinkedIn personal post idea, related series idea)

Keep it practical and concise.`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{role:"user",content:prompt}]
      })
    });
    const data = await res.json();
    actionsDiv.innerHTML = `<div style="font-size:13px;line-height:1.7;color:#374151;white-space:pre-wrap">${data.content[0].text}</div>`;
  } catch(e) {
    actionsDiv.innerHTML = '<span class="loading">AI unavailable.</span>';
  }
}

function buildTrends() {
  const years = {};
  EPISODES.forEach(ep => { if (ep.year) years[ep.year] = (years[ep.year]||0)+1; });
  const yearList = Object.entries(years).sort((a,b)=>a[0]-b[0]);
  const maxY = Math.max(...yearList.map(y=>y[1]));
  const yc = document.getElementById("yearChart");
  const yl = document.getElementById("yearLabels");
  yc.innerHTML = yearList.map(([y,c]) =>
    `<div class="timeline-bar" style="height:${(c/maxY)*100}%" data-year="${y}"><div class="tooltip">${y}: ${c} episodes</div></div>`
  ).join("");
  yl.innerHTML = yearList.map(([y]) => `<div class="timeline-label">${y}</div>`).join("");
  yc.querySelectorAll(".timeline-bar").forEach(bar => {
    bar.addEventListener("click", () => filterByYear(parseInt(bar.dataset.year)));
  });

  const topicCounts = {};
  EPISODES.forEach(ep => ep.topics.forEach(t => topicCounts[t]=(topicCounts[t]||0)+1));
  const topTopics = Object.entries(topicCounts).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const maxT = topTopics[0][1];
  document.getElementById("topicsChart").innerHTML = topTopics.map(([t,c]) =>
    `<div class="bar-row"><div class="bar-label">${t}</div><div class="bar-track"><div class="bar-fill" style="width:${(c/maxT)*100}%"><span class="bar-value">${c}</span></div></div></div>`
  ).join("");

  const seasonCounts = {};
  EPISODES.forEach(ep => { if (ep.season) seasonCounts[ep.season]=(seasonCounts[ep.season]||0)+1; });
  const topSeasons = Object.entries(seasonCounts).sort((a,b)=>+a[0]-+b[0]).slice(0,12);
  const maxS = Math.max(...topSeasons.map(s=>s[1]));
  document.getElementById("seasonsChart").innerHTML = topSeasons.map(([s,c]) =>
    `<div class="bar-row"><div class="bar-label">Season ${s}</div><div class="bar-track"><div class="bar-fill" style="width:${(c/maxS)*100}%"><span class="bar-value">${c}</span></div></div></div>`
  ).join("");
}

function buildIndex() {
  const topicCounts = {};
  EPISODES.forEach(ep => ep.topics.forEach(t => topicCounts[t]=(topicCounts[t]||0)+1));
  document.getElementById("indexGrid").innerHTML = Object.entries(topicCounts)
    .sort((a,b)=>b[1]-a[1])
    .map(([t,c]) => `<div class="index-topic-card" data-topic="${t}"><div class="index-topic-count">${c}</div><div class="index-topic-name">${t}</div></div>`)
    .join("");
  document.getElementById("indexGrid").querySelectorAll(".index-topic-card").forEach(card => {
    card.addEventListener("click", () => filterToTopic(card.dataset.topic));
  });
}

function buildRepurpose() {
  const ideas = [
    { type:"📚 Series Compilation", title:"Children & Young People: The Complete Collection", desc:"119 episodes covering youth mental health — from school-based prevention to university student support. A ready-made listening curriculum for CAMHS practitioners.", episodes:"119 episodes" },
    { type:"🎙️ Thematic Playlist", title:"The Digital Mental Health Story (2018–2026)", desc:"129 episodes trace the arc from early app enthusiasm to evidence-based digital interventions. Ideal as a CPD resource for clinicians navigating digital tools.", episodes:"129 episodes" },
    { type:"📝 Evidence Summary", title:"What We Know About Suicide Prevention", desc:"38 episodes discussing suicide, self-harm, and safety planning. Could be synthesised into a landmark evidence review or commissioned resource.", episodes:"38 episodes" },
    { type:"🔄 Then vs Now", title:"Depression Treatment: 2018 vs 2026", desc:"Compare the earliest and most recent depression episodes to show how evidence and clinical thinking has evolved. A compelling retrospective format.", episodes:"41 episodes" },
    { type:"📱 Social Campaign", title:"#MentalElfTurns8: Greatest Hits", desc:"Surface the most-played or most-shared episodes from each year as a birthday retrospective across LinkedIn, Bluesky and Threads.", episodes:"Top episodes 2018–2026" },
    { type:"🎓 CPD Resource", title:"Workforce Wellbeing Essentials", desc:"93 episodes focused on clinical staff, burnout, and workforce issues. Package as a curated playlist for NHS trusts and training programmes.", episodes:"93 episodes" },
    { type:"📊 Evidence Brief", title:"COVID's Impact on Mental Health: The Podcast Record", desc:"17 episodes document the pandemic's mental health fallout in real time. A unique primary source for researchers studying the period.", episodes:"17 episodes" },
    { type:"🤝 Partnership Pitch", title:"Trauma-Informed Care: A Dedicated Mini-Series", desc:"45 trauma episodes suggest appetite for a standalone series. Could anchor a new funding bid or commercial partnership with trauma training providers.", episodes:"45 episodes" },
  ];
  document.getElementById("repurposeGrid").innerHTML = ideas.map(i =>
    `<div class="repurpose-card"><div class="repurpose-type">${i.type}</div><div class="repurpose-title">${i.title}</div><div class="repurpose-desc">${i.desc}</div><div class="repurpose-episodes">📊 ${i.episodes}</div></div>`
  ).join("");
}

function filterByYear(year) {
  switchTab("search");
  document.getElementById("yearFilter").value = String(year);
  doSearch();
}

function filterToTopic(topic) {
  switchTab("search");
  activeTopics.clear();
  document.querySelectorAll(".chip").forEach(c => {
    const match = c.dataset.topic === topic;
    c.classList.toggle("active", match);
    if (match) activeTopics.add(topic);
  });
  doSearch();
}

function switchTab(name) {
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.tab === name));
  document.querySelectorAll(".panel").forEach(p => p.classList.toggle("active", p.id === "tab-"+name));
}

// Init everything after DOM is ready
document.addEventListener("DOMContentLoaded", function() {
  // Tab clicks
  document.getElementById("tabBar").querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", () => switchTab(tab.dataset.tab));
  });

  // Season filter populate
  const seasons = [...new Set(EPISODES.map(e=>e.season).filter(Boolean))].sort((a,b)=>+a-+b);
  const sel = document.getElementById("seasonFilter");
  seasons.forEach(s => {
    const o = document.createElement("option");
    o.value = s; o.textContent = "Season " + s;
    sel.appendChild(o);
  });

  // Topic chips
  const chips = document.getElementById("topicChips");
  Object.keys(TOPICS).forEach(topic => {
    const count = EPISODES.filter(e => e.topics && e.topics.includes(topic)).length;
    const chip = document.createElement("button");
    chip.className = "chip";
    chip.dataset.topic = topic;
    chip.textContent = topic + " (" + count + ")";
    chip.addEventListener("click", () => {
      if (activeTopics.has(topic)) { activeTopics.delete(topic); chip.classList.remove("active"); }
      else { activeTopics.add(topic); chip.classList.add("active"); }
      doSearch();
    });
    chips.appendChild(chip);
  });

  // Search inputs
  document.getElementById("searchInput").addEventListener("input", doSearch);
  document.getElementById("yearFilter").addEventListener("change", doSearch);
  document.getElementById("seasonFilter").addEventListener("change", doSearch);
  document.getElementById("sortFilter").addEventListener("change", doSearch);
  document.getElementById("transcriptOnly").addEventListener("change", doSearch);
  document.getElementById("aiSearchBtn").addEventListener("click", doAISearch);

  // Modal close
  document.getElementById("modalOverlay").addEventListener("click", e => {
    if (e.target === document.getElementById("modalOverlay"))
      document.getElementById("modalOverlay").classList.remove("open");
  });
  document.getElementById("modalClose").addEventListener("click", () => {
    document.getElementById("modalOverlay").classList.remove("open");
  });

  // Build everything
  doSearch();
  buildTrends();
  buildIndex();
  buildRepurpose();
});
</script>
</body>
</html>
