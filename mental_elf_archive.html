we're pulling it all together. We know that prevention works. We know that relationships matter. We know that early intervention can change trajectories. Unfortunately, knowing this stuff isn't enough, schools are absolutely drowning in demands, bombarded with solutions, and trying to figure out what actually deserves their limited time and energy.\nSo this episode is about making it real. Why prevention isn't just a nice to have. It's essential. What the long-term evidence actually shows, and most importantly, how schools can cut through the noise and implement approaches that genuinely work.\nI'm joined in [00:02:00] this episode by Peter Funy, Essie Viding, Jess Dayton, and RO Law.\nPeter Fonagy: Prevention is, essential because treatment is not enough. Treatment services for depression simply cannot meet the current demand. Optimal evidence-based treatments would only reduce the burden of depression by maybe a third. . Treatment also is inaccessible for many of the groups that need it more, If we can work together to reduce the number of adverse childhood experiences, and replace them with positive. childhood experiences that could reduce the odds of adult depression by 70 odd percent. prevention is really the only cost-effective, evidence-based approach that we can take.\nJess Deighton: I think schools certainly see the need and they see the challenge between those two. It's a tension, isn't it? I mean, it makes. Good logical sense, doesn't it? Then [00:03:00] instead of pulling children out of the river, we wander further upstream and find out what's been causing them to fall in, in the first place.\nBut it's practically, it's very hard to divert your attention from that high level of need towards where you don't feel the need is, and there isn't the thing that's disrupting your classrooms or making you stay up at night worried about that particular child. If we can work at that end of preventing problems arising, we've, we drastically increase the likelihood, they will not need that more kind of specialist help further down the line.\nAndr\u00e9 Tomlin (he/him): / So here's what we've established. Treatment alone cannot meet. Demand prevention isn't optional. It's the only cost effective approach we've got for youth mental health. But just just highlighted the tension that every school leader feels.\nHow do you focus upstream when you're constantly pulling children outta the river right now? When there's a crisis in front of you, prevention feels like a luxury you can't afford. So what if prevention isn't an add-on at [00:04:00] all? What if it's just how you do everything, RO and Jess, over to you?\nRoslyn Law: I think we can look at it on all kinds of different levels.\nThinking about a culture within the school where. Communication about mental health is, is part of the core business. It's not an add-on. For the staff to feel confident in, picking up on early signs.\nIt might be changes in attendance or, changes in behavior and for them just to feel confident maybe having those small. but frequent check-ins that might just deescalate things , let's just take a moment. Let's just think about this. And so the relational strength of that I think is, is really important so that that sense of strong relationships being a primary defense. I've frequently heard young people talk about that knowing who they can go to, knowing that, someone is holding them in mind. So there's a safety in being able to go and ask for that help. Uh, an early point is, is just, hugely important. So there's a kind of normalization that we might talk about, feelings that things can be hard, that we might [00:05:00] help to find the language to express that.\nJess Deighton: We know that those trusted relationships are really important to young people. When you ask young people about where they seek help for their mental health. Of it is a teacher, it's not a specialist. We would never. Teachers to feel like they have to be the mental health specialist. but absolutely they are a trusted person who knows that young person well, and they do quite intuitively, try and seek those connections.\nThey are concerned about those young people. So it's about taking those opportunities to think actually as more support needed does this young person just need to decompress or, find ways to sort of manage a bit better? those are all things that teachers actually. Do very well and a complete rhythm, their gift.\nCan we sort of normalize the experience of everyday emotions? Can we help young people to manage those? Can we point them to their support networks and also be part of that support network? You know, these targeted interventions like the one, tested within reset, can we, think about how they can, help, in the early stages of the course of a problem? and it is very much about. Recognizing that as much as these things are all helpful pieces of the puzzle, [00:06:00] each one is gonna make a small contribution. and it really is about having a whole school approach. So thinking about, yes, all the interactions, the culture of the school, the leadership as well around saying, this is what we're about, we're interested in your people's wellbeing and their mental health. and also thinking about the wider system and how it links with, more specialist support might be, facilitated as well.\nAndr\u00e9 Tomlin (he/him): So prevention in schools isn't about adding yet another thing to your already impossible to-do list. It's about normalizing conversations about feelings. Building trusted relationships. Creating a culture where checking in is just what you do. It's vital to recognize that teachers are not being asked to become therapists. They're already the trusted adults. The question is how we support 'em to recognize early signs and have those small frequent conversations that can deescalate things before they spiral.\nBut hang on. Does this actually work in the long term, [00:07:00] or are we just making ourselves feel better? Here's Sie summarizing what the evidence actually tells us.\nEssi Viding: Evidence to date is quite patchy. As Jess has very nicely outlined, I think the picture that is building is that it's complex. There isn't the one. fits all solution. There are multiple things that are important, each of which probably have a small nudge effect, and I am increasingly thinking about prevention and early intervention as the first vaccination, which then needs to be followed up by booster shots that are developmentally appropriate for it to be effective. \nIt's beneficial if you have an early intervention. Proven efficacy, but it's unlikely to fix everything and there is likely to be need for follow-up interventions that are appropriate for that different developmental stages.\nJess Deighton: There's an economic case to be made for the long-term benefits of preventative interventions. It is, as SIE says, it's, it's thinner than we'd [00:08:00] like. but certainly for some parenting programs and some school-based programs, that evidence is there. And if you want real world examples of really good. Prevention and long term follow up. It would be short start, wouldn't it? Which showed great effects in the longer term, not so much in the short term. And I think it's quite interesting that some of the research findings that have come out very recently, like with the best trial and with resets, we can see actually the benefits do seem to play out in the longer term, a bit better than in the short term.\nwhich is really encouraging. I think the main obstacle, and particularly in complex systems like schools, is implementation and sustainability. and. The problem with busy changing complex systems like schools is that the gaze moves on. And, we need to encourage, schools and those who should be supporting and facilitating schools to do this, have that gaze move on to make sure that we maintain the priority that we, incentivize doing. The evidence-based thing, I'm sticking with it, not doing the bright, new, shiny thing. And schools are often bombarded by, what I call the shampoo ad interventions that sort of mention science, but we [00:09:00] can't quite find the evidence base for them. and it's, you know, it's not, it's not, they don't have the time to sift through the evidence to work out what, what's the right thing to do.\nAnd that's why we should be really helping them with choosing also with helping 'em think about how they embed this in the long term.\nPeter Fonagy: If we encourage agency autonomy, curiosity, competence, adaptation, resilience, discovery in young people, , these will drive development in a positive way later on. There are some general rules, , schools could learn from. , For example, the importance of relationships that actually they can implement that are preventative, and more likely to lead. On a healthy path after school, in these individuals. And the time to start is now.\nAndr\u00e9 Tomlin (he/him): So the evidence is patchy. Sie is being refreshingly [00:10:00] honest about that. It's complex. There's no one size fits all solution, but it is encouraging that the benefits often show up better in the long term than the short term. Think of it like the first vaccination that needs booster shots, the real obstacle implementation and sustainability.\nSchools get bombarded by what Jess brilliantly calls shampoo ad interventions. They mention the science, but where's the actual evidence base? Buying tons of shampoo is just an obsession with the next shiny thing. Which brings us to reset specifically. You've heard about it across the four episodes of this podcast. Now let's talk about what makes it different.\nEssi Viding: . The trial did was to really explicitly bring together how your mind impacts your social environment and how your social environment impacts your mind. and I think it helped the young people, not only to. about and understand their own [00:11:00] feelings and how they might recognize them and regulate th our research and with the interventions that we can put in place.\nPeter Fonagy: The ReSET. Project matters because it shows that science can deliver for practice.\nAndr\u00e9 Tomlin (he/him): / Okay. We've covered a lot of ground. Let me give you the key takeaways that you need to remember from this episode. First, prevention is not optional.\nTreatment cannot meet demand. Optimal treatment would only reduce depression burden by about a third. Reducing adverse childhood experiences could reduce adult depression by 70%. Prevention is the only cost-effective evidence-based approach. Second, prevention isn't a [00:22:00] program, it's a culture. It is normalizing conversations about feelings, building trusted relationships, making those small, frequent check-ins, part of how you operate.\nTeachers don't need to be therapists. They're already the trusted adults. Third, the evidence is complex, but encouraging benefits often emerge more clearly in the long term. Think vaccination plus booster shots, not one-off fixes. Even when we know something works, getting it embedded and sustained in schools, that's where most initiatives fall down.\nFourth, preventing mental health problems directly enables learning. When children are stuck in anxiety or mistrust, their epistemic superhighway is blocked. Prevention creates the conditions where education can actually happen. It's not separate from your core mission. It is your core mission. And fifth, you need trusted sources to cut through the noise.\nWhen someone pitches you [00:23:00] an intervention, ask, where's the peer reviewed evidence that this has worked? Resources like the Anna Freud Center's Mentally Healthy Schools website exists specifically to help you navigate this landscape. So here's your practical challenge This week, identify one shampoo ad intervention that your school is currently running.\nSomething that sounds great, but you're not sure there's actual evidence for, and ask the question, can you show me wh t poor friendships that lead to poor mental health or vice versa.\nWe know that they can exacerbate each other. so it can be a positive cycle so young people can feel better through their peer relationships and then that might promote new friendships and so on. But it can also work in the reverse. So young people who are struggling with their mental health might become more isolated, or they may be patterns, that can actually make their mental health symptoms worse  \nPasco Fearon: I'm hoping that there's quite a few teachers listening to this and actually you can be a force for good in a young person's life through the connections that you make with them. \nAndr\u00e9 Tomlin (he/him): Hello and welcome back to the ReSET Podcast. [00:01:00] I'm Andre from the Mental Elf. We've covered a lot of ground in this series so far. In episode one, we looked at why targeted interventions work better in schools than universal approaches. And then in episode two, we focused on the emotional skills that young people need to navigate adolescence. Today we're tackling social relationships, which of course matter to all of us, not least because our mental health and relationships are completely entwined. If you're struggling emotionally, you might withdraw from friends, which makes you feel worse, which pushes people further away.\nOr maybe your peer relationships are toxic, which damages your mental health, which makes it harder to maintain healthy friendships. It's a cycle and it can spiral either way. The ReSET trial was designed around this fundamental truth. How you feel affects how you relate to others, and how others treat you affects how you feel. You can't separate the two.\nToday I'm talking with four people who understand this deeply. Pasco Fearon from Cambridge [00:02:00] co-leading the ReSET trial. Lucy Bowes from Oxford, researching peer relationships and bullying. Ren\u00e9 Veenstra from the University of Gronigen in the Netherlands, expert in adolescent social networks and Ros Law from the Anna Freud Centre who delivered ReSET groups in schools.\nLet's start with why peer relationships matter so much during adolescence. Here's Pasco, Lucy, and Ren\u00e9.\nPasco Fearon: When I say key relationships, I'm often talking about family. But the relationships they have with close friends in particular, but also their sense of, being connected to a social group is really, really key for their sense of who they are.\nYoung people's relationships with their peer group is really fundamental and gets more and more important as they go through adolescence.\nLucy Bowes: Teenage years are complex. And certainly peer influence and peer relationships seem to gain primacy. So teenagers want to spend more time, with similar age peers and they look to them to understand their sense of self. but it's not like they completely disconnect from parents [00:03:00] either.\nThey need that and they need that mutual support.\nNegative peer experiences. Things like bullying, victimization, as well as things like social isolation. We know that they can be a really serious risk factor for poor mental health, , among young people.\nRene Veenstra: Parents still play a role, uh, also other adults do. They prefer to have advice from their friends. But as research has shown over and over again that if parents still play a role in the background, they get better So in that sense, adults still play a role. And also teachers can set the norm so they can really can. Help the class go into a good direction.\nPasco Fearon: I'm hoping that there's quite a few teachers listening to this and actually you can be a force for good in a young person's life through the connections that you make with them. \nAndr\u00e9 Tomlin (he/him): So here's what we've established so far. Peer relationships become crucial during adolescence. Parents still matter. Don't let your teenagers convince you otherwise. But friends take [00:04:00] on new importance. And if you're a teacher, of course ecause if they want, they are able to do something. they are powerful. [00:06:00] And, there were others that, continued with bullying and at some moment they were more and more rejected by, by the school.\nAndr\u00e9 Tomlin (he/him): Did you catch that? Social hierarchies get established in the first days and weeks of secondary school? Not months, not years, but the first few days, some kids bully strategically to establish dominance, then stop. Once they've secured their reputation, others keep going and end up rejected. It's calculating, it's uncomfortable, and it's exactly the kind of social complexity that tweens and teens are navigating every day. So how do friendships and mental health influence each other? Can surrounding yourself with the wrong friends actually make your mental health worse? Back to Ren\u00e9. \nRene Veenstra: first of all, what we see is that, for example, a adolescent selects friends who, who are similar to them and, well in all kinds of [00:07:00] aspects. so it can be a mental health, for example, if you think about depressed a adolescents, they, they tend to befriend other, the depressed, peers. can worsen over time, through a process that we call co-rumination. so reinforce the negative feelings in each other and, they ruminate in the sense that they talk it over and over again.\nWe found something that we call the healthy context paradox. So, If schools do a very good job and, um, the level of bullying is at a very low level, well, if you remain a victim in such a situation but you are still the one that is, bullied and you feel even worse. That's because if you are surrounded by other, fellow sufferers, um, then you often have the feeling, well, well, there's nothing wrong with me. But if you are really the only one, then you really start to internalize it\nAndr\u00e9 Tomlin (he/him): isn't that healthy context paradox? [00:08:00] Fascinating and heartbreaking in schools that successfully reduce bullying? The few remaining victims a nships, versus how you sort of fit in with a larger social group there are also different strategies that you have to think [00:10:00] about from a school point of view or from a practitioner point of view.\nSo it's, it's really good, I think, to hold those two things as, clearly distinct. If you measure social relationships repeatedly over time and you measure depression symptoms, for example, repeatedly over time, which one's driving which.\nIf a young person is struggling, it's more likely to predict deterioration in their social relationships future forwards in time than the other way around. again, it really highlights the inter, dependency between how you are feeling basically and how you're getting on with the people around you.\nAnd sometimes how you are feeling can, can then start to lead to you withdrawing from the social. Group having an sort of an impoverished social network around you, which then can compound your, mental wellbeing and lead to mental health problems. So we've gotta think about these things as, as very sort of bi-directional.\nAndr\u00e9 Tomlin (he/him): So there's a fundamental loop at work here struggling with mental health leads to social withdrawal, which compounds mental health problems, which further damages relationships. Which [00:11:00] brings us to ReSET's approach, the ME and WE Strategies.\nPasco Fearon: This sort of fundamental connectedness between how you are feeling yourself, your own emotional state, you know what's going on for you, and, and, and what's happening around you.\nIE. You know the people in your lives and these two things, we often kind of think of them a bit separately. So you might have a mental health intervention, that is focusing on what's going on in your mind. and it's very much about the internal state. or you might have a sort of social intervention that's about young people's relationships. And we're, we we're trying to say, well, look, wait, these things are so fundamentally connected, like how I young people to think, should we go for a WE strategy here, or should we be thinking about a ME strategy? Or maybe we need to do both. What do you think? \nAndr\u00e9 Tomlin (he/him): ME strategies are about managing your own emotional state. Check in with yourself before a difficult conversation. Are you in the right head space? WE strategies are about changing what's happening in your relationships. Pick the right moment. Think about how the person's feeling.\nSometimes you need ME. Sometimes you need WE. Sometimes you need both. Ros is about to give us a concrete example of a WE strategy that came up lots in the reset groups. \nRoslyn Law: If they wanted to talk to their parents, when is a good time to have a chance that somebody's got a bit of mental space to listen to you?\nIf they're, in the middle of cooking dinner or putting your little brother and sister to bed like you know, they're, they're gonna be busy [00:14:00] and they're not, might not have a lot of extra space. To pay attention to you. So thinking about when is a good time for you, you feel able to say what you want to say, but somebody else might have a bit of mental space to listen to you and hear.\nThink about either the timing or the way you phrase something, just to stack it a little bit more in your favor. A little bit more likely that you'll get your point across and it will be received.\nLucy Bowes: it's a really fantastic way of framing it because anything that makes young people feel more connected and supports their relationships is gonna be positive, um, in the long run. And what's really nice about these is they're very practical solutions. So it's not, not having difficult conversations, it's thinking as Pasco said about timing, when to have them, when's good.\nAnd those are the kinds of more subtle things that you do have some control over. And that can make a real difference when you're talking with other young people, but also with teachers and with parents. So this kind of. Scaffolding to help young people learn. Otherwise, they have to try to learn that themselves through trial and error. And that can be quite challenging. [00:15:00] And I would guess that it could be more challenging, for some students, more than others. So students with, preexisting difficulties, mental health difficulties, but also those with, you know, social and emotional. young people who are neurodiverse may, find it challenging to read these signals.\nSo having really clear, practical strategies that you can put into action, I think is a, is a really fantastic idea. \nPasco Fearon: cause you know, there are loads of strategies that you can use there's a reason why ReSET is focused particularly on what can the young person do themselves. 'cause they're in the group a lot. A lot of what Lucy's doing in, in terms of intervention research is also looking at how, how does the rest of the school can create an atmosphere that supports this too.\nAnd in my. Mind, ideally we'd be doing all of these things 'cause you kind of need all the bits of the puzzle to kind of, fit together \nRoslyn Law: One of the things I liked about it is that we would build it up very, very slowly. So we tried to make the group as safe as possible, so we wouldn't ask young people for their own examples right away. We provided. standard examples that were maybe typical [00:16:00] interactions. These had been generated by other young people who helped us to develop the group and we would run them through, with the group.\nSo in this scenario, let's think about how we might approach it and we would then introduce one or two of the strategies each week, practice them. So for the first few weeks, they were actually just gathering information and ideas. They had visuals, they had visual prompts and reminders, but they were applying them to recognizable but not personal examples.\nBy the time we get to about the middle of the group, we're then inviting them to see, okay, if there's anything happening in your life that you think you might be able to use this, that starts to become a little bit more applied into their own life, but with lots of practice already having happened in the weeks running up.\nAndr\u00e9 Tomlin (he/him): Notice what Ros described there. They didn't jump straight into tell us all your problems. They built safety first. Practiced with [00:17:00] generic examples from other young people, and only later invited students to apply strategies to their own lives.\nReSET focuses on individual skills in small groups, but what about changing the whole school culture? Lucy and Ren\u00e9 are about to talk about broad approaches using influential students as allies to shift social norms. \nLucy Bowes: A lot of the work I do is thinking about ways to, improve peer relationships and also student connectedness. They feel more connected with school and have a more positive time at school through various different strategies. They could be adolescent led interventions where young people help, co-develop strategies to help promote pro-social behaviors throughout their school, for example.\nSo how we can act nicely with each other. They can become researchers themselves and decide what are some key challenges in their school? what would they like to do to try to make that better? But the really core idea behind it is to, build a sense, of connection, to [00:18:00] build those positive relationships, to make sure that everyone is involved. One of the things we think is really important is this kind of whole school approach. you can't just break it down. I think as, as you were saying there, Pasco to just individuals, it really does need to be a collective effort. And we know from systematic reviews where they've looked through lots and lots of different studies for different interventions to promote positive outcomes for young people.\nThose whole school. interventions that incorporate things like social and emotional learning from teachers, peer components, and many other components of the intervention that support young people's relationships tend to do better.\nRene Veenstra: adolescents are much more willing to listen to each other than to adults. Schools, can, influential students as kind of allies. and if we focus on, how we can shift what is seen as school.\nwe can ask, influential. Students, to make presentations or other campaigns. and maybe, that leads to a situation where helping others is, is, is, well [00:19:00] becoming the standard in the school. and we should very much focus also on, what we want. terms of positive behavior. So we should, not, punish bad behaviors, But we should think about, what are the positive behaviors that we want to create. and if schools want to work with, teenagers as allies, then they should have, short surveys in which they, find out who are the popular kids in school but also find out the mental health of the teenagers and, whether there are kids who are fairly lonely things like that. So, um, having, uh, students on board, is probably the most promising way to intervene in, in adolescents.\nIf we talk about, having, influential peers as allies, we should realize that not every influential, teenager se a positive, teenager. So there are many, teenagers that, can be easily be seen as very negative role models. So in that sense, schools should do a good job in finding out who are really the, [00:20:00] positive leaders. And if some of the kids in the class are, are negative, leaders. then it's interesting to know that, um, with an anti-bullying program that we use in, in primary school in the Netherlands, at the Kiva intervention, we were able to, Transformed some of the negative leaders into positive leaders.\nSo that was really, a very neat finding. so we saw that, after one year of intervention, of the negative leaders were no longer, negative leaders, but really turned into positive leaders. and that made sense because the Norman school had changed. So, the Norman school was much more focused on the we and, we wanted to have a school in, in which everyone had a good time and that we stopped, bullying and that we help each other. And, many of the negative leaders somehow, realized that and, uh, turned into positive leaders and the ones that continued, to bully they were at some moment really seen as, as bullies and no longer as leaders. So that's really nice that these things are not set in stone. [00:21:00] \nAndr\u00e9 Tomlin (he/him): That transformation of negative leaders into positive leaders is the power of changing school norms. when the culture shifts to we help each other, even the bullies adapt or get left behind. But here's Lucy's crucial reminder. Emotional skills and social skills are completely interconnected.\nWhen young people struggle emotionally, they withdraw and they lose communication skills. But when you support their social skills, they feel better about themselves, which reinforces positive social behaviors. It's all connected, which is exactly what ReSET was designed around. So what's the practical takeaway for teachers and for schools?\nLucy Bowes: Creating a school environment where young people feel enabled to have those conversations and listened to is going to be really, really key. That can happen in all sorts of ways, but it, it's about sort of breaking down some barriers. So enabling those kind of, discussions to be had in a [00:22:00] meaningful way. So listening to young people I think is really, really essential. and actually one thing that I, I thought I should highlight, we are, as scientists often interested in modeling. Um, so we think it matters how we behave and how we talk to young people. And I think we have to acknowledge that teachers are under an extraordinary amount of stress. And we know from other trials that teachers are often struggling because they're under so much pressure and we're expecting a lot of teachers, if we are. Hoping that they will also model good self-regulation strategies, good communication strategies, and they need to be supported so that they can do that. So this is not really just for teachers. I think that's a, that's a call out that we need to better support schools and the whole school system so that teachers are able to model these kinds of things to their students, which we know also will be helpful. \nRene Veenstra: How are teachers trained in the uk? how much attention is paid to, uh, peer processes? and my bet would be that it's not much. teach training in, uh, the Netherlands, last for four years.\nbut in these [00:23:00] four years, if they have more than four days on, The group dynamics and the peer relations, it's already a lot. and that worries me because I think that most of the teachers, if they have a hard time with the job, it's not because, the content that they're teaching is too difficult, it's the relationships that they have, the relationships with their colleagues. some schools can be horrible and very toxic environments. the relationships that, they have with, the children, and sometimes also the relationships with the parents. and teachers have, such an important, so we should train them very well. And otherwise, we should not be surprised if the burnout rate is high among teachers and if they, uh, move to other jobs.\nPasco Fearon: I'm sure that's right. you know, I'm not that close to teacher education training, but, so much of the focus is, on, you know, delivery of the curriculum and planning your classes and so on.\nAnd if it is about young people, it's gonna be about kind of crowd control. and then you learn the hard way or the slow way about how to handle the subtleties of, group dynamics and interpersonal relationships.\n[00:24:00] I think we sometimes need to think more holistically about what are these things doing for the community that is a school and the young people in it. It's, more than just, academic outcomes. It's, about supporting relationships. It's about supporting identity. So important for young people to feel a sense of, being good at something or being able to excel or, or to be connected with a load of other people in a way that's different to how it feels for most of the rest of the school day.\nReSET was, was, you know, because it's working through young people and in a group setting, it's much better placed.\nTo support those kind of close relationships than it is about the school culture. So we develop ReSET so that it could be delivered by.\nMental health practitioners, for example, people working in the mental health support teams within schools, or the mental health lead whose role it is to, create sources of support for young people who might be at risk of having difficulties with mental health.\nso it doesn't all fall , on the shoulders of teachers 'cause they've, got an awful lot on their plates already. So it's gotta be a a team effort and different people can, tackle different bits of that puzzle.\nAndr\u00e9 Tomlin (he/him): [00:25:00] Okay, it's time to bring this all together. We've covered peer dynamics, social hierarchies, , ME and WE strategies and whole school approaches. Here are five things schools need to understand about social relationships\nFirst: peer relationships are not optional extras. They're fundamental to mental health. During adolescence, one close positive friendship can buffer against serious mental health problems. Schools need to actively support these connections, not just hope they happen\nsecond: the first weeks matter a lot. Social hierarchies get established in days, not months. Year seven, transition is critical.\n Third: mental health and relationships are bidirectional. You can't just fix one and expect the other to follow. Struggling students withdraw socially, which makes mental health worse, but supporting social skills helps them feel better which improves relationships, [00:26:00] both directions matter.\nFourth: ME and WE strategies give students agency. Sometimes you need to manage your own emotional state before a conversation. Sometimes you need to think about timing and how the other person is feeling. Teaching both gives young people actual tools, not just abstract advice about being resilient.\nAnd fifth: you need multiple levels of intervention. ReSET works on close relationships in small groups. Whole school approaches shift broader social norms. Teacher training needs to cover peer dynamics and group processes. It's not one or the other. You need all the pieces. So here's your challenge. Pick one relationship building practice to focus on this term.\nMaybe it's being more intentional about year seven, transition. Maybe it's identifying and supporting students who lack that one close friendship. Maybe it's finding your positive [00:27:00] student leaders and empowering them to shift norms. Start somewhere, build from there. There's loads of resources at resetproject.co.uk and annafreud.org\n Next time in our final episode of the series, we're pulling it all together, why prevention matters and what the long-term benefits can be for schools and young people. Thanks for listening."}, {"title": "Teaching emotional skills to young people - ReSET School Mental Health", "date": "Tue, 20 Jan 2026 07:30:00 GMT", "year": 2026, "season": "19", "duration": "27:55", "description": "Emotional Skills in Adolescents - Preventing Mental Health Problems Episode 2 of the ReSET podcast focuses on the importance of emotional skills for adolescents and how these can prevent mental health issues like depression and anxiety. Host Andr\u00e9 Tomlin from The Mental Elf explores the key findings from this huge research project led by scientists from UCL and Cambridge, with panelists Professor Essi Viding, Professor Nico Steinbeis and Jenny Sole. They explain how emotional skills, such as the", "url": "teaching-emotional-skills-to-young-people", "transcript": "RESET podcast 2 - Supporting emotional skills\nNiko Steinbeis: [00:00:00] Life can be stressful. and teenage life in particular chronic stress can lead to depression or anxiety, and that's exactly what these emotional skills are there for, because it allows us to deal with stress in adaptive ways and they can help prevent the onset of mental health problems. \nEssi Viding: Skills such as your ability to recognize what other people are feeling, what you might be feeling yourselves, and also your ability to regulate those emotions. All of those abilities are critical for successful social interactions. \nJenny: There is an investment in a school to say, we care about you and we care about your emotional development and your wellbeing enough to allow you to step out of your classes to come to this group. \nAndr\u00e9 Tomlin (he/him): Welcome to episode two of the ReSET Podcast. I'm [00:01:00] Andre from The Mental Elf In the first episode of this four part school-based mental health series, we tackled the big debate universal interventions for everyone, or targeted support for those who need it most.\nThe evidence was clear, targeted works better, and it doesn't have to be stigmatizing, but of course that leaves the crucial question, what should those targeted interventions actually teach? That's what we're exploring today. Emotional skills, helping young people recognize their emotions, regulate them, and use that understanding to navigate the social minefield of adolescents.\nHere's why it matters. Teenage brains experience emotions. With the volume cranked up to 11, everything feels more intense, more overwhelming, more urgent. The brain regions for experiencing emotion are firing on all cylinders, but the parts that regulate them are still under construction. Today I'm talking with three people who designed and delivered emotional skills training in the ReSET trial.\n[00:02:00] Essi Viding, professor at UCL and co-principal investigator on the project. Nico Steinbeis professor of Developmental neuroscience at UCL and Jenny Sole clinical psychologist who actually ran ReSET groups in schools. Let's start with the fundamentals. What are emotional skills? \nEssi Viding: We mean skills such as your ability to recognize what other people are feeling, what you might be feeling yourselves, and also your ability to regulate those emotions. All of those abilities are critical for successful social interactions. being able to stay calm in situations that require it, being able to recognize what someone else might need from you being able to relate to other people. So they're really fundamental building blocks for successfully interacting with other human beings, both peers and also adults or younger children,\nNiko Steinbeis: Being able to recognize emotions and regulating emotions, that's sort of what [00:03:00] makes up this, particular set of skills. Regulating emotions refers to all the different ways in which we can regulate ourselves when we're experiencing negative emotions like worry or fear, like before an exam, for instance or when we find ourselves in a situation when our affect might be inappropriate, like laughing in church as an example that I always give, you know, we sort of try to, you know, use particular strategies to regulate ourselves. and it's a, it's sort of a real gamut of different strategies that you can use.\nSo A few have been identified, like trying to reappraise a situation, to feel different. So telling ourselves, for instance, that an exam might not be as important as we think it is, we can suppress an emotion pushing out any thoughts, We can try and distract ourselves, by thinking about something else entirely. or we can sort of choose to act in ways which avoid the situation, the emotional situation in the first place. So that sort of makes up an inventory. Of regulatory skills, which can be used and applied in various ways.\nAnd there's something during adolescence, which is particularly [00:04:00] striking. a developmental mismatch in how these brain regions come online. So amygdala and ventral striatum is sort of fully functional, quite early in development, the prefrontal brain regions develop at a slightly later pace. Um, and adolescents is effectively a period where this mismatch becomes particularly striking. So these emotions are experienced very, very intensely. But, the regions that allow us to regulate those emotions aren't fully baked as it were. So, then that can lead to sudden outbursts of, both positive and negative emotions, which they have a hard time regulating.\nEssi Viding: Of course during adolescence, it's also a developmental period where people increase in independence and they have to increasingly negotiate their own social relationships without scaffolding from the adults. All of these emotional skills are really put to test more so during adolescence that they have been during the earlier developmental stages where the adults in some ways take on some of the regulatory roles. you can almost think of them as an outside [00:05:00] frontal cortex for the child, which is increasingly not there as the child increases in independence.\nAndr\u00e9 Tomlin (he/him): Emotional skills are about recognizing what you and others are feeling and regulating those feelings. Using strategies like reappraisal or distraction. Emotions hit incredibly hard during adolescence, but the brain's regulatory systems are still developing. It's like having a Ferrari engine with learner driver brakes.\nSo what does this actually look like in a classroom? What happens when a teenager walks in carrying intense emotions that they can't regulate? Jenny's about to paint a picture that you'll recognize \nJenny: It's so interesting to listen to the science discussed by Essi and Nico, because it just maps onto my clinical experience so clearly. I was thinking particularly around just the intensity that emotions are experienced by adolescents. I can think about children that I have worked with who may have a falling [00:06:00] out with a peer at, at, lunchtime and return to the classroom with these really intense feelings of upset or anger or frustration that is so consuming.\nIt's impossible to concentrate on what's being asked of them in the classroom. And you can see how this can really escalate because returning to the classroom, but feeling these really intense feelings, um, highly distracted by them, could lead to the attention of a teacher. And that teacher getting frustrated about their lack of engagement, perhaps experiencing them as disengaged or disinterested and getting quite frustrated and cross towards the young person \nAndr\u00e9 Tomlin (he/him): So the escalation that Jenny described could be thought of as simple, bad behavior, or we could consider things a different way and see a young person experiencing emotions so [00:07:00] intensely that they can't focus, engage, or learn. Now, let's think about what compounds this new schools heavier workload, increasing independence from parents.\nHigh stakes peer relationships, constant social comparison. How many year nines in your school are carrying that level of stress every single day? Here's the critical bit. Emotional skills create a buffer. They help young people deal with stress before it becomes anxiety or depression. So what does the evidence tell us about how these skills actually protect mental health?\nNiko Steinbeis: Life can be stressful. and teenage life in particular chronic stress can lead to depression or anxiety, and that obviously then interferes with, everyday life and in particular, you know, cognitively. Demanding tasks like learning. So I think just sort of having that, well, developed arsenal of skills can be really helpful in dealing with, um, stress as it arises.\nAnd that's exactly what these emotional skills are there for, because it allows us to deal with stress in adaptive ways [00:08:00] and they can help prevent the onset of mental health problems.\nJenny: We know that the most important people to adolescents are their peers, and we know that peers experience emotions like embarrassment, so intently and ultimately all adolescents are socially anxious, not in a kind of diagnosable social anxiety way, in a highly developmentally appropriate way, that it's really nerve wracking to talk out loud in front of your peers and, you know, engaging in learning, answering questions, asking for help, presenting your work to your peers.\nAll of those things do require those emotional skills in regulating to get to a level where you can perform. and so if, that anxiety is feared so intensely that you can't take those risks, you can't speak out in your class, actually, it can have a detrimental effect on your learning. \nNiko Steinbeis: Recognizing an emotion. It allows you to do several things. It allows you to name and label what you're experiencing, [00:09:00] which in and of itself can be helpful 'cause it makes the emotional experience less overwhelming. it also allows you to deal with that emotion more effectively. for instance, you can communicate it, you can sort of understand why things are happening.\nAnd likewise for emotion regulation, if you're feeling really anxious or sad about something, as we discussed before, it'll stop you from being able to engage with other things around you, like learning in class or interacting with friends, which can have a really massive impact on your wellbeing.\nThere's a lot of evidence to suggest, that struggling with recognizing or regulating one's emotions is related to mental health problems, or it creates a vulnerability to mental health problems down the line. And that by the same token, actually having well honed emotional skills. Can create a buffer against developing mental health problems later in life, there's a quite a solid evidence base at this point to suggest that how exactly these skills might be helpful for mental health outcomes.\nEssi Viding: The point of the ReSET was to really use evidence-based strategies that we already had, but try and use them in a way that [00:10:00] links together the understanding and the practices about. Emotion processing and regulation and also, social relationships. And we wanted to do this in a way that really emphasized skills in a positive way. So this was not a clinical intervention. This was focusing on high risk adolescents in the top quartile, for mental health symptomatology, but they weren't seeing in clinics at the moment.\nSo the idea for the intervention was that in a group-based setting, the children would engage both in doing. Cognitive training on tablets, training, for instance, whether they would perceive an ambiguous face as angry or as positive. So this is a. Face that you couldn't say whether it is angry or whether it is happy. And depending on your bias, you might interpret it as negative or positive.\nAnd you can imagine a lot of situation in real life where you're not quite sure, but did someone look at you in a funny way or not? But you probably end up having a set of much nicer interactions as you [00:11:00] go through life if you assume that the intention. By and large was, was benign. Similarly, if you are able to regulate your emotions by either reframing what actually happened or by distancing yourself and thinking, I'm gonna park this. let's come back to it later. That may serve you very well in number of complex social situations that we all inevitably face throughout our lives. So we wanted to do this cognitive training and help the students explicitly link it with the social interactions and in group based more real life, type, practices.\nSo. might look very weird. How, how do I benefit from doing this weird games on a tablet where I learn to recognize faces or where I think about. Uh, distancing myself from imagined situation that is aggravating. But if you explicitly tell the young people, well, these, these are the skills you're training here and here's how it might help you in real life.\nSo in real life, if you actually see someone you're not sure [00:12:00] how they feeling, assuming that they might be positive most of the time will serve you very well and will result in more pleasant interactions than if you assume that they were hostile.\nJenny: It is actually talking about the things that young people want to talk about. So young people want to talk about their relationships. It is the thing, and prior to me doing any interpersonal training, it was always a bit of an inconvenience to hear about the relational problems and the fallouts and the arguments and breakups because it wasn't, about the mental health problem.\nSo first thing to say is to draw. Relationships and emotional skills together does actually give permission to talk about the thing that really is on the minds of young people, they're very forthcoming in bringing examples.\nNiko Steinbeis: I suppose there's something about that process where people are getting together in a group and speaking about experiences, which otherwise they would be dealing with entirely by themselves, new experience, very intense experience, and they just go away and, and stew and ruminate.\n[00:13:00] And here they have an opportunity to reflect. And even those, those experiences might differ the fact that you're hearing about other people having similar experiences. It sort of normalizes it, not going away thinking that there's something wrong with you, which you know, would then trigger a cascade of otherwise unhelpful thoughts.\nEssi Viding: There's something also very wonderful during adolescence about not talking to your parents. So while your parents might not be able to get something out of you, your peers might, or even another, another adult who's not the adult that your develop your developmental task is to separate a bit from your parents. Uh, so I, for instance, with my own children, I've. I want to know who they hang out with and I think it's great that they have brilliant friends and I want to try and provide a home where they can congregate. But I've also tried to ensure that they have other adults in their lives who I think are sound people, but who they might find it easier to talk to than me at certain times.\nAnd I think that's really, really important. I think those groups have provided both peers and other adults who are [00:14:00] not, parents.\nAndr\u00e9 Tomlin (he/him): So we've heard the science well-developed emotional skills create a buffer against mental health problems. Recognizing emotions makes them less overwhelming. Regulation helps you engage with learning and relationships. And ReSETs approach cognitive group training on tablets. Learning to see ambiguous faces is positive rather than negative.\nPracticing emotional distancing. Then explicitly connecting those skills and others to real life situations. In group discussions, young people actually want to talk about this stuff, not their mental health problems, their relationships. The fallouts. The dramas ReSET gives them permission and the tools to do exactly that.\nSo what do these me strategies, the personal emotion regulation tools actually look like in practice?\nJenny: I think keep calm and breathe. Pizza breath is this ability to breathe in for [00:15:00] three. As if up the side of one of the triangle sides of the pizza, hold in for three, going across the crust of the pizza, and then breathe out for three. It is something we could do in the group.\nWe did it all together. it was a really lovely strategy to think, but not only teach the breathing strategy, but to think with the young people about when might you use that strategy when do we notice that our breath has become shadow? Or when do we notice that this emotion is so intense? It ties with some of the we strategies around when we're going to have a conversation. Because if we notice that we are not quite ready yet, we might wanna employ some key calm and breathe before we go into to approach an interaction with somebody.\nI think distancing was such a massive shift for one of the boys in our group who was neurodivergent. and actually had a enormous kind of swings in emotion and would get quite intense emotional responses to things that would happen. and he really, [00:16:00] really took to this one strategy so much that.\nHe pretty much used it to everything and it became his way of managing. So distancing is this experience of saying to myself, is this gonna bother me in a week's time, in a month's time, in a year's time? and for this young person who was quite highly impulsive, so had really intense emotional reactions, but also quite quick responses.\nActually, it just seemed to be the thing that just slowed it all down for him to check it out and go, hang on a minute. Is this such a big deal? the sheer kind of task of that just became such a useful tool for him, and when we had our mid sessions with his parents, actually, they really reflected that there was less arguments at home.\nHe was able to walk away from things a bit quicker. He seemed to be falling out with his peers less at lunchtime. So it was just this really lovely illustration of where he'd kind of learn this me strategy and was able to [00:17:00] put it into real life practice, both with his peers, but also with his parents too, and with his teachers. \nAndr\u00e9 Tomlin (he/him): That's the power of finding the right tool at the right time. One strategy will this matter in a week, a month, a year? Gave him just enough pause to regulate intense impulsive reactions, fewer arguments at home, less conflict with peers, better relationship with teachers, one skill, multiple life improvements.\nAnd notice what Jenny said about breathing. It's not just teaching how to breathe. It's teaching when, when you notice your breath getting shallow, when emotion overwhelms you before a difficult conversation. But emotional skills aren't just about managing yourself.\nThey're fundamentally about connecting with other people. So how do these ME strategies link to the we strategies, the social rela ions can be seen as bad behavior. Understanding this changes how we respond.\nThird skills need real life connection. You can teach breathing or reappraisal all day, but if students don't know when to [00:26:00] use these skills, they won't make it explicit. Link the training to their actual relationship struggles and real life stresses.\nFourth one size doesn't fit all. That neurodivergent student distancing became his everything. Another might need breathing, another reinterpretation or a combination of skills. Give them a toolkit and let them discover what works.\nAnd fifth emotion skills are fundamentally social. This isn't just self-management. It's reading others, picking the right moment, recognizing you're not alone. Group approaches work because they normalize experiences and let young people learn from peers.\n Here's your challenge. Pick one emotional skill to focus on this term. Maybe teaching students pizza, breathing, not just how to breathe, but when it can really [00:27:00] help. Maybe the will this matter in a week distancing question, maybe helping them reinterpret situations.\nStart small, make it practical. Connect it to real life situations they're facing. You can find out more about the ReSET project on their website . The ReSET webinar for schools takes place at 3.30-4.45pm on Wednesday, the 21st of January. Book your free place now, or if you're listening to this after the 21st of January, you can watch the recording on YouTube.\nComing up in our next episode, it's time to move from me to we. We will be exploring how social relationships shape mental health and what schools can do to help young people build and maintain healthy connections using the WE strategies we've mentioned today.\n Thanks for listening. See you next time. "}, {"title": "ReSET Mental Health - Indicated Versus Universal Interventions In Schools", "date": "Tue, 13 Jan 2026 07:30:00 GMT", "year": 2026, "season": "19", "duration": "28:17", "description": "Universal vs. Targe ast series we're gonna dig into what they found, what worked, what didn't, and most importantly, what you can actually do about it in your school.\nToday we're starting with the big debate, universal versus targeted interventions. Sounds technical, I know, but stick with me because this might just change how you think about mental health support in schools.\nI'm joined by four people who've lived and breathed this question, Pasco Fearon from Cambridge, who co-leads the ReSET trial. [00:02:00] Lucy Foulkes from Oxford, who's been researching what actually helps teenagers. Roslyn Law from the Anna Freud Centre and the ReSET Clinical Lead, and Faye Witts who delivered ReSET in a real school with real teenagers.\nSo let's start with a simple question. What's going on for young people right now? Here's Faye, Lucy, and Pasco. \nFaye: They're navigating an increasingly digital world. So when you go home, you can't switch off, you can't switch off from school because you maybe message on social media. A lot of the work that you're doing now is online. It's just constant kind of stimulation and there isn't that ability to just switch off from your day. And I think that plays a big part.\nI think the impact of the cost of living crisis as well, accommodation is increasingly crowded or temporary, so that makes it difficult to have a, a nice space to just either do your work or just just relax and be you. Obviously COVID it can't, can't go unmentioned really in the impact that that's had on, on schooling and learning. Some students loving the fact that they didn't have [00:03:00] to come into school and really enjoying learning online. Others the complete opposite and really found it difficult and also found it difficult to adapt back to the routines. And lastly, I think just the landscape of the world now, you know, people are worried about their safety and I think that plays a big part. The world is very different, and I think independence has really been hit. So that's a difficult thing for our students to navigate as well. \nLucy E Foulkes: Is it worse being a teenager now than it was in the past? There's much more, awareness of how challenging it is to be a teenager now, I think, than there was in the past. Always been a difficult period of life growing up. There's a lot of parallels between people in their thirties, forties, fifties, and older. Now, reflecting back on their teenage years, you know, there were struggles about social relationships and struggles about fitting in. But for each generation there are unique challenges, particularly technological challenges and changes and how we worry about how that might be affecting young people.\nSo. I don't think people in the past [00:04:00] had it easy. but I think, yeah, there's a specific type of difficult adolescence at the moment, so it's a bit of both. That doesn't mean we should be despairing or assume that they're all unwell. They're not, and that's really important. But, definitely it's not easy being a teenager.\nPasco Fearon: That's in a way where ReSET is coming in because it's, it's, focusing very much on. young people's relationships with each other and with their family, and with their teachers, actually, the key relationships in their lives are really major drivers of both what can make young people feel good about themselves and give them resilience but also can be the source of a lot of stress and struggle and loneliness and things like that.\nAndr\u00e9 Tomlin (he/him): / so if that list didn't give you a knot in your stomach, you're not paying attention. The always on digital world, overcrowded housing, the COVID hangover and just generally feeling less safe and independent than previous generations. Here's a question for you. When you think about the year nines in your [00:05:00] school, how many of those challenges would you tick off for them? All of them? Some?\nThe case for doing something is pretty clear. The question is what? Do you try to help everyone or focus your limited time and budget on the students who need it most? Let's break down what those options actually mean. Here's Pasco again.\nPasco Fearon: The classic example of like a universal intervention, just to go out of the mental health world for a second is something like putting fluoride in the water, right? So, so that's something that is in everything and everybody gets it. And the assumption is that, you know, not necessarily everybody will benefit, but a lot of people will potentially benefit. And the thinking is you know, if you can reach the whole population, then you can prevent disease or, or in our case, sort of difficulties with mental health before it ever kind of gets, gets started. So in the mental health case, it's, there's such a compelling reason in theory to do this because well, a) there's the kind of the moral case for supporting people who are really distressed. Second, there's all of the kind of knock on consequences for [00:06:00] school, for family, for your future, et cetera. That can be really heavily impacted by severe mental health conditions. So the logic is really clear why you should do it. For mental health universal prevention, that's on the whole, well at least for young people, tends to be whole school kind of interventions. Um, so that might be, you know, universal lessons in mental health awareness, for example. Or it might be things like anti-bullying programmes. A targeted intervention is where you, it is not going to everybody. You're trying to identify people who are, I suppose, more likely to go on to have mental health difficulties or are already experiencing some level of mental health difficulty, and you're wanting to prevent that from getting worse. And obviously the value there is it tends to be cheaper because you're not having to reach the whole population, but there are other advantages too. Building something that speaks very clearly to most of the young people that you're working with so targeted interventions identify a subgroup who you think are most likely to benefit from support, whereas a universal is [00:07:00] throwing it out to everybody.\nLucy E Foulkes: When I think of universal, at least I'm thinking about things that are taught in a class to everyone regardless of need. Sometimes this gets a bit muddled when we're talking about this because there are whole school approaches, like training staff on anti-bullying or having anti-bullying policies that everyone follows, which is sort of universal in that it's for everyone.\nBut I think specifically the evidence base we're looking at today is about when information and techniques are taught to a whole class regardless of need, so that's universal versus targeted, which is where you identify people who might want or need it, and give the information to that smaller group.\nFaye: For me, in my role it's more targeted. but we absolutely do have lots of universal, initiatives going on. So, for instance, it's anti-bullying week this week. So I'm leading that with a group of students and we're doing assemblies and activities during the week. Um. And we will then obviously tie that in with tutor time reflections, assembly.\nSo we are making sure that that message gets kind of threaded through throughout the [00:08:00] week. Um, but in terms of targeted interventions, we work a lot with other agencies, as much as we can because it's absolutely fantastic some of the stuff that's on offer, with local charities.\nSo, um, charities like Mind will come in and deliver some workshops, our local football community trust will come in and deliver some, some mentoring work. we deliver our own mentoring, and that might be one-to-one, or it might be groups that we've identified as needing some particular support.\nAnd then we have a counseling service who come into school as well. So, , it takes time to put these things in place, but absolutely vital and we try and cover as many different groups as we possibly can.\nAndr\u00e9 Tomli at opportunity to express themselves in a smaller setting.\nThey're getting that more individual support, and perhaps feel more confident to share more of their, their deeper feelings, um, than they would do in a, in a class of 30.\nPasco Fearon: I think there are lots of reasons why people are. attracted to the idea of, of this kind of support being offered in schools. There are a [00:11:00] couple of really big advantages. One of them is just the obvious thing that that's, you know, this is like a really significant part of where they spend their time and their lives. bringing support to the environment where they mostly are is a bit of a no brainer. it reduces a lot of the barriers to accessing support. So a lot of young people won't feel great about going to some forbidding looking, you know, mental health. Hospital or clinic or whatever, whereas something that's there and present and is connected to a place where they generally feel connected to like their school, addresses a lot of those needs as well.\nLucy E Foulkes: Yeah, and I think it's valid when teachers say they're worried about that and don't feel comfortable teaching this material because it's, you know, that's their. Are not clinicians and they're experts in something else, and it's, uh, you know, it's another pressure to add to them. So that is the counter argument I suppose.\nAndr\u00e9 Tomlin (he/him): / Sound familiar. Anti-bullying week here, a counseling service [00:12:00] There, maybe some mentoring groups if you can fit them in local charities, offering workshops when they're available. Schools are basically running a mental health buffet. A bit of everything put together based on what's on offer and who happens to turn up with funding.\nBut here's what nobody likes to ask out loud. Is any of this stuff actually working? And if you had to choose, if you could only invest properly in one approach. Which one should it be? Let's look at what happens when you teach mental health content to everyone in a classroom.\nBack to Lucy.\nLucy E Foulkes: My particular focus is techniques and information being taught to a whole class of young people regardless of, uh. Their level of mental health problems or need. There were early trials that were less. less well designed. That seemed promising, but now we've got big, well designed trials with good, uh, methods and statistics, et cetera. The more of them that come out, more convinced I am that this is not the right approach. It [00:13:00] either has null effects, so it doesn't make any difference to people's mental health.\nIE it's a waste of time and their time is valuable, so something that simply doesn't work. It's not great, but also that sometimes in a minority of cases, they can make people feel worse, so they end up reporting more mental health problems rather than, less of them, which is obviously we don't want to go in and make something worse.\nSo the evidence-based now, and I was very cautious saying this a few years ago, but I'm more confident with it now, that we shouldn't be taking the universal lessons approach to mental health in schools, which are focusing said on the targeted stuff.\nMindfulness, is one example of an intervention that was taught, uh, on mass to whole classes in schools. And we've had, uh, several trials now showing that that doesn't work or that's, uh, can have negative effects. But it's important. It's not just mindfulness. We've also found null or negative effects for universal interventions that teach CBT cognitive behavioral therapy. DBT, dialectical [00:14:00] Behavioral therapy or just general mental health awareness, mental health information. So as this number of trials has grown, showing that these interventions don't work or have negative effects, it seems like it's not about the specificity of what you teach, but rather that there's something problematic about trying to get young people to learn about and change and work on their mental health in a classroom full of their. Peers. So I think mindfulness gets quite a lot of attention as being something that we, um, we are now starting to think maybe we shouldn't teach to whole classes, but it's definitely not just mindfulness that's had these effects.\nPasco Fearon: Lucy probably has better handle on the most recent evidence on this, but, the big story is, is non impact. I mean, it just doesn't seem to work very well, and there are these little hints here and there, which we don't still know. Whether they're reliable or not, that there could even be harms, but we have to take harm seriously. \nLucy E Foulkes: We did a scoping review of, CBT and mindfulness, based trials, so [00:15:00] both universal and targeted. And when we looked just at the high quality trials, a third of them found at least one negative effect. And generally, those negative effects were found in the context of. effects. So when you did find a negative effect, it was in the context of things just not working. So I do think it's useful to put a specific number on it. It is a minority of trials, but it's a third. And so I think that's, I think we can be confident that it's not just a fluke that this happened.\nPasco Fearon: I don't know that literature so well that I could say, but usually these are not on the primary outcomes, so they might be on one of say, 10, 12 different secondary outcomes, which makes it a little bit harder to interpret because these can happen by chance. \nAndr\u00e9 Tomlin (he/him): / Let me spell this out. Those universal mental health lessons you might be delivering to whole classes. The mindfulness, the CBT. According to the best research we have, they either don't work or, and [00:16:00] this is the really uncomfortable bit. They may make things worse.\nThink about that for a second. You could be using valuable time and money on something that at best does nothing, and at worst makes some kids feel more anxious or distressed. So if universal approaches aren't the answer, what about going ed in being involved as part of this big, big project. I think there was a bit of a buzz really. In terms of the university involvement as well. It wasn't, they didn't feel that they had been picked by us, so I think that gave a different perspective on things as well. \nPasco Fearon: One of the things that. Can be tricky with indicator prevention is you have to identify young people and they might not feel great about that.\nYou know, it, you might be sort of like you were saying, fave. So if the, if the teacher is saying you need to go to this group, can be stigmatizing. There's all of the social dynamics are about being kind of picked out, which are really potentially tricky. So that's one of the big challenges with doing indicator prevention.\nWell, and I think. One of the things I'm really proud of for what we managed to do with people like Faye and Rosen Everett, the whole team, was to find a way of constructing this so that it was really positive and there was a really good atmosphere around it. And it wasn't sort of weighted with [00:19:00] heavy themes around mental health.\nIt was very strengths focused, building your skills and feeling good about your life and even the process of identification was done in a way that we need to bottle somehow, because I don't think young people did find it, stigmatizing at all. And actually they found the whole process helpful. to me is really crucial and it's definitely possible to get that wrong. \nRoslyn Law: Right the way through that process of selection was one where the young people. So repeatedly we're opting in. Um, and, and so there was an element of choice all the way through there wanting to do this. Whether it was, um, them individually, whether it was sort of family choice with parent or care involvement there.\nSo they had control within that. But, but I think. In addition to that, we were really careful about the way we used language and the, the way we described what we were doing. So there was both in the content of the intervention itself, we, we tried to use language that was absolutely [00:20:00] non-stigmatizing, but didn't really have mental health at its heart.\nIt was a lot about. Thinking about kind of brain training one of the things I think that we came across very strongly is that young people recognize themselves in what we were talking about, and so the motivation came from them to sort of lean in and lean towards something that they could see.\nYeah, I'm, I'm, I'm getting that. I've got that experience. That's sometimes difficult for me. So they, they felt, I think, listened to. They felt seen in, in what they were sometimes struggling with, but also there was an opportunity not to be on your own with that. So the, the idea that I think we really worked hard to make the group non-threatening, that there were other young people who might get this in a way that not everybody does.\nAnd maybe together we can come up with some ideas around that. So the whole group was run in a very empowering way right from the beginning. They got to set the rules.\nLucy E Foulkes: I think a lot of that age is like, it just, all that matters is whether your peers, [00:21:00] endorse or approve of something, and then your, you are publicly allowed to endorse it and approve of it.\nSo I imagine there's some of that going on. \nRoslyn Law: it was, and I think Lucy's right, that there was the character of each of the groups. So I, I had the good fortune to be able to oversee all of the different groups, um, and. They were quite different in their makeup. Sometimes you'd have a mix of kind of quirky kids and the cool kids and they might be, uh, making up one group.\nOther groups, you might have more neurodivergent young people in there, and that group was really beautiful to listen to because. Because of the makeup of that group. They were a maj, a majority rather than a minority in that setting. And, and that really set, a really inclusive, lovely tone to that group.\nAnd for nting. \nLucy E Foulkes: Focus their efforts and their funds on targeted approaches on, on a smaller group or one-to-one approaches for the people who want or need it, even though that might feel like it's not fair because you want to choose [00:24:00] the package that teaches stuff to everyone, but actually we know that those approaches don't work well and can cause harm. Not everyone, wants or needs mental health interventions at schools.\nSo we should, focus on smaller groups, and that's just much better for everyone involved. \nPasco Fearon: I think the evidence is pretty clear that that targeting is the way to go and I think what we've been able to show in this project is a really positive way to do that that young people can really get on board with. And I think that's great. I think we've got the model of ReSET, but there's wider learning here about just how to work with schools, how to work with young people, how to kind of set this up in a way that. Is supportive that this young people actually enjoy and they get something out of it and it has the kind of group dynamic that bonds them with each other and gives them an experience of the school. That's a bit different as well.\nRoslyn Law: There's a huge amount of work that's done by our colleagues, Anna Freud, developing really accessible, really high quality materials, written materials, videos, animations\nThere's a whole package of resources that, that are [00:25:00] available that if you go to the Anna Freud website, you'll be able to access all of that but hopefully also, this isn't going to be the end of ReSET. So we hope that there are going to be further opportunities, so not just for those young people that we're seeing, can I get into the next group?\nWe're hoping for other schools, that that's gonna be something that we're gonna be able to take forward.\n/\nAndr\u00e9 Tomlin (he/him): So you've listened to the evidence, you've heard from the researchers and the school staff who made this work. Now comes the important bit. What are you actually gonna do differently on Monday morning? Let me give you five things to think about, really think about, not just nod along and then carry on as normal.\nNumber one, focus on what works. Look at the evidence before rolling out universal mental health lessons. Often targeted support makes the biggest difference that way. Your time and resources have the greatest impact.\nNumber two, think about how you identify students, which students might benefit from these skills that you're building. Can you give them choice? Can you make it feel like an [00:26:00] opportunity they're opting into? Not a problem they've been assigned to.\nThree, get clever about groups. Don't just lump together all the anxious kids or all the disruptive ones. Mix it up. Sometimes putting the popular kids alongside the outliers creates the exact kind of space, inclusive space where everyone can be honest. Who would you put in a group together?\nNumber four, language matters more than you think. Brain training, building skills, we strategies. These phrases work because they're empowering, not pathologizing. What language are you currently using? Would you want to be talked about in that way?\nAnd finally, number five, find evidence-based approaches and stick with them. There's a lot of snake oil out there. ReSET is one approach that's been properly tested. The Anna Freud Centre has loads of evaluated resources. Do your homework before you commit.\nSo here's my challenge for [00:27:00] you. Pick one thing from this episode, just one. Maybe it's stopping that universal mindfulness program. Maybe it's changing how you talk about mentoring groups. Maybe it's rethinking who you'd put in the next support group you run. Write it down, share it with your colleagues. Actually do it.\nYou can find out more about the ReSET project on their website and explore evidence-based mental health and education resources online at the Anna Freud Centre website. The ReSET w e impact of [00:01:00] racialization within mental health institutions and wider society.\nI began by asking Maxine to describe some of the clinical work that she's done before. I\nMaxine: /i work with a range of individuals. Um, I have worked in inpatient outpatient community settings. I worked for um, a number of years in a mental health trust in the psychotherapy department where I was chair of one of the psychotherapy units. Um, as well as, and that was general psychotherapy, adult psychotherapy.\nUm, I also worked into an adult trauma unit, so a particular interest in that and a unit that, um, focused on working with complex mental health problems. So individuals that had been given a diagnosis of schizophrenia or manic depression. Um, uh, so various, uh, mental health diagnosis that they'd been [00:02:00] given. in addition, um, I worked with individuals with a more forensic, um, past. As well, so a combination At the present, I work, uh, mostly independently with a range of presentation, and I'm also part of a community interest group, and we aim to provide psychotherapy and teaching and training to individuals in South London.\nAndr\u00e9: Brilliant. I'm interested in. Obviously everyone's different. We've all got different stories, we've all got different backgrounds. But I'm interested if you can think of maybe a kind of memorable individual who you've worked with and, and maybe sort of describe a bit about the journey of your relationship with them as a psychoanalyst, as a psychologist, as somebody who presumably works with them over a period of time and hopefully sees them.\nImprove and go off positively into the world. Have you got an example of that? What it, what, what it would be like?\nMaxine: Wow. Um. It is quite complicated, isn't it? Um, I suppose I'll speak about someone who's given me permission to speak about them, so that, um, makes it easier. It's given me permission in other contexts. Uh, so this was an individual that was referred because
