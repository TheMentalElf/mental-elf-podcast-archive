t was, uh, very poignant and meaningful work. She could not only work with some of the symptomatic presentation, but could think of the complexity between her and her son, what had happened there that led to him being taken into care, but also the complexity between her and myself. As to, um, women of color, what that stirred up for her and what that, uh, reverberations with her early [00:06:00] life, the transference in terms of mother, um, the culture she was living in, who she felt she was in front of.\nUh, and it was very rich, uh, and meaningful work. Uh, I think both for myself. Importantly for her and at the, in the end, she, her son was returned.\nAndr\u00e9: Mm. That was gonna be my first question. Thanks for sharing. I'm interested in how you start in that kind of relationship. How you start to build trust and respect and how you address the power in balance. What's your Ethos in that regard?\nMaxine: one of my first positions would be to acknowledge that there is a power imbalance, not to deny that, and I don't think it's assuaged by using certain words, by calling someone user or whatever. Term one wants to use. I don't think that that assuages it, but what I would do is invite the individual to, uh, tell me in their words what they feel is [00:07:00] happening.\nUm, I do explain the way I work and invite them to ask me questions about that. So I describe the frame so they have a sense of that I describe. The potential trajectory of the work together. Um, and the aim from my perspective, I invite them to talk about what they would like to get outta the work, what they were hoping for, what makes sense from what I'm saying, and try and find some sort of ment between the two of us to begin.\nTo do the work. So I don't shy away from a power imbalance, um, but I hope I use my power in a way that empowers them and enables the fostering of some resilience.\nAndr\u00e9: So you're gonna give a talk at the conference in Liverpool in June,\nMaxine: mm.\nAndr\u00e9: um, [00:08:00] and you've called it containing the containers. So this is an opportunity to speak to, I don't know, 500. Clinicians, academics, lived experience workers who all around this kind of complex emotional needs, personality disorders, um, topic. What are you gonna try and share with that audience?\nMaxine: You might be wondering containing the containers who, who are the containers and who's being contained. I'm thinking there about the supervisory relationship, um, supervision that's provided within the mental health setting or any setting providing that.\nAnd my starting point is the Zulu word, Sam. Which means I see you, but not in the everyday polite English way. It's, I absolutely see [00:09:00] you. Yeah. And so I'm interested in the resonance of this throughout the various, as I see concentric circles that are in. Supervision. You have the patient or client, or user, whatever term you want to use, and the therapist, the supervisor and the therapist, the um, therapist and the manager, the manager and the institution.\nAnd I want to think about the forces that are at play with all of these different layers. In particular, I'm looking at the area of racialization. And my thesis as a relates to the way in which we maintain the status quo. Yeah, that we have these ideals about shift and change, but we seem to come back to a very familiar place that doesn't seem to shift very much [00:10:00] at all.\nYeah, so I'm hoping that it's not as melancholy as it might sound at the moment that there's some realism to it I want to look at something squarely. And that perhaps resonates with the way I work, looking at something squarely in the hope that we might see a way through.\nAndr\u00e9: So what would you say has happened since Black Lives Matter in mental health services? What impact has that had?\nMaxine: Well, I think the impact that, um. Things often have in relation to global majority individuals, that there's an initial reaction. There's a lot of excitement. There are, um, buzz terms and phrases. There's a lot of short term money. There are short term projects, further excitement. Then there's a [00:11:00] pause and then we go back to the status quo. Mm-hmm. And then we go back also to even greater stereotypes than were there beforehand. And I think it's perhaps interesting coincidence, maybe. There are so many global majority males at the moment that are in the media for a whole variety of criminal activity, the most horrendous crimes that you've ever heard, the most outrageous behavior that you've ever, um, been subjected to.\nYeah, there's a backlash. And if we look through history, we'll be able to see the way in which, um, these backlashes happen. So event will occur. There's outrage, there's an attempted solution. Usually short term, there's a pause, there's some reflection, [00:12:00] but we go back to status quo. And I'm interested in the audience coming up with their contrary examples because, um, I've yet to find them.\nAndr\u00e9: there's the layers within which we all work. Um. There's the kind of individual relationship you have with the people who you support. There's your colleagues, there's the wider group, there's your boss, there's the institution, um, and the wider kind of system. And I think some people reflecting on that would probably say, you know, we have made progress as a group.\nYou know, we have gone through a process of, you know. Making sure that we are anti-racist as an organization. And there are some organizations over the last five years in UK mental health who I think can genuinely say they have made really significant progress. And there are some individuals in their practice who can say that as well.\nIt's, it's taking it out to that next stage, isn't it? Which is the systemic level, which is much more difficult, uh, to achieve. \nMaxine: that area is the area that's needed for [00:13:00] real, um, change because doing something on an individual, I. Basis or with a small group is one thing, but if the wider system maintains a kind of group think that maintains the status quo, then it rather defeats the object. Um, and of course, uh, there are many services, quite rightly so, that aim to be as non prejudicial as they can be, but.\nI'm not certain that we can really achieve a position of being anti-racist as such, because I think racism is something within us that we have to struggle with, um, each day on a regular basis. Some people are more cognizant of the way in which their behavior is prejudicial, others aren't. Yeah, and depending on one's power base that's going to have.\nMuch more of an effect if you are a manager, um, or you are heading an organization than if [00:14:00] you are the person that's cleaning that organization.\nAndr\u00e9: So let's think about it from the ground up. First of all, um, I'm interested in what your. Suggestions would be if you feel like you can make suggestions to people in the audience about what they could be doing differently, how they could be educating themselves. I think the big thing for me with I see you, I really see you, is that you have to learn so much, first of all in order to really see somebody.\nUm, so there's a huge educational thing here for individuals, for groups, for institutions. What would your suggestions be for priorities for people who are kind of in an action mode after hearing you speak?\nMaxine: I, I would have one first simple priority that the focus is on learning about other people going and, um, I. This culture does this, that culture does that. Um, there was Tony Morrison in her [00:15:00] inaugural speech. She said something like, tell me what it is to be a man so I know what it is to be a woman.\nTell me what it is to. Be on the edge of a land which cannot bear my company. Something like that. Um, and she's talking about, and maybe the first bit is quite controversially in the current climate, um, but she's talking about interconnectedness. Yeah. And what is on the edge and on the margins. Now to be aware of that, I think you first need to do work on yourself.\nSo I would look at myself first. Notice what are the obstacles within me before I can see you. Yeah. But often. People try to look at the other person full of their own obstacles or looking through their own particular premise that keeps the person in a denigrated [00:16:00] minimized, um, position and doesn't.\nReally affect change. So that would be a simple thing. The other aspect is that I would want to be in dialogue, so I'm not putting myself forward as some sort of expert. Um, but I am willing to engage in a dialogue. And if we're willing to engage in a dialogue, I think that that's an also a very important step.\nBut dialogue involves listening, and often we don't listen. We are speaking and preoccupied with what we want to say next, not taking what the other person is saying. Taking, really taking it in, and these may seem simplistic things, but I invite those that are listening to just try it. Actually listen to somebody that you are speaking to and seeing them and taking them in.\nAndr\u00e9: There have been talks, um, at Big [00:17:00] Spud over recent years that have focused on anti-racism and whiteness. Um, and there's been lots of sessions that have been delivered by people who I'm sure would, um, yeah, would align in some way with what you're doing with your talk here.\nAnd it feels like this is a, a building movement within the organization. Um, and it's something that I think the audience at the conference have been very challenged by. In previous years, I've been sat in the front row reporting on social media whilst 400 people listened to, you know, Colin King talking about decolonization or whatever.\nAnd, um, it's. It's been a hard set of talks for people to listen to. It's a very white audience at Big Spud.\nMaxine: Mm-hmm.\nAndr\u00e9: Um, but it feels to me like, as someone who's been to the conference for the last few years, is that it's, this is kind  to need to affect this area? [00:20:00] And if you perfect it, what does it look like? What in what way does it matter? If you come to my talk or you don't, in what way does that matter?\nYeah, but it really might matter if you, I don't know, go to the latest update on medicine or the late new drug or the latest update on something else. You know, in the hierarchy of things it. Isn't necessarily seen as having much kudos apart from the nice liberal attitude, feeling a bit more good about themselves, that isn't enough to change the status quo.\nSo in what way does big SP need to put this on the agenda in a way that it has real impact?\nAndr\u00e9: I am interested in personality disorders, complex emotional needs services, [00:21:00] pathways, your view of those, because. You said at the start, you know, we've got this, um, huge over diagnosis of certain types of mental health problems in black communities. Um, huge over reliance on restrictive practice and sections and all these sorts of things.\nUh, we've got an, you know, a racist mental health system and yet the opposite is the case I think, in personality disorder services, in that it is primarily white people, um, in those services and. What's going on there?\nMaxine: Oh, people might not agree with this, but I think thank God, you know, I think global majority of people have got enough labels. We do not need another label. But if you see a. That the person has difficulties, they might need those difficulties to be attended to, but the group think of the system requires a label.\nSo there's some talk about maybe more global majority need to be given personality [00:22:00] disorder label to get treatment. I'm just going to pause.\nAndr\u00e9: Absolutely. I think, um, bringing it back to the kind of relational care and the kind of what's happened to you aspect. You know, everybody who presents or the vast majority of people who present and get support in personality disorder services are people who, want to take nYou can find out more about the event on the Big Spud website or by searching for hashtag big Spud 25 on social media. I'll be covering the conference live on Blue Sky this year from the mental health account, and they'll be the usual team of Beyond the Room correspondence posting on their socials.\n Can't wait. See you in Liverpool."}, {"title": "Cultivating Democratic Mental Health: Relational Practice and Cooperation", "date": "Fri, 16 May 2025 15:16:40 GMT", "year": 2025, "season": "18", "duration": "18:58", "description": "Relational Practice: making hope possible rather than despair convincing. Join Andr\u00e9 from The Mental Elf for episode two of the BIGSPD 2025 Podcast as he discusses relational practice and democratic mental health with Professor Mick McKeown. Mick is a mental health nurse academic who shares his insights on the intersection of sociology, philosophy, and politics in mental health. In this episode, you'll learn about the key themes of his upcoming keynote talk at the British and Irish Group for the", "url": "relational-practice-mick-mckeown", "transcript": "Mick McKeown - Cultivating Democratic Mental Health: Relational Practice and Cooperation\nAndre: [00:00:00] Hello, hello, hello and welcome to episode two of the Big Spud 2025 Podcast. I'm Andre from Mental Health, and for the next 20 minutes we're gonna be talking about relational practice and democratic mental health with Mick McKeon. Professor Mick McKeon is a mental health nurse and professor of Democratic mental health at the University of Central Lancashire.\n He will be giving a keynote talk at the British and Irish Group for the study of Personality Disorder Conference in June this year entitled Relational Practice Making Hope Possible. Rather than Despair. convincing, Expect a wide ranging talk, drawing on sociology, philosophy and politics. I [00:01:00] spoke to Mick as he was preparing his talk for the conference and began by asking him to introduce himself and his relationship with Big Spud. \nMick: I am, um, Mick Mcow. I am a mental health nurse by background, and I largely worked across. Secure units, but I did do some work in the, in the community, but often following people up who'd been insecure units into, into the community. Um, but I've, I've worked in and out of academia for probably 30 years now across two different universities.\nAnd, you know, more laterally I've moved from a sort of mainly teaching orientation to a mainly research orientation, but I've always been interested in this thing that, that, you know, big spud are interested in, which is relational practice. And, um, recently or fairly recently, we've had some commissioned research to look into, um, different aspects of relational practice, including how people [00:02:00] make sense of it.\nUm, and I suppose another thing I've been interested in is, um. Democracy, and I don't think those things are sort of indivisible. So I'm a academically a sociologist. So I'm interested in, amongst other things, social change, sort of big social change, which is a pity, doesn't happen too much or at the moment is happening in the wrong direction for, for, for my taste.\nBut, um, also at the sort of interpersonal level, are we, you know, um, consider things like agency change, relationships and the, the sort of communication and relationships that might drive change. So I see this relational practice thing, as you know, not only about therapeutic relations, I, I see it as about movement, building ideas around how professionalism may or may not be driven.\nI should say my job title is Professor of Democratic Mental Health. And I, I got to choose that for myself. It's one of the sort of privileges of getting a, you know, a professorial title, [00:03:00] but I've always seen it as a little bit serious and a little bit comic as well. So when I meet somebody who doesn't know about mental health too much, or sometimes people who, you know, who, who do the job for real, rather than think about it and study it, I always say, professor of Democratic mental health and if you spot any, can you let me know sort of thing.\nUm, which is a bit facetious 'cause I know there's always been a tradition of democratization. And that's one of the things that, that I wanna talk about in the keynote um, presentation that I've, that I've been asked to do. I see democracy as I.\nThe antidote to authoritarianism and dominance. And I think the real thing that I'm interested in the most is how people can, can utilize their human agency to get out from under domineering forces. So either in, in society at large, in terms of whether you are, you know, an oppressed group for instance, or an oppressed class.\nBut also in terms of whether we might view [00:04:00] some of the institutions of health like psychiatry as similarly oppressive or oppressive, at least up to a point. And definitely having some sort of authoritarian and, and dominating tendencies and how we might view or, or frame resistances to that in a, on a relational basis.\nSo they, they're the sort of things that I'm sort of conceptually interested in, but I, I, I'm a pain to say, I think they do have quite down to earth, practical. Resonances as well. And there's, there's little glimmers of this stuff, or sometimes some fully fledged, you know, almost utopian manifestations of more democratic, uh, to, to be found if you, if you go looking for it.\nUh, and I do think the big spud people, they sort of exemplify their, their territory, if you like, exemplifies some of the problems writ large and some of the solutions as well. And some of the people who've, who've inspired me over the years are people who are, who are part of, um, that group and [00:05:00] network who've, you know, invested their whole careers really in terms of looking for this and nurturing this, this sort of democratic impulse with within services and, and elsewhere.\nI was involved in a paper that was called Reclaiming the Humanity and Personality Disorder.\nIt didn't go into sort of any deep philosophy, but it was a dissection of sociological processes of, um, othering and demonization and how they can hang on a label, be applied wholesale rather than be very particular in terms of how they land.\nAnd that that is a problematic within, um, kerning services. So, so it was really a critique of the label and I know plenty of people have, have been in and around criticism of the label of personality disorder and I suppose, um. You know, it's, it's very easy to criticize as a label, but it's, it's less easy to criticize as its function in terms of enabling people to get help, which is, is, is one of the things that the people, even if they're critical of the label, can see works for people, at least some people [00:06:00] some of the time.\nSo it's those sorts of things. I see those as social issues as much as psychiatric issues. And they're, they're some of the things that I've played around with over the years. Uh, and along with some of the more I. Practical stuff that's been about either inquiring into or supporting people alongside them to develop systems of co-production involvement.\nYou know, the, the, the, the names change, but these more democratized, uh, ways of, um, relating to people with within, uh, secure services and, and, and elsewhere. Um, and thinking about, you know, is, is the active ingredient there, the way we relate to, to each other, the way we talk to each other. Um, and I, I sort of think it is, and I think there's quite a lot of decent.\nTheory, um, that comes from sociology, politics, philosophy. That helps us understand that in a way that I think most people understand it intuitively, and they may not even use words like democracy about it. Um, they might [00:07:00] be interested in things like hierarchy and power, but they may not even use those words either.\nThey just, we just know at more, at a sort of gut level that this, that these sorts of tensions exist in psychiatric services and that there are things that we can do to ameliorate them and, um, help people have more agency, more autonomy, uh, and maybe exercise some of that collectively as groups of peers, as much as on behalf of.\nOneself as as an individual. So, um, I'm interested in all of that. And I'm also interested in if we do that with people who are designated as patients, do we make for a better life for people who are designated as staff? And I think that we do, and I think there's this sort of, if you like, almost a vortex whereby when things are undemocratic, it's not just patients who are hurt in those dynamics, it's staff become alienated from a sort of [00:08:00] more idealized version of how they might be as a professional self.\nYou know? So, um, other people think badly of us, things go wrong. We think badly of ourselves. And that might help explain why we've got a lot of, you know, labor force issues and attrition. And a disinclination to wanna work with particular groups and everything. Um, and we, we recognize that some groups, maybe the groups with the subject matter of this conference can be more difficult to work with, but maybe when we find ways that are more fulfilling for all parties, you know, we, we, we both get better outcomes, but we get, you know, happier staff as well, and that that itself might be a virtuous cycle rather than a sort of vicious cycle.\nSo, so they're the sort of things that I wanna talk about, and I want to, um, I want to use the idea of cooperation as an organizing principle. And so the, the title of my talk, if I, if I can remember it correctly, is it's got a quote from a fellow called Raymond Williams in it. And he, he was, um, a, um, socialist.\n[00:09:00] And a cooperator. And by all account, he was a bit of a curmudgeon as well. He wasn't like, he didn't suffer fools gladly, and it was difficult to get on with and, and in and of himself, his, his, his, his personal style didn't always live up to his sort of rhetorical aspirations and everything. But, but that said, um, you know, um, I think his, um, life philosophy if you like, was that if we cooperate better, we do better as people and as society as a whole.\nAnd, uh, is is quote that's in um, the title of my talk is, is about making, um, hope in so many ways. It's about making hope possible in conditions where despair might be the more obvious go-to emotion. And I think, um, this, this is a real challenge in now in terms of big. You know, the big world that we're in, I think, um, people who are interested in human agency and, you know, democratic participation.\n I do think we, we have the intellectual tools to do a better job of, of understanding this stuff.\nAnd I think that those tools help us [00:10:00] understand those big issues in society at large. And also some of the, you know, I, I don't wanna call 'em smaller issues 'cause I think they're just as important, the relational issues in, in psychiatry. So I wanna start with a sort of. Socialist cooperative sort of angle.\nAnd I'm eventually gonna finish with a case example that's that's about, you know, um, democratized work and cooperation. But along the way I'm gonna talk about how we understand who we are as people, we, you know, regardless of difference and different needs and such like, and how having a more cooperative relational, you know, ambition if you like.\nUm, we, we can help each other to be better people, uh, along the way.\ncooperation is actually pleasurable. It's nicer to do, you know, who doesn't want to get along better with everybody else, even though it might seem that, that, that we naturally don't. And I, and I think the myth of neoliberal capitalism is that that is natural. That there's some natural order [00:11:00] of things where people are just trying to score points or score material advantage or of each other.\nAnd I, and I think people like David Grabber, for instance, is one of my favorite authors. Um. Written a whole sort of social history of all time, right. You know, back to pre-history that makes the case that the only thing that's actually helped the human race to survive thus far has been cooperation, not, not competition.\nmental health nurses. Have consistently done a very bad job of being in control of their work. So most of them, when you ask them, say, well, yeah, we're all about therapeutic alliance and we're all about, um, you know, demonstrating care and being, you know, the, the, the biggest part of our job is ourselves, our human relational skills.\nAnd then it's like, well, show me, you know, 'cause I can see you all mainly manning computers rather than actually relating to people. Or the bit where you're relating to people is now the minority part of the job. So what went [00:12:00] wrong? You know, I knew do we blame, do we blame the people who insist that we do all of this paperwork, which is actually digital computer work?\nOr do we blame ourselves professionally for not standing up to some of that? Reber said this as well. He said, you know, 95% of those computer entries, no one will show any interest in them at all. Unless in our case, something catastrophic happens. And then that's what's driving it. The idea that we might be subject to scrutiny in the future should something go wrong.\nMy view is if we spent more time with actual people than machines, less things would go wrong. But others might see that as a sort of naive point of view. But I'd like to test it out. And I think some of the examples of more democratic practice, more of, more or less done away with paperwork. So open dialogue for instance, they, they see every, it's very labor intensive.\nThey see whole [00:13:00] families and social networks daily, and they recap in real time, uh. So they don't spend loads of time making notes about what we did today, because they're gonna revisit it tomorrow and the day after and the day after and the day after until things are improving. And so everyone knows where we're up to and the way is all of us.\nSo why is it just on the professionals to keep notes? It's everybody's got to keep up with, with what's going on. And what's the point of keeping notes if no one. Ever looks at them or they, they said, no, no purpose. And most nurses go through their whole career. I certainly have never been anywhere near a coroner's court and all of this.\nAnd yet when we have student nurses in, um, in training, we frighten them to death to say, you must do your notes. They must be pristine. Or you'll be the person in coroner's court trying to defend an absence of, of notes. And I'm not saying that isn't a legitimate concern, but it shouldn't be the tale that wags the dog of something that could be [00:14:00] much more sophisticatedly about relational practice.\nSo I think, I think we as a profession need a really good think about what are the essential case notes, and if we're, if we're authentically producing these things in a co-produced way, how much of it actually has to be written down? Because, or if it is written down, is it written down on some portable device that belongs to the patient rather than, than us?\nrelational practice is something about how human beings communicate with each other in a positive way that is helpful in a dynamic to all parties. I don't think it's just a gift that staff bestow on patients.\nI think it's a two-way communication that helps everyone, you know, and there's mutual learning and mutual help, and that the [00:15:00] best forms of relational practice are not just one-to-one dyads. So I think nursing, my discipline spends a lot of time talking about this so-called therapeutic alliance, and I'm, I'm not knocking that.\nI think there's some, been some great work done on that, but that is insufficient. Just, you know, the one-to-one stuff or the stuff that becomes a one-to-one more formal therapy. And while we're on it, you know, we do know already that the biggest active ingredient in all these therapies is not the modality, it's the interpersonal warmth and everything that is generated.\nSo. So there's something about core relational skills that are transacted in any encounters in helping services, not just psychiatry. I think the best forms of physical healthcare or, or relational as well, the best forms of obstetric healthcare or, or relational, et cetera, et cetera. Um, but my idea of relational practice, [00:16:00] for what it's worth, harks back to these therapeutic community principles.\nSo it's a collectivized set of relationships where peer to peer relations or as important as professional. It's to patient relationships. But when we have the professional to patient relationships, it's a two way street. And if the patient wants to say to me, Amy, you have, I've been annoying since Tuesday.\nThat's the thing that we want. We don't want to discourage you. Because then we can say, well, what was it that I was doing, Andre? You know, can I do better? Can you help me do better? You know, and if I disagree, will you allow me to argue with you? But civilly till we get to a better idea, and this is why I like these, um, Frankfurt School philosophical analysis of democracy, because that's what they're about.\nSo they, you know, Habermas for instance, talks about, um, the setting conditions for an ideal type of. Deliberative democracy and it's all, it has to start with more equal [00:17:00] power relationships between people. Now that's a big ask. We know that. But as a principle, can we approximate to something that's more equalized in terms of power?\nIt has to start with respect between all parties. I think that's an easier thing to transact, but still a challenge. It has to be, we have to be respectful across difference. And that's, you know, quite obvious difference, like race and ethnicity, gender, all these sorts of things. So we have to put prejudices and biases to, to, to one side.\nSo, so in a nutshell, yeah, relational practice, mixed blessing. We can kick around an idea of a definition, and I like, I like the idea of a more collectivized, system-based relational practice that is about organizing how everyone talks to each other, not just one-to-one therapeutic alliances.\nBut I'm also very open to the idea that we shouldn't define things too rigidly in case we close off [00:18:00] imaginative opportunities to, to think about how things might be done slightly differently or how we might. Reconnect with things that would always a good idea, but we maybe don't do enough of them anymore."}, {"title": "Dialectical Behaviour Therapy: Past, Present, and Future", "date": "Wed, 14 May 2025 10:33:41 GMT", "year": 2025, "season": "18", "duration": "35:53", "description": "Exploring DBT: Techniques, Efficacy, and Lived Experience #BIGSPD25 Welcome to episode 1 of the BIGSPD 2025 podcast, hosted by Andr\u00e9 from the Mental Elf. This episode dives deep into Dialectical Behaviour Therapy (DBT) with guest experts Professor Michaela Swales, Programme Director at the North Wales Clinical Psychology Programme, and Jenifer Dylan, an Advanced Lived Experience Practitioner and DBT Therapist. Together, they explore the success, challenges, and future of DBT, discussing various ", "url": "dialectical-behaviour-therapy-past-present-and-future", "transcript": "DBT Michaela Swales and Jenifer Dylan\n [00:00:00] \nAndre: Hello, hello, hello and welcome to episode one of the Big Spud 2025 podcast. I'm Andre from the Mental Health, and for the next half an hour we're gonna be talking about DBT with McKayla sw and Jennifer Dillon.\nProfessor Michaela Wales is program director of the North Wales Clinical Psychology Program at Banker University. Her Keynote Talk at the forthcoming Big Spud Conference in Liverpool is entitled 30 years of DBT. Where are we now and what next?\nJennifer Dylan is an advanced lived experience practitioner and lived experience DBT therapist working in Westminster for the Central Northwest London NHS Foundation Trust. Her big spud keynote talk is entitled, redefining Expertise, exploring the Synthesis between [00:01:00] Patient and Professional. Ano and Jennifer taught me loads about dialectical behavior therapy during the conversation that you're just about to hear.\nWe discussed how DBT works, how well it works for different people, how it's delivered in the uk, and what DBT therapists can do to improve the care they provide. I started by asking McKayla to provide some background about all the different psychotherapies currently available for people with a diagnosis of personality disorder.\nMichaela: The good news is that there are. far more options than there ever were when I started 30 years ago. there weren't really many options and so I think it's always good that there are a variety of options. So, are ones that have kind of got a lot more evidence for them.\nObviously DBT is the one I'm gonna be, uh, talking about, but also mentalization based treatment as a strong evidence base. schema focused therapy, also has a strong evidence base as does transference focus psychotherapy. so those are the kind of the big four and there's [00:02:00] also been some, Work done. looking at what it's called structured clinical management. It's sometimes called general psychiatric management. There are a couple of those sort of approaches, which are not specialist psychotherapies, but are ways of providing structured care.\nAnd they also seem to do quite well. So there are a number of options available. I think what we don't know so much about, which really is a shame, of these different treatments, which ones are best for whom, you know, um, we don't have really that sort of good detail, you know, if you were going for treatment for cancer, you know, oncologists know a lot about, you know, which presentation, which drugs to go with.\nAnd we don't really know so much about that. in treatments for. People who have the problems that get labeled as personality disorder. you know, it, it could be in any of these treatment trials, there are people who don't benefit from the treatment and some people who get worse.\nThat's true for all of the treatments. What we don't know is, are those people who don't benefit or get [00:03:00] worse, are they kind of people with the same sorts of issues in all of the treatments? is there like a group of people for whom none of these treatments would be effective? Or is it actually that, better news than that, is that, you know, some people might do well in one, but maybe not in another, and that's the part that we don't really know so much about.\nAndr\u00e9: I'm kind of interested Jennifer, in asking you a bit about all the other therapies. 'cause all that stuff that McKayla has just spoken about there.\nIt's quite sort of technical, you know, what on earth are these D-B-T-M-B-T schema things, you know, most people in the public might know something about psychotherapy, you know, so for example, I was offered CBT, cognitive behavioral therapy. When I went to the gp, you know, and I said, oh, I'm not feeling very well.\nmost people or a lot of people have heard of that. Why are we not using those sorts of interventions? Or have we tried using those sorts of interventions? Do those more traditional therapies that have been around for decades, do they work for people with personality disorders? And if not, why not? I.\nJen: Well, they have been [00:04:00] tried and they are still tried, and sometimes they can work. I think certainly going back to Marsha Lenahan, who developed DBT, her rationale was that the traditional talking therapies can be very validating and supportive and that's great. And yet, where's the change, you know, where, where did, where do you help?\nI mean, I personally had seven years of analytic psychotherapy and it was great. In the session session and then I went home. It's like, now what do I do? And CBT focuses on the skills side, processing of specific thoughts and behaviors, but can, for the group of people which we're talking about, and myself included, can feel quite invalidating.\nSo you have the change, you don't have the length of time you might need to build someone's trust. for them, the people receiving the therapy to have the trust in the therapist. so I think in essence they can and do work. However, [00:05:00] DBT as well as the others that McKayla mentioned are much more specifically geared towards people who have a broader and more complex and perhaps deeper rooted set of.\nNeeding to change the way you think and feel. \nAndr\u00e9: So let's, focus a bit on the evidence then, Mikayla. Let's think a bit about the efficacy and safety \nMichaela: Well, I mean, that's the good news really is, is there've been a couple of big reviews, done by something called the Cochrane Collaboration, which is a sort of an independent organization that systematically reviews all of the evidence. I think it is safe to say that, these treatments that I mentioned, so mentalization based treatment, which is MBT schema focused, sometimes called SFT, and then transference focused psychotherapy, TFP, we do like a th a three letter acronym, you know, and DBT, dialectical Behavior Therapy. Although some of the people I've worked with have affectionately referred to it as diabolical behavior [00:06:00] therapy.\nbut there's strong evidence really that, All of these treatments are safe in the sense that, you know that there's no risk to a person from trying them. That having been said though, any psychological treatment can have adverse effects for any given individual.\nAnd so it's very important that teams treating people are paying close attention to whether people they're working with are improving or worsening and that they really take seriously, you know, if clients are deteriorating, but none of these treatments have been found to be unsafe and all of them have been found to be effective. the state of the evidence is, varied. You know, some of them have a bit more evidence than others, but I think there is evidence that all of them could be an effective option for a person who, who gets that label, who has that, as Jen was saying, really, who's got a lot of complex, issues where problems affect multiple areas of, of life.\na protocol or a treatment that focuses on a single thing perhaps doesn't quite address the [00:07:00] complexity. And I think that's one of the things that all of those treatments have in common is that they have specific ways of addressing the complexity and interrelatedness of the issues that people face.\nMany of them do have a strong emphasis on a kind of a coordinated team approach. You know, where there's a group of people who are trained in the method, who are supervised in the method and who also can, elicit support from each other.\nMany of the people who come to, to us for help with these treatments are, you know, are in a lot of emotional pain and despair, you know, that's why they want to die. and working with people in a lot of emotional pain and at high risk can take its toll on people who are seeking to help. And so it's important that there are robust structures to make sure that the people doing the helping are in a, a robust state themselves to be able to really offer that, support.\nif a person listening to this podcast has been offered them or wants to seek them, then they can feel reassured that, that there is evidence that these treatments are effective [00:08:00] and safe.\nAndr\u00e9: Let's get back to DBT, take us right down to the basics. Let's say I've never heard of it before. What is it? Give us an introduction to it.\nJen: Marsha Lenahan, who developed it in 1993 said to learn and refine skills in changing behavioral, emotional, and thinking patterns. Associated with problems in living that are causing misery and distress. That sums it up, as McKayla said, it's an evidence-based psychotherapy. It's structured, it's a skills-based therapy, and it's designed to help people manage intense emotions, build healthier relationships, and reduce the self-destructive behaviors. That comes really with the territory of this label, the suicidal, self-harming, et cetera. It incorporates both, group and a one-to-one. So the group is weekly and that is primarily. [00:09:00] Teaching the skills. and these are skills which for whatever reason, people haven't learned or acquired or often they do have. I always say when people first come into the groups, you all have skills.\nSo this isn't telling you something you might not know. Often it's about the new language. helping people to realize when they're using skills and when is best to, and truth be told, there's also a lot of new skills which people haven't or can't utilize the four core skills which are mindfulness, distress tolerance, emotional regulation, and interpersonal effectiveness. DBT has evolved. originally it was targeted specifically for people in high emotional distress, those who may well be labeled with borderline personality disorder, emotionally unstable personality disorder. And now it's very much, changed and morphed and can be, utilized in different ways.\nAndr\u00e9: So I'm interested in Makayla in how it works, \nMichaela: I think this has also been one of the sort of [00:10:00] vexed questions in psychotherapy research is that, sometimes treatments work and people who practice them have strong beliefs about why they work, but sometimes it's hard to prove that that is actually how they work. but in DBT, the proposal is that, what drives the outcome is that people learn new skills, um, particularly around, emotion regulation that help them address their problems in a different way.\nAnd that that. Then means that they, can not then engage in behaviors that might cause them risk to themselves basically. and in fact, the, the data do show that, increased emotion regulation and increased self-control. Though those are outcomes of the treatment, but those actually mediate directly mediate the outcomes of decreased self-harm, suicide attempts, depression, and also, um, the capacity to control anger.\nand interestingly, going from what Jen was saying is, of course people come into DBT with a set of [00:11:00] skills. People are working hard to try and solve their problems. But actually what some research has shown is actually it's the increase in new skills that they learn above that baseline. That's the thing that drives the changes in outcome.\nSo the skills change is really important. In terms of looking at skills a bit more detail, several studies have shown that the mindfulness skills in particular, especially the capacity to accept things without judgment, a particularly important mediators of outcome and unfortunately for our clients is that that skill is also quite one of the hardest to learn, but it is really important.\nthere have been studies which have looked at, the neurobiology, you know, like what's going on in people's brains, um, when they do DBT and, I mean, it's not a surprise to me because of people's, skills are changing and their behaviors are changing.\nThen of course something must be changing in their brain. Clients can find it helpful to know that actually there's, that you can actually see those changes, by looking at brain scans that you can [00:12:00] see after GBT treatment, that there's less activation of the amygdala, which is a structure in the brain that's really kind of important in emotion regulation.\nand also other areas of the brain that are kind of connected with that. you can see those changes, both in people's overt behavior, but it's also changing something inside. so the data show that it is those increased skills that those are key mediators of the change, in outcome.\nAndr\u00e9: Let's talk about an example then, Jennifer. So give us a, a, a sense of somebody, you know, turning up at a service. first of all, how, how do you make the decision that they're gonna have DBT?\nIs that purely a kind of postcode thing? Well, that's the service we have available here for people with personality disorder, or is there some sort of treatment decision that's made? Maybe you better off having MBT than DBT. What's the process.\nJen: it can be a postcode thing and certainly when I had therapy, there was nothing else. Therefore I was in the right place at the right time. [00:13:00] Nowadays, I work within Westminster, so people who live and work in Westminster are those people who come through the triage team into the community mental health hub.\nAnd then if they are, whether they have the diagnosis or not. But if they are deemed to be, 'cause our service is called the complex emotional needs pathway. We try to steer away from the label without pretending it doesn't exist. But someone doesn't have to have that diagnosis, then they will be sort of steered, referred to myself and our team.\nthere'll be an assessment. And we in fact also do offer MBT. There are also within the hubs, there are other therapies. So I don't think schema therapy anymore, but arts therapies, there are lots of other CBT, lots of other therapies. So again, we look and we think because someone's self-harming doesn't mean they will benefit from DBT.\nSo we'll do a proper thorough, assessment, meet the individual, and then let's say [00:14:00] we all agree as a team that this person could benefit from DBT specifically rather than MBT. we would offer for all the reasons. In fact, McKayla and we've been talking about cited that really crucial to try as best as possible to get the right match.\nSo if somebody comes into DBT before they start treatment, there's at least I'd say two, three or four pre-treatment sessions. And I always say to people, up until the very end of that, you can say yay or no because, and I often will, I'll use my, experience briefly as in this is the treatment I had. it's a real opportunity to dispel some myths that people might have.\nFor example, we often get people saying, oh no, I'm not doing groups. I'll say, okay, tell me a bit more. Because often people's experiences are that groups, I call it sort of naval gazing, [00:15:00] where there's a whole group of people sitting around talking about how bad their life is and how much they've self-harmed and how awful they feel.\nNow, whilst that might be okay in one place and for certain group of people, I was once told that things like self-harming behavior, et cetera is infectious. what can happen is people can feel that someone else is getting all the attention if they've just talked about particular self-harm.\nNow, of course, it's crucial to talk about this behavior. However, in a group setting, it is seen to be counterproductive and damaging. So if I'm explaining this to somebody, they'll often say, oh good. They don't want to hear about other people's issues and problems. A lot of the time. It may well be because they will put their own needs down.\nThey will say to themselves, oh, that person is much worse than me, et cetera. Again, not helpful, but it does come from that self-stigma, So we'll have these, um, sessions in order for us [00:16:00] to see and ensure that this will be. The best as far as we know, treatment and for people to know what it entails because it does entails quite a commitment.\nOur service offers. It's about six to eight months of, weekly groups, and weekly one-to-ones. It's quite a commitment. Sometimes we need to sort of work out with their employers having half a day off, certainly for the group, et cetera. We always sign a contract and that's a contract for myself as a therapist and the individual so that we've got something to sort of look back on and that really is an agreement that we will.\nAttend regularly, we will communicate with each other. If somebody doesn't attend, they're not going to get the help they need.\nAttendance is crucial. We have rules about that. And obviously safety's crucial. So if somebody is deemed a danger, what can happen though? This can shape someone to realize that if they don't attend, they will still get help and this isn't [00:17:00] helpful. So it's really in these 3D BT sessions and of course ongoing should these things occur.\nAbsolutely. Validate. We understand coming to group and one-to-one is difficult. We understand the the, the physical toil, the emotional toil. We're asking people to change the way they think. This is big, you know, this is a challenge. And if they want the help. They really are committed to this. We need them there.\nAnd in the one-to-ones, we look at the diary card. That's another commitment we ask people to do because I always say to people, look, my memory's no good, but if you come to see me on a Friday and you harmed yourself on a Tuesday, you might not remember where, what, how.\nwe use, within the one-to-one session, we use, chain and solution analysis, it's almost like, call it a dissecting of those 10 minutes of what led up to that person doing the behavior so that we can then validate to the nth degree and say, right, [00:18:00] gosh, this, I'm really sorry this happened.\nLet's try and if this happens again and you have that surge of emotion, these urges, what can we do? So we then, in the one-to-one may well bring in new skills if necessary. 'cause if we're going through mindfulness and they haven't done emotional regulation, then we might bring in something and teach it and rehearse it there and then in the room.\nThat is pretty much the structure. \nAndr\u00e9: McKayla, I guess what we've seen in recent years is, uh, you know, as you say, successful intervention, evidence-based, you know, growing popularity and what all always happens is that that then has little spinoff, you know, therapies for other groups of people, which is great.\nYou know, can we use it for people with autism tell us about the evidence that sort of emerging and growing in\nMichaela: Yes. I mean, I think I'm gonna give a bit of a dialectical answer really. 'cause I, I think one of the things about the way DBT is structured, um, and, and actually this would apply to some of the other treatments, uh, for personality disorder problems as they're defined, they have to be designed really to address people who have complex problems.\nand [00:19:00] so DBT It's a behavioral treatment. So it doesn't treat diagnoses. It treats behavioral problems that people identify things that are getting in the way of them getting to having a life that they want. we take a sort of structured approach. So always to begin with, we start helping people with behaviors when they're feeling like they want to die and when they're hurting themselves, just simply because those are a huge barrier.\nBut then we've always then moved on to other major, behaviors that they have, problems that they have, which are associated, for example, with other psychiatric diagnoses. So we've always targeted trauma symptoms. Um, and so it's kind of inherently in the structure of the treatment. however, it's important to assess whether or not that approach is equally effective for all groups.\nAnd there was some research done that, identified that people who had, who also in addition to getting the label of borderline personality disorder, also had a diagnosis of PTSD were not doing as well. Their outcomes were not so good. [00:20:00] so we now have two, adapted forms of DBT, you might say.\nUh, one was developed by Melanie Har in the States, um, and one by Martin Bohu in, Germany, and both of which have good evidence. And in fact there's a, a big trial going on at the moment looking at, how, these treatments compare to standard. DBT. but they both have good evidence, where there's a more specific focus on the trauma and that's integrated more into, into the treatment.\nSo, Once you spent some time helping a person, manage their suicidal and self-harming behavior, you would then move on to processing the trauma. And both of these, adaptations have got some good data. in terms of people who are ident, who identify as neurodiverse, um, again, is always treated, you know, as a behavioral treatment, your task as the individual therapist, as, as Jen's saying there is in the individual what you have got to.\nYou know, work with your client to get a list of the things that they want to change. Your task is [00:21:00] to help them get towards a goal they want to get toward. you want to get a list of those things that for them really get in the way. and your task is to tailor all of these different skills to the problems that your client brings.\nAnd so, you know, if you've got someone who identifies with neurodiverse and has particular ways of processing information, your task as the therapist is to think, how can I help this person utilize these skills or adapt these skills to help them get where they want to go? However, it's still an important question about whether this treatment is useful, and we've had a couple of trials recently for people who identify as a neurodiverse in the sense of, uh, being on the autistic spectrum as it's often called, again, showing really good outcomes utilizing DBT.\nAnd interestingly, the treatment itself was not particularly modified, it was just the straight treatment. But I think what was interesting, and I think this is an interesting question we don't know, is that in both those trials, the skills classed was entirely of [00:22:00] people who, had a label of autistic spectrum diagnosis alongside, and whether or not the outcomes are the same, if people are in a mixed group of people who are neurodiverse and people who are not.\nI, that we don't, we don't know. I've certainly run many groups, which were, were mixed but we don't have robust data to say. If that's the same, I. and I think the other thing that's been much more of a focus recently since, you know, the Covid Pandemic and Black Lives Matter and the awareness of the profound health inequalities of people from minoritized backgrounds, is to really think about how, relevant DBT is for people from minoritized backgrounds.\nWhat we know looking at the trials in the trials that have been done in the states, the people in those trials have been representative of the population. So about 30% of them were from minoritized backgrounds, but there's not sufficient data to assess whether their outcomes were different or [00:23:00] similar.\nPeople who are, sexually or gender minoritized are a slightly greater proportion in the studies, which you would kind of expect because that group are at much greater risk of death from suicide and high rates of self-harm.\nAnd the results are a little mixed. Some studies seem to show that actually people from sexually minoritized groups, don't do so well in DBT and that, change is slower. And some trials seem to show it's about the same. But I think the key message in DBT is to really be thinking about, um, addressing with something called the addressing framework, which really explicitly ask therapists to attend to the different ways in which their clients are minoritized and how sometimes those things are intersecting and to really attend to how that impacts\nyou know, the doing of the treatment and the person utilizing the skills. You know, if you are a young black guy living in London, how you might use some of the DBT interpersonal effectiveness [00:24:00] skills is very different to a white woman on the west coast of the United States. And as therapists, we have to really tune into that and really be aware of the context of our clients and how these skills can be utilized.\nSo, there's a much greater focus on that. Now, rightly so, and I think the research is kind of catching up. There's more research happening in those fields to really see if we need to be adjusting things to make sure that people who are minoritized are getting as good outcomes, as people who aren't.\nAndr\u00e9: Jennifer, I'm interested now in, in focusing a bit more specifically on the topic of your talk. 'cause although you're gonna be talking about DBT and your experience, you're also gonna bring both your kind of patient in inverted commas and practitioner roles and that kind of dual role to the table, which is really interesting.\nYou told us at the start, you're a advanced lived experience practitioner. How does that help, do you think, having this lived experience when you're Yeah. Supporting people and working [00:25:00] with people.\nJen: I do bring both perspectives. I think it's important, I call myself a lived experience DBT therapist because I utilize and am open about my experience of receiving DBT therapy.\nIt's got to be an appropriate use. So I'm not going to say, oh yeah, I remember when I did that. Or, oh yes, I found this, this, and this. So there might be a group might, you know, few groups might go by and I don't mention anything. However, it is a given, everyone in the group knows it. And that in itself, I know because people have said that to me, can be very, very validating and reassuring because people say, oh yeah, you get it.\nWhat's interesting is I often have to say the opposite because, um, I remember someone. On one occasion said, oh, finally, you know, you're the fir, you're the only therapist who's ever understood me and got [00:26:00] me. And I will sort of say, well, thank you. And then I'll sort of the DBT approach will be, you know, obviously it's been really, really hard if you felt that no one else has heard you.\nBut let's check the facts, one of the skills, because whilst I totally hear what you're saying, that it's felt, no one has perhaps, is it true or is it, you know, so we'd explore that because I think what I don't want to happen is that I'm seen as this perfect, wonderful person at the expense of everyone else because they may well carry on, you know, in other therapies, et cetera.\nI'll also mention and bring in frustrations. Um, sometimes with mindfulness, people find it really hard to concentrate or focus and be mindful of their breath, and somebody will say that, and I, I often will say, absolutely, I get it. When I started mindfulness, I found that incredibly hard is something almost about, oh, focus [00:27:00] on my breath.\nIt was a bit weird. However, this, this, and this helped. So it's sort of snippets of it, talking about it as well as. Just the general knowledge across the board that I have had those experiences, I have had and received. DBT.\nAndr\u00e9: It feels like we're in a real transition at the moment in terms of how the NHS works and the different roles that we have within it. your job title says lived experience, you know, and that's really out there and clear. And I can see the positives of that. And certainly as a somebody rocking up at services, if I could, if I'm seeing a practitioner who I know has experienced what I'm experiencing, you know, to a greater or lesser extent that there's a real positive in that.\nBut you know, for years, for decades, we've had mental health professionals, psychiatrists, psychologists, nurses, whoever who have sometimes. Spoken about their own lived experience in clinical situations. You know, I know psychiatrists who've worked for decades who say, you know, I tell my patients I've suffered from anxiety [00:28:00] frequently when it's important in the clinical setting, when it, it really enhances connection and therapeutic alliance.\nit feels like it's a bit of a mess almost because we've all got human experiences, we've all got subjective experiences. Do you think these categories are gonna sort of disappear the patient professional categories?\nWhere, where do you think this is going?\nJen: I think there always has to be a difference. you know, where I work, there are 150 of us, not all lived experience. Some are peer workers and that's very, very different sort of a work. I think you are, you are right. And as I said, some people say, oh God, it's really easy for you. You can talk about X, Y, and z.\nI think all change comes with a bit of a transitional period. In my experience, it's very well received, certainly by clients, clinicians, I can actually be quite a threat because as a, I'm a Band seven and people have looked, and both overtly and a bit more [00:29:00] subtly have suggested How come I'm a Band seven when I'm not quote unquote qualified?\nWhich of course I am. has to be a clear differentiation between who's the professional, who is the person who is, facilitating the group or conducting the one-to-one, the therapy, as well as the middle ground, which is somebody like myself who can come at both perspectives and trained and qualified to utilize all my experiences, lived as well as learned.\nAndr\u00e9: What do you think, McKayla, we've got this kind of growth of lived experience practitioner roles, which I think is really positive in the NHS. Where do you see that going? What do you think of it?\nMichaela: mean, I fully would endorse what Jen is saying there. Really. I mean, I think one things that's interesting about DBT is that, of course, Marshall Han, who developed it would've these days been. Calling herself a lived, experienced, practitioner because she had that lived experience and that's where the, the treatment came from.\nBut like many people of her generation and also my generation and maybe a little bit below my [00:30:00] generation, she kept that concealed because of the stigma and that she, I think accurately read that her work would not have been taken as seriously if she had made that public. And so, I think the data show that people who are working in mental health services, significant numbers of them have lived and sometimes living experience of the very problems that they're trying to deal with.\nAnd because of the point that Jen's making, which is that in your role you are the professional. It is your role to assist the person who's coming to you for help. And I think one of the things that's really important I think roles like Jen can really help in decreasing the stigma around being a person who works in mental health and who also experiences mental health issues or has had mental health, a lived experience.\nBecause the thing is, if you can't be open about that in your work setting, then that is neither acknowledged or supervised and the person doesn't get the [00:31:00] necessary. Scaffolding to be able to utilize that. So I think the decrease in stigma around it by having people who were very overtly out there as lived experienced practitioners, I hope will enable people who didn't come to it through that route to be able to acknowledge their own lived experience and living experience, but in such a way that it can then be appropriately utilized.\nI think there was this old fashioned idea that either people. Were people with a mental health issue and there were the people who were helping them, and they're the twain shall meet. And I think because of that, people concealed their own mental health issues, which I think was highly problematic.\nWe did a survey of DBT therapists, and a significant number of them, as we would expect, reported, lived and living experience of some of the issues that they were also treating clients for. But many of them had also said that they had been reluctant to talk about this in their workplace for fear of the stigma.\nAndr\u00e9: Let's move on to clinical care we've spoken a lot about research and we've spoken a lot about DBT and how it works and how it helps people. McKayla, how [00:32:00] do you think we can improve the clinical care we provide? What should DBT therapists doing better? \nMichaela: Well, this is something that really, occupies my day. I've spent a lot of time listening to therapy sessions and coaching therapists, and I think that's a whole podcast in itself, but there are three things I wanted to suggest. I think the first is, and I think this is something that DBT gets a bad reputation for, and I think there's some truth in it because of the way sometimes DBT is done, people feel that there's an overfocus on, behaviors that are problematic, like suicidal behavior or self harm. Now, it's very important to focus on those things because those things signal that a person's life is not worth living. But what's really important, what I really want DBT therapists really focus on is to remember that those behaviors are a solution to a problem.\nAnd it's your task as the therapist to really understand what is that problem that the person is trying to deal with, and to really commit yourself and throw [00:33:00] yourself into solving that problem. And so that means going beyond, crisis skills, I'm not saying those aren't important, but to really get to the heart of the emotional problem that your client is trying to solve and to really address that.\nSo that would be my first tip to really dig into like, what is the problem and really trying to understand that and help the person solve it. And that means that you've got to help them get towards a life worth living. It's not about stopping things, it's about building something.\nMy second point is that for many of our clients, for extremely understandable reasons, they have learned because their emotions are very intense and because they've never been validated and they've never been supported to experience them. Many of our clients avoid their emotional experiencing.\nAnd sometimes therapy can collude with that But actually what we really have to engage with is, identifying what are the precipitants of intense emotional [00:34:00] experiences and actually have to expose our clients to the cues that elicit that.\nexposure should be a central part of DBT treatment, because this is where the heart of change exposure is an extremely effective intervention and it can really transform things from our clients so that instead of having to avoid many things in their life, they're actually able to experience them, to experience the emotion, have the emotion come and go.\nSo exposure would be the other thing. And my final thing of three, this is actually not just down to therapists, but it's about therapists in the context of services, many DBT programs, remain very small and they don't treat. As many clients as would be beneficial. This isn't the fault of the therapist, it's to do with way services are structured.\nIt's that they know they have to tick a box to offer it, but they don't really think about how many clients do we have and how can we scale up our program. And so I think there's a, big piece of work to be done in systems to really think about when you've got people [00:35:00] who've invested to be able to do this treatment, how can you make sure that the service really delivers for the population that it serves?\nAndre: Big thanks to McKayla and Jennifer for sharing their expertise with us and speaking so passionately about DBT and their wider work. The 2025 Big Spud Conference is taking place in Liverpool on the 10th to the 12th of June, so if you want to find out more, do search for Big Spud 25 on social media for updates in June.\nWe will be skitting on blue sky this year from the mental health account, and if complex emotional needs and personality disorders interest you, then there'll be lots more content coming from the mental health over the coming weeks.\nDo look out for that. That's all for now. See you next time."}, {"title": "Darren Williams - Bridging Disciplines: Highlights from the 2025 IoPPN Research Festival", "date": "Wed, 07 May 2025 15:33:43 GMT", "year": 2025, "season": "17", "duration": "13:34", "description": "In the final episode of the 2025 IoPPN Research Festival podcast, Andr\u00e9 from The Mental Elf welcomes Dr. Darren Williams from Kings College London to discuss the upcoming festival. Dr. Williams shares insights into the diverse range of topics and speakers that will be featured, including presentations on religious cognition, autism, and the transformative effects of AI in medicine. He also emphasises the importance of interdisciplinary collabo
