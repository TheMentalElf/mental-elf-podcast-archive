irst to actually focus entirely on this area that she's carried out.\nShe's doing an [00:18:00] analysis of data on the relationship between loneliness and having a personality disorder diagnosis from the adult psychiatric morbidity survey. So it's for Sarah's work, certainly it's. illuminating the intense experiences of loneliness that many people with a emotionally unstable personality disorder diagnosis in particular have.\nThe ways in which stigma may feed into that and reinforce that intense loneliness that it has at its roots. Some, some of the same things as the emotional difficulties themselves. So people often describe things like childhood trauma and abandonment as leading to Both the emotional difficulties that result in a personality disorder diagnosis and [00:19:00] in pervasive loneliness.\nBut then there's a social situation and the stigma are often highly reinforcing to this loneliness. So Sarah is developing a very interesting body of work that hopefully will carry on, hopefully she'll carry on leading on and hopefully we'll be able to do more of on loneliness in this context and hopefully what, what might help with that.\nLucy McConnick is another brilliant PhD student. She's, I believe, going to be presenting at Big Spud, and she's a fantastic junior psychiatrist who's on a fellowship funded by the National Institute for Health Research. And her focus is another one that I think is very important indeed, which is Crisis care [00:20:00] for people with a personality disorder diagnosis, and what the outcomes are, what models work better, if one can find any evidence on that, and what we should do.\nDo and Lucy's published a very interesting review on that, but got quite a bit of attention and is now going on to do her own both quantitative and qualitative analysis. She's also published a qualitative review already that she. did with one of our PhD students, Christina DiLeo, before starting her PhD.\nAnd Lisa Wood, my colleague in the Division of Psychiatry, is also working and publishing on this area of acute care. She's more interested particularly in inpatient settings, because at the moment, we don't really have any models of what to do in acute [00:21:00] inpatient settings or really of what the best crisis care models are.\nI think there's innovative practice around the country in some areas, but it's not at the moment found its way into the research literature or into sort of clear evaluative literature. I'm not working with anyone on this and I'm not aware really of work on this, but I think looking at avoiding the use of the Mental Health Act for people with a personality disorder diagnosis is also of tremendous importance. So, \nAndr\u00e9: So I want to just come back to this point about stigma it's a big finding of the reviews that you've done something we know already from our own kind of conversations and from social media and from feedback from people who lived experience, but views that clinicians have towards people with a personality disorder diagnosis.\nAnd I wondered if you could say something about why you think that is. It seems, we know from the [00:22:00] anti stigma literature that mental health professionals stigmatize lots of different people with mental illnesses. But it seems that people with personality disorders are almost the worst hit on this front.\nSonia: Oh yeah, yeah,\nAndr\u00e9: Where does that come from, do you think? Are things improving? You know, we were trying to make services more trauma informed. We're talking a lot more about trauma. And do you think since these reviews that you've done, you know, things are improving in services? And if so, why?\nSonia: yeah, I think definitely this is where mental health professionals are really stigmatizing. I mean, if you listen to a conversation between a group of mental health professionals about service users with psychosis or with bipolar or with depression or, you know, they might say things that seem a bit Doubtful.\nSometimes they'll make you feel they haven't fully understood or something, but they're not kind of downright rude, [00:23:00] really, or dismissive on the whole, as they still really can be regarding people with a personality disorder diagnosis. I guess it's important to remember where we've Um, and I think it's really important to understand where we've come from, which is that you just have to go back maybe to the early 90s to an idea that people with a borderline personality disorder couldn't be helped at all, and that they had no real place in mental health services.\noutside, a number of specialist units, that try to help them in a very long term way, but, When there no longer a diagnosis of exclusion report was published that was actually on a background of people simply feeling you could make that diagnosis and show someone the door. So that, I suppose, is, [00:24:00] where the start of this story is.\n The Crisis Team model when people were writing about it in 2000, it seemed to be okay to say, well, it's not for people with a personality disorder, People have advocated simply excluding them. And I mean, that could be all right if you said it, but there's this service over there that actually does do the job.\nAnd you know, you'll get meaningful help from, but of course that wasn't what was going on. And that's of course the trouble. It's the trouble with inpatient care as well. It may not be the greatest model for a lot of people who've got a personality disorder diagnosis, but if you're not coming up with anything else that people can turn to in crisis instead, then it's not very helpful to exclude people.\nSo I suppose that, um, starting point is important. And otherwise, why, why does it happen? I guess [00:25:00] the whole sort of formulation of this as something that's part of people that can't be altered, obviously is contributing to stigma, and, and that of course isn't right. If you look at follow up studies of whether people meet the criteria, for an emotionally unstable personality disorder diagnosis, actually it really fluctuates over time.\nSo this, this idea of permanence, I think clearly hasn't helped, but also clearly isn't justified, which I think is, to me, is one of the biggest reasons for trying to move on from this label really, which is that it does imply that and it's, it's not the case. I mean, I'm interested in, people like Rachel Rowan Olive and a variety of people, I guess, come up with this sort of feminist critique of the label, which I [00:26:00] think has force, really, that it's, a way of pathologizing angry women, although obviously often they're women who are not just angry, but also really distressed, so need some support.\nBut I think the way it's being formulated, I think there's value in the, feminist critiques of that. Otherwise, I, I don't know quite where we are. It's, it seems, very bizarre in a way because there's so much evidence of roots, not for everybody, but for a considerable proportion of people in quite bad experiences of childhood abuse.\nAnd as a society, we're sympathetic to children who experience abuse, but for some reason, not at all sympathetic to adults who have experienced that and end up with this set of emotional difficulties [00:27:00] that are related to it. So it's a strange disconnect really. As to whether people are becoming more sympathetic, I, I think I, I'm, I'm not sure somebody should take a systematic look, shouldn't they?\nBut I feel like I see pockets of it being more understood and in a way in this sort of renaming of services and some of the discussions. I think there's movements, but. As with so many kind of changes in perspective on mental health, I think it's really patchy and there are many people working on wards or in a and e or whatever who actually don't really get to hear the new kinds of conversations that might be taking place.\nabout the need for, [00:28:00] to change things. So, I think now more than ever, it's a bit of a lottery who you're going to encounter if you seek help and end up with this diagnosis. And I can really see why people try and dodge getting this diagnosis. diagnosis that makes a lot of sense to me, to be honest.\nAndr\u00e9: You've ended on a really dour note, but I think it's a really important one to focus on. yeah, I'm really pleased that you've been invited to speak at the conference. I know that what you're going to say is going to go down really well and get a lot of people thinking at the event.\nAnd, looking forward to hearing you talk there and also looking forward to hearing your thoughts on the stuff you hear at the conference, because I think it's a really interesting, diverse event.\nSonia: having made it to Belfast, actually, that's one advantage. If it was in London, I might well end up rushing in and out. Whereas having made it to Belfast, I think I will go to the whole thing. So yeah, that's a [00:29:00] plus. \nBig, thanks to Sonia for sharing her time and knowledge. So generously. As always, I'm really looking forward to covering her session at the conference and seeing what the big spike members and delegates think of her presentation. That's it for this second podcast episode, I hope you found it interesting and thought provoking. We've got more podcasts coming up. Including with Anthony Bateman, mailable and others. And if you haven't got your conference tickets yet. Don't delay. You can book now@bigspud.org.uk and join us in Belfast in June. This is Andre signing off. See you again soon. "}, {"title": "Edgar Jones - The roots of research excellence at the Maudsley-IoPPN", "date": "Tue, 07 May 2024 14:50:18 GMT", "year": 2024, "season": "16", "duration": "16:10", "description": "Welcome to episode 2 of the IoPPN Research Festival podcast. The festival takes place in South London on Wednesday 15th May 2024, and this year the theme is Origins and New Beginnings and there will be keynote talks from Melanie Abas, Emily Simonoff and Edgar Jones. We're focusing on origins in this second podcast episode, as we meet Edgar Jones, Professor of the History of Medicine and Psychiatry at the IoPPN. He was awarded a Wellcome grant to explore the clinical and research blueprint of the", "url": "edgar-jones-the-roots-of-research-excellence-at-the-maudsley", "transcript": "Edgar Jones IoPPNfestival\n [00:00:00] \nAndr\u00e9: Hello? Hello? Hello. And a very warm welcome to episode two of the IAP PN research festival podcast. The festival takes place in south London on Wednesday, the 15th of May, 2024. And this year, the theme is origins and new beginnings, and they'll be keynote talks from Melania pass. Emily Simon off. And at \nAnd we're focusing on origins. \nAnd this second podcast episode, as we meet at K Jones, professor of the history of medicine and psychiatry at the IPN. He was awarded a welcome grant to explore the clinical and research blueprint of the multi hospital. From its foundation in 1916 to the immediate post 1945 years. And over the next 15 minutes, we'll hear about the founding of the Maudsley at the beginning of the 20th century. And the turbulent times through which [00:01:00] this hospital grew. \nEdgar: I'm Edgar Jones. I'm Professor of the History of Medicine and Psychiatry at IOPPN, and I've researched over a number of years the history of the Maudsley Hospital, what it did, where it came from, what it's trying to achieve.\nAndr\u00e9: So I guess to put it into context for us, maybe, you could start off by painting a bit of a picture of what psychiatric care was like at the beginning of the 20th century. \nEdgar: Before the Maudsley Hospital was founded, psychiatry was devolved to the counties. So each county had to build its own asylum and was legally responsible for treating anyone who suffered from severe mental illness. And some of these hospitals Became increasingly large. There were a thousand beds and they cited them in the countryside because it was peaceful away from the stresses of a city and they almost developed as little settlements in their own right with farms, recreational areas, [00:02:00] staff lived on the site.\nAnd although that was. Efficient, it kind of meant that they were divorced from mainstream life and it marginalized the asylum system, cut it off from medicine, cut it off from people generally, and it promoted stigma.\nAndr\u00e9: And what sort of people were in those institutions before the First World War? And what kind of treatments, if any, were available for people?\nEdgar: I think they accommodated a cross section of the population because You had to be psychotic. You had to be very, very unwell before you could be admitted to an asylum because government funding followed your, your admission and your care. So you had to be sectioned to be, in one of the hospitals.\nAnd of course, mental illness is no respecter of class, education or background. So there would have been across the range, men, women, small children sometimes. a very diverse population. but I guess all brought together because they were really suffering from some [00:03:00] really very difficult illnesses, tough illnesses that were difficult to live with.\nAndr\u00e9: So in 1907, Henry Maudsley and Frederick Mott drafted this ambitious agenda, for not just treating severe mental illness, but also researching it. can you summarize their plans for us?\nEdgar: Mott worked at Claybury Asylum, and he was, he was worried that people were being admitted and spending long periods of time without, An increase in understanding that the illnesses had kind of become accepted, and he felt that not enough people were thinking about the causation, ways of improving care.\nand just generally being more optimistic, about what could be done and maybe what could be discovered to make people's lives better, to improve the quality of treatments. So he linked up with Henry Morsley, who was Benefactor, to try to think of a way they could design a new hospital on a [00:04:00] smaller scale that would be more user friendly and would allow research and experiment into new and more productive forms of treatment.\nAndr\u00e9: So the Morsley opened quite a few years after that. There was a, there's something that happened in between, I think, quite a big historical event.\nEdgar: Yes, sadly, their plans were interrupted. The building work was going ahead. I mean, there was a short strike, I think, in about 1913, but it wasn't far off being completed when the First World War breaks out. And King's, across the road, which is also a brand new hospital, is used, taken over by the War Office, to treat the sick and wounded coming back from France.\nAnd then they Maudsley as soon as it's possible. It's, it's open and ready to go in 1915, they start to admit service patients to the Maudsley buildings and it becomes the neurological psychiatric annex to King's College Hospital across the road.\nAndr\u00e9: what happened then after the [00:05:00] First World War, the the proper opening, if you like, of the Maudsley Hospital in London, so what was that, early 20s, something like that? Give us a picture of the kinds of patients that were being cared for, sorts of treatments that were being offered at that point.\nEdgar: Yeah, Maudsley opens officially in February 1923. And The plan is to treat a whole range of illnesses, not just people who are suffering from very severe psychosis, but people with occupational illnesses, occupational psychiatry, such as shell shock, as we've seen in the first world war. Also people suffering from depression, anxiety states, they want to get a broad sweep to increase The chance that they're going to understand the roots of mental illness and devise more targeted treatments rather than those which are more to do with containment and calming those who are in very agitated states.\nAndr\u00e9: So give me a bit of a picture of what, yeah, what care would be like for me if I was admitted with an early sort of psychotic episode. This is a hundred [00:06:00] years ago. often when we look back that amount of time, we sort of laugh at the things that we were doing and our sort of how we conceived of, you know, treatment for illness.\nwhat would I have experienced?\nEdgar: Well, as in the asylums, you would have probably. Most likely been admitted to a ward, but it would have had slightly fewer beds and probably about 20 beds with some single rooms at one end rather than a big ward with 50 beds. So it's a more human scale. You're not in the countryside, you're in suburban London with parks around about and a railway station. They put a lot of money into high quality food because they thought that a good diet would improve a recovery process. They planted trees in the hospital grounds. They wanted it to be somewhere where you could sit outside, get lots of fresh air, get exercise and build up your immune system. So it was designed to be more friendly.\nLess stigmatizing and the architecture was the English Renaissance style. [00:07:00] So red brick Portland stone. So it was a friendly kind of English place, which if you didn't look too closely, you could think it was a town hall or some sort of local building, but not an asylum. It was designed to get away from the old fashioned picture of the big asylum.\nAndr\u00e9: And presumably, at this point, socially, economically, 1920s, 1930s, there was considerable challenges in our country. What were the challenges they faced with this quite innovative venture at that time?\nEdgar: Funding is obviously one because the costs. of having a small scale hospital with individual rooms, good quality food, a much higher staffing ratio, greater number of doctors and nurses per patient than you would have got in a big asylum, the costs go up. So they had to get the LCC, London County Council, on side in order to provide the finance because patients, they're local patients, and they're treated for free.\nSo they also have a private patients block as [00:08:00] well, and that's an extra income stream designed to enable all this to happen. But it is, it is a more expensive operation than the traditional 2, 000 bed county asylum.\nAndr\u00e9: So tell me a bit about how the, ethos and the kind of clinical services, the research was influenced by elsewhere in Europe. Because there was a lot going on, particularly in Germany at this point. How did they come up with the kind of idea of this organization? How are they influenced by other institutions?\nEdgar: Frederick more when he's trying to work out what would be the best design for the hospital. He goes to Germany to visit Kraepelin's clinic in Munich because Kraepelin is a internationally recognized professor of neuropsychiatry. He's got a large clinic, lots of patients. doing groundbreaking research.\nAnd so he tries to model the Morsley on this German example where you've got integrated teaching, research, and, Publications [00:09:00] laboratory facilities, all in one big clinic, but they can't do it on the scale of the Munich enterprise. so it's a kind of small scale down version down in Camberwell. \nAndr\u00e9: And then we had a Second World War that came along. So what state was the Mosley Inn at that point, before the Second World War?\nEdgar: But Maudsley was just beginning to thrive in the late 1930s. It had managed to get a series of grants from the Rockefeller Foundation. And these are, you know, reasonable size grants in today's values, half a million pounds, quarter of a million pounds over five years. They'd got some very senior scientists from Europe who'd fled from persecution in Germany.\nSo the quality of research was beginning to go up and they were just starting to expand the number of beds. the outpatients was going up all the time, they were beginning to publish, and then the war comes and interrupts all of that, and they're forced to close the Morsley [00:10:00] building, because it's considered a great risk of bombardment, and they move to two satellite hospitals out in the suburbs, one in the north of Mill Hill, one in the south down at Sutton, which are considered a bit safer, and would be able to take people from Those two, two areas, and that kind of divides the hospital.\nIt temporarily halts the progress that they were on\nAndr\u00e9: And presumably this is pre any kind of medication for people with psychosis at this point in the 20s and 30s. What are the kind of biological interventions that we're using here? Or was it not, was that not on the agenda?\nEdgar: they were looking for effective medicines, but you're right, there were no antipsychotic drugs, there were no antidepressants, all they had were drugs that made you sleepy. And they had the amphetamines coming in, which gave you a lift in the late 1930s. But this was the big drive, to find some antipsychotic medicines, antidepressants.\nBut we're still [00:11:00] some way off. Those don't start appearing until the 1950s. But what does come in from Europe are radical physical interventions. You get ECT, for example, in the late 1930s. And you're also beginning to get a more, aggressive leucotomy and lobotomy, and insulin coma therapy as well.\nAndr\u00e9: And so let's move to the period after the second world war. Tell us a little bit about how the Maudsley kind of adapted and grew at that point. This is when things really started to come on a\nEdgar: Yeah, 1948 represents a turning point because, first of all, the Maudsley Hospital and its medical school become part of the British postgraduate, uh, medical federation, and that gives them immediate access to funding. They also merge with the Bethlehem hospital, which is a hospital with a significant financial endowment and large numbers of patients.\nSo straight away, they've got extra income. [00:12:00] They've got large numbers of people. Who they can recruit volunteers for clinical trials, and they're beginning to roll now that they're part of the University of London. And there is this therapeutic revolution. Drugs companies are beginning to discover medication like chlorpromazine, antipsychotic drugs and antidepressant drugs, so they can begin to.\ndo clinical trials to see which are the most effective.\nAndr\u00e9: It's fascinating that you spent, you know, a significant amount of time looking at this period, you know, a hundred years ago, I'm interested in your sort of sense now of where the Moresley is right now, at the beginning of the 21st century, and what's likely to happen over the next sort of 40 to 50 years.\nEdgar: We're hoping that there's, that there's a new period of, expansion and innovation. You know, we've got the psychedelic assisted psychotherapists coming along. We've got all the imaging work. We've had the epidemiological studies. [00:13:00] So it looks as though there may be a period where There will be some exciting in new treatments in a way that there hadn't been maybe in the last 20, 25 years where the progress had been much slower, but it's, it's very much at the stage of research and finding out what, what is potentially possible, but the use of psychedelic drugs combined with psychotherapy, multidisciplinary teams.\nThere is a hope that there will be an increase in the pace of innovation and therapeutic success.\nAndr\u00e9: And we started off talking about removing people from society, putting them in an asylum in the countryside, the stigma associated with that. I wonder if you could kind of reflect on how you feel mental health services are accessible now for people, and where we're at in this journey of removing stigma, normalizing these experiences.\nDo you feel like Um, we have solved that problem [00:14:00] or do we have some way to go still?\nEdgar: It's sort of part of it. I mean, we've, um, as you say, we've moved from the asylums to care in the community. We've expanded the range of psychotherapies, behavioral therapies. There's a much greater range of innovative and exciting interventions. But the problem is the share of the NHS, which is. diverted towards mental health services has been cut in real terms.\nThe budgets have gone down in real terms, and psychiatry seems to have taken a significant hit. So it's kind of frustrating in a way that there are a lot of important innovations, new treatments, but access to them for funding issues is not great. There's often long waiting lists. Um, I mean, I have students with mental health, issues and, we know the services are there, but it's very difficult for them to get treatment quickly.\nAnd when they do get treatment, do they get the [00:15:00] full amount of time that they need? And at the moment, I think more progress needs to be made.\nAndr\u00e9: So finally, give us an advert. Give us a sort of 30 second pitch. Why should people come along to the festival and listen to your talk?\nEdgar: Come along, listen to the talk, because you'll discover where the Morsley came from, what it was trying to do, where it went wrong, and the things it did to put it right and get itself moving in the post Second World War world.\n Thanks. Very much to Edgar for joining us and taking the time to trail his IOP PN festival keynote talk. \nWe look forward to covering his talk on the roots of research excellence at the Maudsley IPN in more detail on may the 15th in London. Look out for episode three of the IPP and research podcast coming soon and featuring Melania bass. Speaking about global mental health and the ambition to end HIV aids. If you'd like to attend the research festival in person free tickets are available. \nJust follow the link [00:16:00] in the podcast description to event bright. That's it for now. This is Andre signing off. I'll see you all soon. "}, {"title": "Anne Lingford-Hughes, Belinda Lennox & Bill Deakin", "date": "Fri, 03 May 2024 09:29:11 GMT", "year": 2024, "season": "14", "duration": "22:33", "description": "Welcome to a new episode of the BAP podcast.&nbsp;The British Association for Psychopharmacology are celebrating their 50th anniversary in 2024. We'll be joining them in Birmingham for their annual summer meeting, which takes place from the 21st to the 24th of July. This episode of the podcast features three people who've been involved with BAP for many years: Anne Lingford-Hughes, Professor of Addiction Biology &amp; Head of the&nbsp;Division of Psychiatry at Imperial College London, Belinda Le", "url": "anne-lingford-hughes-belinda-lennox-bill-deakin", "transcript": "Anne, Belinda, Bill BAP2024\nAndr\u00e9: [00:00:00] Hello? Hello? Hello. And welcome to a new episode of the bap podcast. The British association of psychopharmacology are celebrating their 50th anniversary in 2024. And what we joining them in Birmingham for that annual summer meeting, which takes place from the 21st to the 24th of July. I'm Andre from the mental health and I'll be covering the event this year with my colleague Flo Martin. Flow. \nWe'll be live tweeting from the mental health, using the hashtag bap 2024. And I'll be recording short videos with speakers and delegates to share online as part of our coverage. There's lots to look forward to in Birmingham. As this meeting always brings together researchers and clinicians from around the world, covering everything from alcohol to schizophrenia. This episode of the podcast features three people who've been [00:01:00] involved with the bap for many years. And Linkford Hughes professor of addiction, biology, and head of the division of psychiatry at Imperial college London. Belinda Lennox, professor of psychiatry, head of the university department of psychiatry and Oxford. And bill Deakin Ameritas professor at the division of neuroscience at Manchester university and also past president of the bap. Along with Alan Young, this group of incredibly knowledgeable and experienced academic clinicians have been invited to run the closing session of the conference this year. Entitled the past and future of the bap. \nI started by asking all of them what role the bap has played in their career. Here's blender, Lennox kicking things off. \nBelinda: I've been a psychiatrist for 30 years and BAP has always been, in my mind, sort of premier meeting each year for getting really top class clinical and preclinical researchers. And actually psychopharmacology [00:02:00] researchers, I'm not just saying this because of the present company, but obviously they're part of it, have really been the sort of premier thinkers and academics advancing our understanding about the causes and treatments of mental illnesses.\nSo it was the place to go if you wanted to see the cutting edge science and really get excited about research.\nBill: I think it's exactly the same for me. I mean, I can't remember when I first, , went to a BAP meeting. It was, , very early on. , and so there's a great amalgam of people in industry. That was a great pleasure to see, you know, how, they worked in addition to, , the academic psychiatrist, the clinical psychiatrist, and then the university sort of preclinical researchers.\nSo I, my PhD actually was all about rat behavior, although I'm, you know, I'm a clinician, I'm a psychiatrist by background and chose to do psychiatry, I was very interested in rat serotonin and all that sort of stuff. So there's loads and loads of preclinical departments doing that. And of course, there still are.\nI mean, it's amazing what rat psychopharmacology tells us now and the techniques they've evolved [00:03:00] for, you know, activating discrete parts of the brain. We used to activate the brain with little wire electrodes, but now you do it by shining lights and doing stuff like that to activate very specific regions of the brain. \nAnne: So often tell my students that I wouldn't have had my career without BAP and I genuinely think that really, so I did my PhD preclinical and moved into clinical. So BAP was, And I think that's one of the few places you have that translational element and maybe at the time, you know, it was, it was just what happened and that was, I was comfortable with it but actually I think it's become more and more important that clinicians are exposed to preclinical scientists and basic scientists and vice versa. I probably been there for, I remember for over 30 years. My mentor at that stage was Rob Kirwan, who again, sadly is not with us any longer. And Rob said, you have to go to BAP, you know, this is where it's at. And I went to BAP meeting in Cambridge and.\npresenting my poster, around alcoholism David not having to be there, got his MLC grant and through that [00:04:00] meeting, you know, I think that's the other thing that BAP gives you is that network and connectivity, which has been so vital. I think aside from the research, the other bit that's been quite important to me.\nSo I was, , general secretary many moons ago and, and, Part of that in those days was education and training and , Bill then asked me to join the Certificate in Addiction, which 25 plus years later I'm still doing, , with Julia Sinclair. , and, and that's been the think the educational stuff we do, started the masterclasses.\nThose have been phenomenally successful. So I think the other thing about being part of BAP, what, given me, it also has been about what we've, the organization has been able to do and set up and really get the psychopharm message very clear. Clearly across, I think, and that's been really, really important.\nAnd the other thing I'd say about the addiction, you know, we've been through tough times, but wondered whether we would have a future as a certificate, but we [00:05:00] just had one last month or earlier this month in Manchester, and it was vibrant, one of the biggest audiences we've had. And so, you know, that's the other aspect I think to BAP has been amazing, you know, that we were part of this big family really, and that's great.\nBill: Yes. The family aspect of it is, , Important. He's clearly a part of a huge family.\nAnne: I think if you trace everybody back, you could probably go back to the founding, and we're mostly fathers. Um, you know, we, we're all connected in some way. I\nBelinda: true, and the timing of the meeting, so everybody times their summer holidays around BAP and then they go off for the summer, so it is like a, yeah.\nBill: And so the nice thing about the certificate was that, or is, I mean, it's mixing with people, you know, people that are not academic, but want to find out more about psychopharmacology. So, you know, I've been doing the schizophrenia one for donkey's years. I stopped recently. But just, just meeting regular trainee psychiatrists who are not going to be [00:06:00] academic.\nFeeding the science stuff through to them. And, , their interest is, , is always very stimulating and, , pleasant, gregarious, , warm, , meeting.\nAnne: And I just think that's the other important role. And I think I've really valued, being part of that, delivering it as well, because every time you learn something, you know, and the network is amazing, and you can see the light bulb moment and somebody thinks, ah, you've given me a different idea about how I could manage that challenging clinical situation, or, you know, so much of what we do is rooted in psychopharm.\nAnd I was always taught by Rob that, you know, it's rational prescribing of medication. So sometimes we're telling people to stop or withdraw or change. It's not all about more and more drugs, more, more medication. It's about being clear why you're prescribing. And I think, that's been a valuable part of the BAP.\nBelinda: Yeah, I think that's right. I think they really do have an authority around psychopharmacology. So it's not just sort of [00:07:00] communication with clinicians and training clinicians, it's much broader than that as well. It's about public communication about the value of these medications. So we, I mean, because I'm the vice chair of the psychopharmacology committee in the Royal College of Psychiatrists.\nAnd we, we often, well, all of our consensus, some guidelines, for instance, , with jointly with BAP around the antidepressants or around antipsychotics, whatever it might be. And that's really important.\nAnne: The guidelines actually are phenomenal and being involved in several of them. And as you say, that They're seen as gold standard in many cases.\nSo apart from all the academic stuff that we may get, I think it's the other bit about how we can more broadly improve prescribing and practice\nAndr\u00e9: Maybe you could each tell me about a really key, classic psychopharmacology paper that's been published in the last 50 years, that's really made a difference at the front line.\nBill: Learning about, , the discovery of monoamines [00:08:00] and their localization in the brain, I'm, you know, going way back now to the 60s, , but that area just, just got consolidated when I joined.\nAnd so the papers of Alfred Carlson. And Scandinavian people, the studies that show that amphetamine, , abusers, , could develop a paranoid psychosis that the psychiatrists couldn't tell the difference between that and the, you know, the real things that were. , and particularly Carlson's, Carlson's Nobel Prize winning idea that not only is dopamine a neurotransmitter, but antipsychotic drugs, , probably work on that system.\nOne of the classic papers was that, , antipsychotic drugs increase the turnover of dopamine. So, what does that mean? And his clever idea was, well, it's the receptors that have been overstimulated, , and they're being blocked. By the antipsychotics. And so you see this increase in, , dopamine, , turnover in the brain, inferring that there must be dopamine receptors in the brain and that they're getting overstimulated in people with schizophrenia.\nSo that was, , awesome stuff. And being able to visualize those neurons, , [00:09:00] in the rat brain and the human brain using these sort of fluorescence technique, these, the neuro sort of glow out in their pathways and suggest all sorts of ideas about , how they might work. So that was the beginning. for me, the Carlson papers, really.\nAnne: I started training in the early 90s, we were routinely prescribing two gram equivalent of chlorpromazine and then PEPs. Okay. I was part of Rob Cohen and Pulaski's group for a while and, um, you know, the pet studies, Faraday, Kapoor, showing occupancy of antipsychotics and, you know, now the very famous graph really showing that, you know, above a certain occupancy, you've got no extra efficacy, but lots of side effects.\nAnd we knew what dose of each of the antipsychotics we achieved. So that to me, that within a, within a post really, that transformed how much we were prescribing because we knew. There was no point. So I think I've always seen the power of that kind of, , research [00:10:00] to transform clinical. And it didn't take years and years.\nIt, it really, for my mind, you know, I heard about it at a meeting and it pretty much, you know, happened quite quickly, really. , maybe I'm looking through rose tinted glasses. I think in my field, I can't think of one paper that would stand out like that, but addiction neurobiology, has, Right from having to be,, addiction is a brain disease, Alan Leshner editorial in science, to now we actually have quite well characterized we have new targets.\nSo there's been a huge body work. I think we're shifting away from just thinking about reward and dopamine to the stress systems and amygdala and the frontal cortex and all these different new targets. So for me, that's been the biggest shift in the field. And I think, the antipsychotic D2 receptor occupancy shows how powerful, once you understand biology, and we've had several drugs in addiction that have come from understanding the biology , [00:11:00] into the clinic.\nBelinda: I was just really, , struck by a conversation I had with Phil Powen, who's a sort of wonderful guru of psychopharmacology. He just said he can't think of a single medicine that we use in psychiatry that wasn't discovered by serendipity.\nThere wasn't, there isn't a single one he can think of that went through the sort of drug development pipeline of,, basic research of receptor profiles or whatever in a sort of principled scientific way. idea that was then trialed out on healthy individuals and patients and so forth. It's always gone back the other way.\nIt's always been clinical observation of the sort of surprising kind. And then going backwards and then working out what the psychopharmacology underlying it did. that might be mechanistically important for those disorders. As you know, my research is around autoimmunity and inflammation, is wondering actually whether we've been getting the wrong end of the stick all along.\nMaybe we should be challenging [00:12:00] ourselves a bit more, psychiatrists are very open minded, but maybe we should be just trying to think through whether this sort of backwards theorizing and mechanistic assumptions might be missing a different dimension that we weren't even looking at.\nSo that doesn't really help you, but, um, I don't know, that's what I'm thinking about at the moment.\nAndr\u00e9: Yeah, no, that is really interesting, isn't it? I suppose it leads us on quite nicely to looking forwards. We've done a little bit of looking backwards in this conversation so far, and your session at the conference in Birmingham is going to be looking backwards over the last 50 and then thinking into the future.\nWhat would you say are some of our kind of best bet areas that we need to be focusing on for this field to be really taking leaps and bounds forwards?\nBelinda: What I'm really excited about at the moment is different ways of doing clinical trials. Instead of being hugely expensive, you know, many years [00:13:00] testing out one particular drug and assembling a huge infrastructure to getting an answer of many, many millions of pounds that, you know, and this has been essentially pretty disappointing over many decades.\nThere are different ways, of doing these trials and multi arm, multi stage platform trials that have been hugely successful in other areas such as cancer and are now being rolled out in other neurodegenerative diseases. But, I think this is the huge potential for us. So much quicker, clever statistical models that you get early signals of testing completely different compounds that test different mechanisms of action.\nAnd if you get one compound that shows no signal of action whatsoever, you discard the whole class of medicines, basically, and you just move on, you know, so you get a much quicker readout of things that might be interesting and you pick compounds to test that really, address completely different lines of action.\n[00:14:00] So you might get Surprising results that you hadn't even thought of, that's what I'm quite excited about. You can come back in 20 years time and see whether I was completely wrong.\nBill: COVID's been a great example, hasn't it? For doing those sorts of trials. But they have such a definitive end point. One problem with psychosis is what, you know, what is this sort of, consistent, hard end point that, , we could use. And , maybe it comes down to these sort of personalized ways of, , measuring symptoms on your mobile phone.\nAnd, AI takes care of analyzing it, to give you the end point. Thank you.\nBelinda: Yeah, such a key point. It's got to be a meaningful end point as well, because we only measure things that are easy to measure. It doesn't necessarily mean that it's actually important , for people with the disorder. \nAnne: I think improving infrastructure or methodology is really, really key I do feel some hope in our field. So the office of life sciences is funded an addiction mission of which I'm chair, but also the mental health mission led by Saini Manji and Catherine Abel. And, Altogether about 75 million vested and this is to improve [00:15:00] the research ecosystem and structure.\nSo in addiction, we're trying to improve knowledge. We're trying to improve the regulatory side because of where addiction services sit in the UK in England. They're in the third sector we're trying to improve the number of people we're trying to retain people. I know in the mental health mission they're working also on how to do clinical trials and make it more efficient and all this kind of stuff.\nSo there's a lot of activity going on. So if I'm going forward, I would say if I look back a little bit, there's been a bit of a lull maybe, but it's been recognized. That this is a very important part of what the UK can do. And therefore we need to support and fund it appropriately. So I do look forward with hope, more hope than I may have done a few years ago with this investment.\nAnd, and not only the scrutiny and the focus on it, that this is key part of what we need to be doing in terms of improving outcomes for mental health , in the UK, and obviously contribute to sort Globally, I think it's also about the integration.\nSo [00:16:00] what was interesting, if you looked back to the horizon scanning 20 plus years ago about where we would be now, digital stuff really doesn't get a mention very much. And I think that's exploded, whether it's wearables and monitoring or through all the way to using AI machine learning, whatever, to analyze data.\nThat will take off and I think the whole bit about. who has access to what of my data and how to share and what to share. I think that's going to be really interesting to see how that evolves because I'm very struck when I listen to people talking about you can have a virtual meeting or you can just fill in everything from this app.\nI think about my mum who's 90 and I think about my typical client in my addiction service, and I think could both of those access that help? Usually the answer is no. So we are at risk of increasing health inequalities, potentially, if we don't think how we're going to integrate this. And you may think what's this got to do with BAP and psychopharm?\n[00:17:00] Well, of course, how many people are responding to medications, adherence through to, , side effects through to are they getting benefit? What are the outcome measures? All of this, we will be using all of this technology, , to improve how we, deliver trials and outcomes and we gain opinions really.\nHow they're going to combine and then how you combine with psychological approaches, psychotherapy and all that kind of stuff. I think that's going to be really interesting to see how that plays out over the next 20, 25 years.\nAndr\u00e9: I guess over the last sort of 30 years or so, we have seen a changing public view towards psychopharmacology and frontline treatments are now much more You know, there's a lot more choice for people and obviously digital really adds to that in terms of scalability and particularly global mental health\ndo you think psychopharmacology is always going to be front and center in mental health treatment how do you see BAP As part of that?\nAnne: I know there are certain very senior, People I can remember in the past [00:18:00] advocating that we should be neurobiologists or biologists rather than focusing on pharmacology.\nIt was a bit reductionist. And I guess it, it depends for me, you know, a warm fuzzy feeling that somebody might explain in psychological terms. I'm thinking, well, is that endorphins? Is that oxytocin? You know, I probably think down to neurochemistry because I would argue I can't imagine, An emotion without some movement of neurotransmitters in the brain, quite frankly, or modulators or something like that.\n Rational prescribing is really important and understanding the role that the medication plays in the holistic. One of the reasons I loved psychiatry was it wasn't just about psychopharm, particularly in addiction. There is a social aspect.\nThere is a mental health aspect. There's a physical health aspect. It's part of the landscape. And I think we all know that. whilst drugs are extremely powerful and are often the only thing or the really the necessary thing in that moment. We're talking about [00:19:00] outcomes, you know, you, you generally going to need a psychological approach or some psychosocial support or their environment needs to be supported or changed.\nYou know, there's all the other bits as well. It's part of the landscape. So I can't see how you can, put psychopharmacology out of the, out of the picture. I think it will always have a role.\nBelinda: I'm in no way a biological reductionist, and I'm very comfortable with that. in my clinical practice and as an academic, recognizing the importance of all different contributions. But I do feel that psychopharmacology is central to psychiatry. We've just completed a network meta analysis of all the components of early psychosis care.\n, and what is the vital contributions to a good outcome. And, you know, each bit, each part, whether that's psychological therapy, or family therapy, or care coordination, all add value to some outcomes, but they're all completely overshadowed by the huge contribution and importance of medication [00:20:00] underpinning all that.\nSo there are additional components, and they're very important for quality of life. But, comparison to having an alongside that.\nBill: Yes, it depends on the severity of the disorder. psychopharmacology probably is frontal central for severe mental illness, but what are the limits of psychiatry? I suppose it is, I mean, for mood disorders and stress reactions and all that sort of thing. I wouldn't say that drugs are, you know, front and center and treatment and I don't think I can think of a psychiatrist who is opposed to the idea that clinical psychology and social workers and what used to be the multidisciplinary team, , don't have a key role in managing , every level of severity. It's just that , some disorders like schizophrenia, you know, severe psychosis and it's chronic enduring, , psychopharmacology is absolutely key.\nAndr\u00e9: Why should people stick around to the end of this conference? Because you're literally the last session. Can you give me a kind of an [00:21:00] advert for this session? Why should people bother to hang around and join for this?\nBelinda: You'll get to hear all of the top secrets from professors Young, Deakin and Linford Hughes that they have never revealed to anyone before.\nBill: It's going to be a massive gossip festival. I think there'll be a fair bit of anecdotal stuff, I should imagine, and personal experiences. I think that's, people find that interesting.\nAnne: Being invited to do it, you know, , is great also because it is , very rarely in our busy lives that we , do we stop and reflect and actually think backwards and forwards and actually, as I said, finding the documents for, where would we be in 2025 and looking at that and seeing how we predicted and what has changed and not.\nLet's see what the future might look like and then we can, our successors, well I'm not sure I'll be here in 20, 25 years doing this, , maybe I will be, , it's always good to predict and then see what happens really.. \nAndr\u00e9: Big, thanks to Anne Belinda and bell for taking the time to speak with [00:22:00] me for the bap podcast. \nI highly recommend sticking around until the end of the summer meeting in Birmingham and not missing what promises to be a really excellent final session. All about the past and the future of the bap. \nThat's it for now? This is Andre signing off. I'll see you in the next episode or the bap podcast coming soon. "}, {"title": "Emily Simonoff - The King\u2019s Maudsley Partnership for Children and Young People", "date": "Tue, 30 Apr 2024 16:44:26 GMT", "year": 2024, "season": "16", "duration": "18:47", "description": "Professor Emily Simonoff is Professor of Child and Adolescent Psychiatry at the Institute of Psychiatry, Psychology and Neuroscience (IoPPN). In this podcast, she speaks to Andr\u00e9 Tomlin from the Mental Elf about the new King\u2019s Maudsley Partnership for Children and Young People https://www.kingsmaudsley.org You can hear more from Prof Simonoff at the 2024 IoPPN Research Festival, taking place on 15th May 2024: https://www.eventbrite.co.uk/e/ioppn-research-festival--tickets-856888826547?aff=oddtdt", "url": "emily-simonoff", "transcript": "IoPPNfestival template (drop audio between music tracks)\n [00:00:00] Hello? Hello? Hello. And a very warm welcome to the IAP PN research festival podcast. The festival takes place in south London on Wednesday, the 15th of May, 2024. And this year, the theme is origins and new beginnings. There'll be keynote talks from Melanie Abass at good Jones and Emily Simon off. This is always a jam packed high quality event, which showcases the exciting and innovative research that comes out of the Institute of psychiatry, psychology and neuroscience. Expect an afternoon of short talks from top researchers, staff and students on a really diverse range of topics. As always we'll be covering it live from the mental health. And this year, my colleague Fran Bentivegna will be attending in person and live tweeting from the mental health. Follow the [00:01:00] hashtag IAPP and festival for updates. And I'll be recording conversations with keynote speakers to find out a little more about their work. In this first podcast episode, we meet Emily Simon off professor of child and adolescent psychiatry at the Institute. Who talks about youth mental health and exciting developments taking place right now on the Denmark hill campus. \nEmily: Youth mental health has suddenly over the last five years become so very topical, for the whole population everyone is really quite concerned about youth mental health. Frankly that's with good reason, epidemiological studies, that is studies that look at the whole population of children and young people.\nSome Transcribed 10 years ago were pretty consistently in the UK reporting that about one in 10 children, young people had a mental health disorder. , if you went back, 20 years, you would also get those [00:02:00] one in 10 rates. So that they were really pretty consistent, but about five or six years ago, those slowly began to creep up. To one in eight and now one in six amongst children and young people, and particularly in adolescence, the increases seem to have been mainly amongst adolescents.\nAnd we were so struck by them that we began to wonder if the surveys were inaccurate and were somehow picking up, false rates of endorsement, but there's lots of additional evidence to suggest those are correct. Those go from the increasing rates of referrals to child and adolescent mental health services, which after The initial COVID, lockdowns went up about threefold and we will have heard most topically or most recently about the high rates of young adults now who are saying that [00:03:00] they don't feel they can enter the, employment arena because of mental health problems.\nAnd That perhaps takes us to one of the really important reasons why we focus on children and young people's mental health. First of all, of course, we care about our children and young people. We want all our children to have a wonderful childhood free from mental health disorders, as well as physical health disorders.\nBut also we know that the majority of adult mental health disorders begin in childhood. So 75 percent of adult mental health disorders have begun in childhood. By age 18, if you look backwards and 50 percent by age 15, and that means that mental health and childhood is storing up problems for adult life.\nAnd it's not [00:04:00] just caring about our children and young people, but it's also thinking about what's coming forward for adults and the rest of our society.\nAndr\u00e9: And just briefly, what's going on? What's happened in the last few years that's caused this massive increase?\nEmily: It's a really important question and it's one we don't have a full answer to. So one hypothesis has been that COVID, would have been, a particular stressor and there's a suggestion of maybe a particular stressor for some, children with neurodevelopmental conditions like autism and ADHD.\nHowever, when you look at the literature, that's been published, looking at rates of mental health problems, Before and during COVID, there's a really inconsistent pattern with some studies showing yes, a definite increase, other studies showing no increase, in fact, even a decrease in mental health problems.\n [00:05:00] I think other hypotheses include the impact of social media. So children and young people now are growing up in a 24 7 environment, where they're bombarded very often by, social media of all sorts.\nIt impacts on the way in which they engage with other children and young people. It impacts on their physical activity. It impacts on the quality of their relationships and it impacts on their sleep. We know young people are often staying up late at night and using social media in various ways.\nAnd again, we don't have really good research, but everything that we know suggests that it probably has an impact on children, young people's mental health and their ability to turn off, refresh their brains, do other more habilitative or rehabilitative, um, activities and just have some down time. [00:06:00] And probably a third area that really needs quite a bit of, research and thinking about is whether patterns in society build resilience in young people.\nAnd by resilience, what I'm talking about is the idea that when a person is exposed to challenges or stressful experiences, they're able to bounce back from those and actually even sometimes become stronger as a result of having experienced something stressful, but been able to manage it and and you know in a constructive and helpful way and there are suggestions that we may be less good, now, as helping children and young people to become resilient.\nWe don't think we we may be encouraging them to say, oh poor you that's really upsetting rather have been poor youth, [00:07:00] that was. distressing, but let's think of how you're going to manage it and having that experience of coming out stronger. \nAndr\u00e9: You've spoken about this kind of increased interest and increased focus on youth mental health widely, but you're also focusing in South London at the IAPPN more on young people's mental health. Tell us about your exciting plans.\nEmily: Yeah, so we're incredibly excited to be building the Paris Maudsley Center for children young people, which will be The home of the Kings Maudsley Partnership for Children and Young People. Confusing having two acronyms, but the Pears Maudsley Center is a nine story building in the center of the Denmark Hill IOPPN campus that will bring together clinicians working directly with children and young people and academics, both Clinical, that is those of us who both [00:08:00] do research but also see patients and our non clinical colleagues who focus on mental disorders in children and young people.\nAnd we will be brought together in the same space to work together to identify the most pressing questions in children and young people's mental health and find novel ways of addressing those. The center also has. An inpatient unit for children and young people and outpatient services for more than 20 of our national and specialist services.\nAnd one of the areas that is most exciting for me is that we'll have, to my knowledge, the only children and young people's bespoke clinical research facility aimed at studying mental health in children and young people.\nAndr\u00e9: I guess one of the issues we've got currently in mental health is that our services are very [00:09:00] splintered and siloed. And our research groups are very sort of splintered and siloed. And we've got this drive that we've had over the last sort of five to 10 years, I suppose, to sort of bring these together a bit more, have more cross disciplinary working, have services, which are more joined up.\nIt sounds like what you're doing here is building a clinical research facility, which starts to break down some of those barriers.\nEmily: That's really one of our key aims is that the clinicians who are seeing children young people and saying, but if only I understood this bit of the problem, or I knew how to, you know, address this, symptom profile. in a different way. These are my biggest clinical problems, and the clinicians are saying that, and the researchers are saying, well, what are the most important problems?\nWhat, what, what's going to make a difference? , and therefore, what should we be prioritizing in terms of our research? So bringing [00:10:00] those two groups together to think about how do those clinical issues form a scientific question. And importantly, how do we see, , where the questions are the same across different clinical disorders?\nSo for example, where do we see synergies across young people who are, , coming to us with, , For example, depression and those who are coming to us with ADHD, so that we can find solutions that may pertain to a much wider group of children and young people., we often turn that for the transdiagnostic approach, but we know that Disorders in children and young people very often co occur, so children with ADHD or autism are much more likely to develop anxiety or depression.\nAnd understanding why that's the case and , what are the common threads is really important in terms of [00:11:00] developing, , novel approaches to,, understanding the conditions and intervening in a timely and effective way.\nAndr\u00e9: I've been doing a lot of work recently with the research champions in SLAM who have these roles where they try and, promote research within the trust. , and I guess, get frontline practitioners more interested in using research in their practice, but also getting their patients involved in research studies that are happening within the trust and within IPPN.\n I wonder what your thoughts are on how this clinical research facility can help to bridge this, , gap between frontline practice and academic research. I think a lot of practitioners. understand the importance of research, but spend very little time thinking about it in their day to day job because they're very busy.\nThank you very much. With looking after people. What can this center do in that regard?\nEmily: So I think it can make a difference in lots of different [00:12:00] ways. , one example is we'll be able to address questions that really challenged clinicians, , but have been difficult to address previously. And I'll just give you an example of, , one of the studies that will start in the autumn with the clinical research facility.\nAnd that's a study of what we call demand avoidance. It's a condition that, , quite a significant proportion of Autistic children and young people, , experience where they really don't want to do things, whether it's, , helping out at home, going to school, coming out of their rooms, engaging with other peers.\nSo it may involve a whole range of different situations. It's concerning for their families, , and the people around them because they're not engaging in The [00:13:00] whole range of life activities that are important for development, but we really don't have. good ideas about why some particularly autistic children and young people develop demand avoidance profiles and others don't.\nAnd it's, you can imagine that by the very nature of being demand avoidant, it's been hard to engage young people in research, but our clinicians see a lot of these children and young people and are really concerned to find more effective ways to do so. of, , treating them. So understanding what might be different about the cognitive, the thinking profiles, the brain function, the sensory experiences of this group of children and young people could give us really important insights in how we might develop novel interventions.\nAnd by having a clinical research facility that's first of all, [00:14:00] situated in your clinical building, so your clinician can trot along with that young person and come and support them to be engaged in research, can also feed into these are the research paradigms I think we need to test.\nI think we need to test how sensitive they are to different. Sensory experiences, or we need to test something about their cognitive style., they can engage in the research in, in a question that's really important to them. And furthermore, in terms of the clinical research facility with children, young people who find it hard to.\ncooperate, and I use that word with inverted commas, because it's our idea that people need to comply with a research procedure. , we can develop research studies that ask very little of the young person themselves. For example, it might just be viewing Different [00:15:00] films or listening to different noises while your brain activity is being monitored or your level of physiological arousal is being monitored so much easier for young people who find it difficult\nto take part in research and, , easy for their clinicians to be involved in and support those young people.\nAndr\u00e9: And finally, I'm interested in your thoughts on what impacts the new. facility is going to have on demand? I guess that's the key question for a lot of families at the moment. The fact that they're on waiting lists for two years or waiting for an assessment for ADHD or autism or whatever. , how do you see it affecting capacity in, in your part of London?\nI\nEmily: So realistically, in terms of capacity in the short term, I think it's not going to have a huge effect, but I think What it is going to allow us to do over [00:16:00] time is think about how we deliver mental health care to children and young people more efficiently and effectively. And I often use the analogy of How do we move from open abdominal surgery to keyhole surgery, which changed the patient experience of going in two days before surgery for a huge workup and then having to stay in for at least a week and rehabilitate for a month to coming in for day surgery and being up and within a couple of days.\nIf we can get closer to , more effective ways of understanding for the individual child, a young person, what's underpinning their mental health condition so that we're delivering more personalized and targeted interventions, then we would expect that those treatments will [00:17:00] be Both more efficacious, but also probably more efficient and time limited.\nSo we'll ultimately be able to see a higher number of children. We also want, where possible, to digitize interventions, , so that We don't have to see all the same proportion of children and young people in person, but rather often with the more mild cases to offer, , an app based treatment or maybe a virtual reality based treatment that they use at home.\nAnd then for those, for example, who need a more personalized and in person intervention, those are the ones that come in and see a therapist. And that. would potentially make, , treatment for children and young people hugely scalable, not only for South London, but for the [00:18:00] UK and globally as well.\n Thanks. Very much to Emily for joining us and taking the time to trail her IOP PN. Festival keynote talk. We look forward to covering that in more detail on may the 15th in London. If you'd like to attend the research festival in person free tickets are available. Just follow the link in the podcast description to the event. \nBright page. And look out for more podcast episodes coming up with Melania bass and Attica Jones. That's it for now? This is Andre signing off. I'll see you all soon. "}, {"title": "Gavin Davidson - Personality disorder, mental capacity and compulsory intervention", "date": "Tue, 23 Apr 2024 17:26:34 GMT", "year": 2024, "season": "15", "duration": "34:51", "description": "Prof Gavin Davidson from Queen\u2019s University Belfast and Dr Iain McDougall and Steph Kerr from Belfast Health and Social Care Trust talk about personality disorder, mental capacity and compulsory intervention on episode 1 of the 2024 BIGSPD podcast. BIGSPD is the British and Irish Group for the Study of Personality Disorder&nbsp;and their annual conference takes place in Belfast on 18-20 June 2024. Find out more at: https://bigspd.org.uk/conferences-and-events/annual-conference/ &nbsp; Hosted on ", "url": "gavin-davidson-personality-disorder-mental-capacity", "transcript": "Gavin Davidson BIGSPD24\nAndr\u00e9: [00:00:00] [00:01:00] Welcome Gavin and Ian and Steph to the podcast. Really, really lovely to have you here. Very excited about hearing about your work and this is a really good topic for BIGSPD. I wanted to start off just by asking you, are you all born and bred in Belfast?\nWhat's your background? \nSteph: I grew up in West Belfast which would be maybe one of the bigger areas of social deprivation in Belfast. Lots of mental ill health, [00:02:00] socioeconomic difficulties, et cetera. I don't live there now. I live just outside Belfast now in Newton Abbey, but born, raised, schooled, educated, et cetera, all in Belfast.\nAnd then of course worked for Belfast Trust. \nIain: I'm kind of very similar to Steph in many ways. I'm probably on the cusp of West and South Belfast growing up. Went to school in Belfast, went to university, dipped into some trips abroad at different times to get out of here for a little while, but generally , stayed in Belfast and like Steph, worked for the Belfast Trust at this stage in the personality disorder service.\nGavin: So I grew up just to the north, of Belfast, where Steph lives now, and I'm sure it's very different now, Steph, but I was, keen to escape from Newton Abbey and so, sort of went away to study, but when I come back, it's, hard to escape I think it's fair to say. So when I come back, I work for the Northern Trust as a social worker , in that area.\nI live in South Belfast now, close to Queens where I work. \nAndr\u00e9: So before we get into [00:03:00] it, I'm just interested in you telling me a bit more about the city, because people coming to BIGSPD in June may not have been to Belfast. They may have all sorts of preconceived ideas about what it's like as a city. What is it like? \nIain: I'd say the city's pretty buzzing at this stage. I think it's very easy to get into the conversation about Belfast and the troubles and the history, which is very interesting, very important for the city, but the last 10, 15, 20 years really come on leaps and bounds. And I suppose, like, the particular area of the city down the cathedral court is just filled with people.\nRestaurants, and so, big sell, I'll go to the Cathedral Quarter if you're coming to the conference, definitely. Book a few restaurants and see a few places.\nAndr\u00e9: So let's get into the difficult stuff. We're talking about mental capacity and compulsory intervention and personality disorder. Steph and Iain I guess I'd like you to sort of answer this question first and maybe give us an example from your own clinical [00:04:00] work When is it appropriate to force somebody with a diagnosis of personality disorder to go to a hospital against their will?\nSteph: I suppose, for myself in the course of my work, so I'm a service manager in the Belfast Trust and my responsibilities are all things Mental Capacity Act and approved social work. So at the minute in terms of the Mental Capacity Act it's in partial implementation with deprivation of liberty safeguards.\nBut in terms of compulsory admission to hospital really for mental health services. Support that would really fall more under the mental health order at the minute in Northern Ireland, because we're running with the two pieces of legislation, which is super duper confusing. So as an approved social worker myself, I do do this work and I still do this work as a manager.\nAnd I would have some very recent examples of where perhaps a person who does have a diagnosis of a personality disorder has maybe been. Picked up by police at a site [00:05:00] where they've tried to cause harm to themselves end their lives by suicide and be brought to maybe one of our emergency departments.\nAnd at that point in time, then there'll be a request for an assessment under the mental health order and the circumstances whereby the person might be. admitted to mental health hospital against their will as if they meet that criteria under the mental health order for admission. Now, important to say that under our mental health order, which is the same age as me, and we're all very glad that it's being replaced with the Mental Capacity Act.\nThere is an exclusion of people being admitted to hospital compulsory who have personality disorder. However, people with personality disorders also get on well. So generally the person might have suicidal ideation, low mood, depression. So there'll be other things besides personality disorder that's leading the person to a place.\nWhere they want to cause that significant harm to themselves. So what our criteria is that the person has a mental health condition and that there's a substantial likelihood of serious physical [00:06:00] harm to themselves or others. So that would be the specific circumstance whereby the person would be admitted to mental health hospital against their will.\nIt would be if those criteria are met. So it's really a situation whereby. Ordinarily, the risk of serious harm to other people isn't really a feature for these patients. It's the risk of serious physical harm to themselves. And it would be under those circumstances there then that there would be an admission to a psychiatric hospital for support until such a time that that criteria is no longer met.\nIain: Steph, it's probably fair to say that we do our best not to use the mental health order and detain people who have personality disorder within their diagnosis, and it's, really when The crisis and risk gets into a territory where it's worth assessing for other mental health conditions. That's really the territory we have to be thinking that we're in, in order to use the mental health order at this stage.\nSteph: Yeah, you're always looking for the least [00:07:00] restrictive option, and if there's a lesser restrictive option to be able to provide the care and support that a person needs at that time of crisis, then that's what we're going to go for. And our mental health order would actually tell us to try to seek out lesser restrictive options, same as our Mental Capacity Act tells us to for DOLs and will tell us to for psychiatric admissions to hospital as well.\nSo, it really is. There's no other way to keep this person safe at this time, other than a compulsory admission to hospital. But as Ian said, we would be trying lots of other forms of less restrictive interventions before reaching that stage. And ideally, it would be to deal with the crisis, as opposed to staying there long term.\nSo you're dealing with a crisis with a view to trying to get a person those longer term supports where they can live as independently as possible.\nAndr\u00e9: Gavin, we know that compulsory treatment broadly is often used in a discriminatory way.\nWhat does [00:08:00] the evidence show about the use of compulsory treatment specifically in people with a diagnosis of personality disorder? Okay.\nGavin: It's a good and difficult question. I think there's, The initial issue which Steph and Ian have talked about to address, which is the suggestion that our traditional approach to compulsory intervention for people who are experiencing some form of mental health problems is arguably discriminatory in itself because it doesn't apply to everyone, and the usual approach is to set up a separate sort of capacity based framework , for, other issues.\nSo, Part of the approach which we're trying to develop in Northern Ireland is to have one framework for everyone, so there would be no specific exclusions, it would be capacity based. So that's one aspect of potential discrimination. And that's sort of if we exclude some people from a legal framework and its protections as well as the possibility of compulsory admission the whole framework might be set up, as [00:09:00] discriminatory.\nIn, in terms of what's the, the evidence generally for compulsory intervention and specifically for people with a diagnosis of personality disorder that's much more difficult to say. I think it's fair to say that there is some evidence, but it's mixed and contested. I think it's maybe the best way to frame it.\nSo there's general evidence, which looks at use of compulsory admission for people with mental health problems in general, and some evidence that that's helpful and necessary for some people, and also some evidence that people find that unhelpful, and indeed, potentially sort of negative and further traumatizing.\nThere is also the consideration that it's difficult in terms of effectiveness, it is a difficult thing to research, there are some randomized controlled trials, which, as you know, I suppose, gives us the best idea of if it's specifically the compulsion element, which [00:10:00] might be the helpful or unhelpful part.\nBut again, those trials are also contested. So the evidence, unfortunately, doesn't give us a really clear idea of this is really useful for, some people in some circumstances or not., it's very mixed. The more helpful evidence that is available is for a whole range of ways of trying to reduce the need for coercion and compulsory admission itself.\nSo that's much more helpful in terms of the debates around compulsory intervention and specifically for people that diagnosed with personality disorder. We're need to also stay with, to some extent, the ethical and rights based arguments.\nAndr\u00e9: I wonder if I could ask a follow up question to that. And I'm thinking about it from the perspective of mental health professionals and criminal justice, professionals, who are involved in the compulsory treatment decisions. And it's about attitudes to people with a diagnosis of personality disorder.\nSo, you [00:11:00] know, if we can broaden out the question that I just asked Gavin there about discrimination around compulsory treatment, just broadly to discrimination towards this group. We know that mental health professionals stigmatize and discriminate against people with personality disorders in a quite a unique way.\nIn that they can't be helped. They're bringing this on themselves. Can you say something about that and how that might weave into this decision making around compulsory treatment?\nIain: yeah, Andre, I think you're right that diagnosis of personality disorder is one of the most stigmatized diagnoses within the mental health field. I suppose it can lead in the direction of black and white sort of arbitrary decisions that should always be made that keep people with personality disorder out of hospital, no matter what, which I think we know isn't always the right answer.\nBut as Gavin's pointed out, there is a real debate in the evidence. And I suppose, [00:12:00] Between the evidence and clinical experience, people do err on the side that long term admissions for people with personality disorder probably aren't the best thing for most people. And I'm kind of generalizing a bit because each person's an individual in this and the individual circumstances are very important.\nSo I think there can be the. Discrimination can happen in that if somebody with a personality disorder presents with a serious crisis presentation, some people can take the view they should never be admitted to hospital. Whereas I think there needs to be a lot more clinical nuance. thinking about the individual and their circumstances at that point and, you know, overlapping with some of what Steph was saying as well earlier, if we're talking relatively brief admissions for somebody with personality disorder, whether that's voluntary or detained, that might actually help a lot of people through the worst of moments, but there can be a discrimination happens against doing [00:13:00] that at times.\nSteph: There is a discriminatory element towards people who have a personality disorder. And I really think what that is born out of is a perceived helplessness on the part of the mental health practitioner where they feel like they're They are unable to help this person who undoubtedly has quite a traumatic background and they feel that their intervention doesn't appear to be helping.\nSo I think it comes from that place of frustration, but I really do think the narrative needs to be changed is that the issue here is not that people are beyond help. The issue and the challenge is that we do not have the right kind of help that people with personality disorders need and we're sitting in a place between having.\nReally, really brilliant treatment and care options that require an ability and to be at a place where you can really engage. And then the alternative being a psychiatric hospital and the absence of anything in between those two places is what the difficulty is. So it really comes down to. Our inability to provide [00:14:00] appropriate care for somebody, as opposed to there not being any care that could possibly help that person.\nSo I think, I mean, the best that we can do as individuals on this podcast with yourself is to take that stance and challenge the discrimination that we see or hear from. People working within the field of mental health. It can, we can really only do it from an individual level, but if enough people do it from an individual level, then that's whenever you can start to really, really see a difference.\n But we do have under the mental health order that people cannot be detained for the purposes of personality disorder, but people with personality disorders get sick too. And I think that there's this idea that people with personality disorders will only ever have p
